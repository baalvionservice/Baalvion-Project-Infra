apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgek-core-kernel
  namespace: sovereign-core
spec:
  replicas: 48
  selector:
    matchLabels:
      app: sgek-kernel
  template:
    metadata:
      labels:
        app: sgek-kernel
        security.baalvion.gov/mtls: "true"
        tier: kernel
    spec:
      containers:
      - name: sgek-runtime
        image: vault.baalvion.gov/core/sgek-kernel:v4.2.0
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: kernel-authority-secrets
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: sgek-service
  namespace: sovereign-core
spec:
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  - port: 50051
    targetPort: 50051
    name: grpc
  selector:
    app: sgek-kernel