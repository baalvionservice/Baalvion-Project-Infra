# Gitleaks configuration for Baalvion-Project-Infra
#
# Extends the built-in gitleaks ruleset (all default secret detectors stay active)
# and adds a tightly-scoped allowlist for ONE verified false positive.
#
# The CTM auth-boundary test (ctm-service/tests/auth-denial.test.js) mints its own
# RS256 keypair at runtime (crypto.generateKeyPairSync + jwt.sign) — no real
# credential is committed. gitleaks' generic-api-key heuristic matches the literal
# string "RS256-signed" inside the comment "...access token: RS256-signed by our
# key...". Three independent allowlist layers below (commit, path, matched-text)
# so it is suppressed in git-log scan mode regardless of which commit/range the
# action scans — while genuine secrets anywhere else still fail the scan.

[extend]
useDefault = true

[[allowlists]]
description = "CTM auth-denial.test.js runtime-keypair fixture — verified false positive (commit layer)"
commits = [
  "24737fda45415baac9efcb16def577b4a994ed77",
]

[[allowlists]]
description = "CTM auth-denial.test.js runtime-keypair fixture — verified false positive (path layer)"
paths = [
  '''Backend/services/ecosystem/ctm-service/tests/auth-denial\.test\.js''',
]

[[allowlists]]
description = "CTM auth-denial.test.js runtime-keypair fixture — verified false positive (matched-text layer)"
regexTarget = "match"
regexes = [
  '''RS256-signed''',
]
