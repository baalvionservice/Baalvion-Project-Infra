name: "🐛 Bug report"
description: Report a defect in a service, package, or frontend application.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please **do not** report security
        vulnerabilities here — follow our [Security Policy](https://github.com/baalvionservice/Baalvion-Project-Infra/security/policy).
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Which service, package, or app? (e.g. `auth-service`, `Frontend/Imperialpedia-main`)
      placeholder: Backend/services/identity/auth-service
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or stack traces. Redact secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Commit SHA / version
      placeholder: e.g. c94074d
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - local
        - staging
        - production
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those go to SECURITY.md).
          required: true
