name: Jobs Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Backend/services/ecosystem/jobs-service/**'
      - '.github/workflows/jobs-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/services/ecosystem/jobs-service/**'

defaults:
  run:
    working-directory: Backend/services/ecosystem/jobs-service

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: baalvion_test
          POSTGRES_USER: baalvion
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3002
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: baalvion_test
      DB_USER: baalvion
      DB_PASSWORD: test_pass
      JWT_ACCESS_SECRET: ci-test-secret
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for syntax errors
        run: node -e "require('./index')" &
        timeout-minutes: 1
        continue-on-error: true

      - name: Run tests
        run: pnpm test --if-present

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/baalvion-jobs-service
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: Backend/services/ecosystem/jobs-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
