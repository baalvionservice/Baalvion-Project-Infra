name: Secret Scan

# Defense-in-depth secret scanning across the WHOLE repo on every PR and push,
# complementing GitHub's native push protection (which is a setting, not a gate)
# and the financial-services-java-only Trivy secret scan. Fails the build on any
# leaked credential so it never reaches review.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so push events scan the new commits' diffs accurately.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          # No GITLEAKS_LICENSE needed: this is a personal/public repository,
          # not a GitHub organization. Add the secret here if it migrates to an org.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
