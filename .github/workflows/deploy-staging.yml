name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list of services to deploy (leave empty = all changed)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/baalvion

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: auth-service,            port: 3001, context: ., file: Backend/services/identity/auth-service/Dockerfile }
          - { name: admin-service,           port: 3021, context: ., file: Backend/services/platform/admin-service/Dockerfile }
          - { name: session-service,         port: 3022, context: ., file: Backend/services/identity/session-service/Dockerfile }
          - { name: oauth-service,           port: 3023, context: ., file: Backend/services/identity/oauth-service/Dockerfile }
          - { name: jobs-service,            port: 3002, context: ., file: Backend/services/ecosystem/jobs-service/Dockerfile }
          - { name: ctm-service,             port: 3017, context: ., file: Backend/services/ecosystem/ctm-service/Dockerfile }
          - { name: mining-service,          port: 3003, context: ., file: Backend/services/ecosystem/mining-service/Dockerfile }
          - { name: imperialpedia-service,   port: 3004, context: ., file: Backend/services/knowledge/imperialpedia-service/Dockerfile }
          - { name: real-estate-service,     port: 3005, context: ., file: Backend/services/ecosystem/real-estate-service/Dockerfile }
          - { name: brand-connector-service, port: 3006, context: ., file: Backend/services/ecosystem/brand-connector-service/Dockerfile }
          - { name: market-service,          port: 3007, context: ., file: Backend/services/commerce/market-service/Dockerfile }
          - { name: ir-service,              port: 3008, context: ., file: Backend/services/ecosystem/ir-service/Dockerfile }
          - { name: dashboard-service,       port: 3009, context: ., file: Backend/services/platform/dashboard-service/Dockerfile }
          - { name: about-service,           port: 3010, context: ., file: Backend/services/ecosystem/about-service/Dockerfile }
          - { name: realtime-service,        port: 3040, context: ., file: Backend/services/infrastructure/realtime-service/Dockerfile }
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/baalvion
            docker compose --profile identity --profile backend pull
            docker compose --profile identity --profile backend up -d --no-build
            docker system prune -f

      - name: Health checks
        run: |
          sleep 20
          for port in 3001 3021 3022 3023 3002 3017 3003 3004 3005 3006 3007 3008 3009 3010 3040; do
            curl -sf "http://${{ secrets.STAGING_HOST }}:${port}/health" && echo "Port ${port} healthy" || echo "Port ${port} not responding (may not be deployed)"
          done
