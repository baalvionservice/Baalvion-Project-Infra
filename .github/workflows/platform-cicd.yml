name: platform-cicd

on:
  push: { branches: [main], paths: ["Backend/**", "infra/**", ".github/workflows/platform-cicd.yml"] }
  pull_request: { branches: [main] }

permissions:
  contents: read
  packages: write
  id-token: write          # OIDC for cloud auth (no static cloud creds)
  security-events: write   # upload SARIF

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend (Node) lint + tests ──
  backend-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: Backend/backend-Proxy-BaalvionStack } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: Backend/backend-Proxy-BaalvionStack/package-lock.json }
      - run: npm ci
      - run: node --check index.js
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high || true

  # ── 2. Gateway (Go) vet + tests + security ──
  gateway-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: Backend/gateway } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22", cache-dependency-path: Backend/gateway/go.sum }
      - run: go mod tidy && git diff --exit-code go.mod
      - run: go vet ./...
      - run: go test ./... -race -count=1
      - uses: securego/gosec@master
        with: { args: "-no-fail -fmt sarif -out gosec.sarif ./..." }
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: Backend/gateway/gosec.sarif }

  # ── 3. IaC validation ──
  iac-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Kustomize overlays
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          for o in Backend/infra/k8s/overlays/*/; do ./kustomize build "$o" > /dev/null && echo "ok: $o"; done
      - name: kubeconform (schema, incl. CRDs)
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          ./kustomize build Backend/infra/k8s/overlays/us-east | ./kubeconform -strict -ignore-missing-schemas -summary
      - name: tfsec (Terraform security)
        uses: aquasecurity/tfsec-action@v1.0.3
        with: { working_directory: Backend/infra/terraform, soft_fail: true }

  # ── 4. Build + scan + push images (only on main) ──
  build-push:
    needs: [backend-test, gateway-test, iac-validate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { image: gateway, context: Backend/gateway }
          - { image: proxy-backend, context: Backend/backend-Proxy-BaalvionStack }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/baalvion/${{ matrix.image }}:${{ github.sha }},ghcr.io/baalvion/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy container scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/baalvion/${{ matrix.image }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif

  # ── 5. GitOps deploy: bump image tags → ArgoCD reconciles (staged) ──
  deploy:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage 1 — bump us-east overlay tag (canary region)
        run: |
          cd Backend/infra/k8s/overlays/us-east
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/" kustomization.yaml
      - name: Commit image bump (ArgoCD auto-syncs)
        run: |
          git config user.name "ci-bot" && git config user.email "ci@baalvion.net"
          git commit -am "deploy: us-east -> ${{ github.sha }}" && git push
      # Promotion to remaining regions is a separate, gated workflow_dispatch
      # after canary SLOs hold green for 30m (blue-green via Argo Rollouts).
