name: Jobs Portal CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Frontend/Baalvion-Jobs-Portal-main/**'
      - '.github/workflows/jobs-portal.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Frontend/Baalvion-Jobs-Portal-main/**'
      - '.github/workflows/jobs-portal.yml'

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # This is a pnpm + Turborepo monorepo: the lockfile (pnpm-lock.yaml) lives
      # at the repo root and there is no per-app package-lock.json, so dependency
      # install must run from the root via pnpm — not `npm ci` in the app folder.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Workspace packages (e.g. @baalvion/auth-sdk) compile to dist/; build them
      # so the app typecheck can resolve their published types (mirrors ci.yml).
      - name: Build workspace packages
        run: pnpm --filter "./Backend/packages/*" run build

      - name: Type check
        run: pnpm --filter baalvion-jobs-portal-web run typecheck

      # Lint and tests are advisory here (do not gate the merge); the canonical
      # build gate for this app is the "Frontend Apps Build" matrix in ci.yml.
      - name: Lint
        run: pnpm --filter baalvion-jobs-portal-web run lint || true

      - name: Run tests
        run: pnpm --filter baalvion-jobs-portal-web run test -- --passWithNoTests || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.ref == 'refs/heads/main'

    env:
      NEXT_PUBLIC_USE_MOCK: 'false'
      NEXT_PUBLIC_AUTH_URL: ${{ secrets.AUTH_URL || 'http://localhost:4000/v1/auth' }}
      NEXT_PUBLIC_JOBS_SERVICE_URL: ${{ secrets.JOBS_SERVICE_URL || 'http://localhost:3002/api/v1' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.JOBS_APP_URL || 'http://localhost:3026' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter "./Backend/packages/*" run build

      - name: Build
        run: pnpm --filter baalvion-jobs-portal-web run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jobs-portal-build
          path: Frontend/Baalvion-Jobs-Portal-main/.next
          retention-days: 7
