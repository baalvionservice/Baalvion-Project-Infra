name: Jobs Portal CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Frontend/Baalvion-Jobs-Portal-main/**'
      - '.github/workflows/jobs-portal.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Frontend/Baalvion-Jobs-Portal-main/**'

defaults:
  run:
    working-directory: Frontend/Baalvion-Jobs-Portal-main

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/Baalvion-Jobs-Portal-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Run tests
        run: npm test --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.ref == 'refs/heads/main'

    env:
      NEXT_PUBLIC_USE_MOCK: 'false'
      NEXT_PUBLIC_AUTH_URL: ${{ secrets.AUTH_URL || 'http://localhost:4000/v1/auth' }}
      NEXT_PUBLIC_JOBS_SERVICE_URL: ${{ secrets.JOBS_SERVICE_URL || 'http://localhost:3002/api/v1' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.JOBS_APP_URL || 'http://localhost:3026' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/Baalvion-Jobs-Portal-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jobs-portal-build
          path: Frontend/Baalvion-Jobs-Portal-main/.next
          retention-days: 7
