name: CTM Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Frontend/controlthemarket-main/**'
      - '.github/workflows/ctm-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Frontend/controlthemarket-main/**'

defaults:
  run:
    working-directory: Frontend/controlthemarket-main

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/controlthemarket-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit 2>&1 | grep -v "DataProof.tsx" || true

      - name: Run tests
        run: npm test --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.ref == 'refs/heads/main'

    env:
      NEXT_PUBLIC_USE_MOCK: 'false'
      NEXT_PUBLIC_CTM_API_URL: ${{ secrets.CTM_API_URL || 'http://localhost:3011/api/v1' }}
      NEXT_PUBLIC_AUTH_URL: ${{ secrets.AUTH_URL || 'http://localhost:4000/v1/auth' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.CTM_APP_URL || 'http://localhost:3025' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/controlthemarket-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctm-build
          path: Frontend/controlthemarket-main/.next
          retention-days: 7
