name: CTM Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Frontend/controlthemarket-main/**'
      - '.github/workflows/ctm-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Frontend/controlthemarket-main/**'
      - '.github/workflows/ctm-frontend.yml'

defaults:
  run:
    working-directory: Frontend/controlthemarket-main

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      # Workspace packages (e.g. @baalvion/auth-sdk) compile to dist/; build them
      # so the app typecheck can resolve their published types (mirrors ci.yml).
      - name: Build workspace packages
        working-directory: .
        run: pnpm --filter "./Backend/packages/*" run build

      - name: Type check
        # tsc --noEmit is clean (next.config no longer ignores build type errors),
        # so this is a real gate — no error filtering.
        run: pnpm --filter controlthemarket-web typecheck

      - name: Run tests
        working-directory: .
        run: pnpm --filter controlthemarket-web test --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.ref == 'refs/heads/main'

    env:
      NEXT_PUBLIC_USE_MOCK: 'false'
      NEXT_PUBLIC_CTM_API_URL: ${{ secrets.CTM_API_URL || 'http://localhost:3017/api/v1' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.CTM_APP_URL || 'http://localhost:3034' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        working-directory: .
        run: pnpm --filter "./Backend/packages/*" run build

      - name: Build
        working-directory: .
        run: pnpm --filter controlthemarket-web build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ctm-build
          path: Frontend/controlthemarket-main/.next
          retention-days: 7
