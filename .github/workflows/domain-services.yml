name: Domain Services CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Backend/services/ecosystem/mining-service/**'
      - 'Backend/services/knowledge/imperialpedia-service/**'
      - 'Backend/services/ecosystem/real-estate-service/**'
      - 'Backend/services/commerce/market-service/**'
      - 'Backend/services/ecosystem/ir-service/**'
      - 'Backend/services/ecosystem/about-service/**'
      - 'Backend/services/ecosystem/brand-connector-service/**'
      - 'Backend/services/platform/dashboard-service/**'
      - '.github/workflows/domain-services.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/services/ecosystem/mining-service/**'
      - 'Backend/services/knowledge/imperialpedia-service/**'
      - 'Backend/services/ecosystem/real-estate-service/**'
      - 'Backend/services/commerce/market-service/**'
      - 'Backend/services/ecosystem/ir-service/**'
      - 'Backend/services/ecosystem/about-service/**'
      - 'Backend/services/ecosystem/brand-connector-service/**'
      - 'Backend/services/platform/dashboard-service/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared test services ───────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      mining:       ${{ steps.filter.outputs.mining }}
      imperialpedia: ${{ steps.filter.outputs.imperialpedia }}
      real_estate:  ${{ steps.filter.outputs.real_estate }}
      market:       ${{ steps.filter.outputs.market }}
      ir:           ${{ steps.filter.outputs.ir }}
      about:        ${{ steps.filter.outputs.about }}
      brand:        ${{ steps.filter.outputs.brand }}
      dashboard:    ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            mining:
              - 'Backend/services/ecosystem/mining-service/**'
            imperialpedia:
              - 'Backend/services/knowledge/imperialpedia-service/**'
            real_estate:
              - 'Backend/services/ecosystem/real-estate-service/**'
            market:
              - 'Backend/services/commerce/market-service/**'
            ir:
              - 'Backend/services/ecosystem/ir-service/**'
            about:
              - 'Backend/services/ecosystem/about-service/**'
            brand:
              - 'Backend/services/ecosystem/brand-connector-service/**'
            dashboard:
              - 'Backend/services/platform/dashboard-service/**'

  # ── Mining Service ─────────────────────────────────────────────────────────
  mining-service:
    needs: changes
    if: needs.changes.outputs.mining == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: baalvion_test
          POSTGRES_USER: baalvion
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3003
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: baalvion_test
      DB_USER: baalvion
      DB_PASSWORD: test_pass
      JWT_ACCESS_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
      - name: Install (pnpm workspace)
        run: pnpm install --frozen-lockfile --filter mining-service...
      - name: Build / compile check
        run: pnpm exec turbo run build --filter=mining-service...
      - name: Tests
        run: pnpm --filter mining-service test --if-present
      - name: Docker build (monorepo context = repo root)
        run: docker build -f Backend/services/ecosystem/mining-service/Dockerfile -t baalvion-mining:ci .

