name: Domain Services CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Backend/mining-service/**'
      - 'Backend/imperialpedia-service/**'
      - 'Backend/real-estate-service/**'
      - 'Backend/market-service/**'
      - 'Backend/ir-service/**'
      - 'Backend/about-service/**'
      - 'Backend/brand-connector-service/**'
      - 'Backend/dashboard-service/**'
      - '.github/workflows/domain-services.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/mining-service/**'
      - 'Backend/imperialpedia-service/**'
      - 'Backend/real-estate-service/**'
      - 'Backend/market-service/**'
      - 'Backend/ir-service/**'
      - 'Backend/about-service/**'
      - 'Backend/brand-connector-service/**'
      - 'Backend/dashboard-service/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared test services ───────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      mining:       ${{ steps.filter.outputs.mining }}
      imperialpedia: ${{ steps.filter.outputs.imperialpedia }}
      real_estate:  ${{ steps.filter.outputs.real_estate }}
      market:       ${{ steps.filter.outputs.market }}
      ir:           ${{ steps.filter.outputs.ir }}
      about:        ${{ steps.filter.outputs.about }}
      brand:        ${{ steps.filter.outputs.brand }}
      dashboard:    ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mining:
              - 'Backend/mining-service/**'
            imperialpedia:
              - 'Backend/imperialpedia-service/**'
            real_estate:
              - 'Backend/real-estate-service/**'
            market:
              - 'Backend/market-service/**'
            ir:
              - 'Backend/ir-service/**'
            about:
              - 'Backend/about-service/**'
            brand:
              - 'Backend/brand-connector-service/**'
            dashboard:
              - 'Backend/dashboard-service/**'

  # ── Mining Service ─────────────────────────────────────────────────────────
  mining-service:
    needs: changes
    if: needs.changes.outputs.mining == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: baalvion_test
          POSTGRES_USER: baalvion
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3003
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: baalvion_test
      DB_USER: baalvion
      DB_PASSWORD: test_pass
      JWT_ACCESS_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Backend/mining-service/package-lock.json
      - name: Install
        working-directory: Backend/mining-service
        run: npm ci
      - name: Syntax check
        working-directory: Backend/mining-service
        run: node --check index.js
      - name: Tests
        working-directory: Backend/mining-service
        run: npm test --if-present
      - name: Docker build
        run: docker build -t baalvion-mining:ci Backend/mining-service

