      - name: Docker build
        run: docker build -t baalvion-dashboard:ci Backend/dashboard-service

  # ── Docker push on main (all changed services) ────────────────────────────
  push-images:
    needs:
      - mining-service
      - imperialpedia-service
      - real-estate-service
      - market-service
      - ir-service
      - about-service
      - brand-connector-service
      - dashboard-service
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: mining-service
            port: 3003
            image: baalvion-mining
          - service: imperialpedia-service
            port: 3004
            image: baalvion-imperialpedia
          - service: real-estate-service
            port: 3005
            image: baalvion-real-estate
          - service: market-service
            port: 3007
            image: baalvion-market
          - service: ir-service
            port: 3008
            image: baalvion-ir
          - service: about-service
            port: 3010
            image: baalvion-about
          - service: brand-connector-service
            port: 3006
            image: baalvion-brand
          - service: dashboard-service
            port: 3009
            image: baalvion-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: Backend/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── CI gate ────────────────────────────────────────────────────────────────
  domain-ci-success:
    needs:
      - mining-service
      - imperialpedia-service
      - real-estate-service
      - market-service
      - ir-service
      - about-service
      - brand-connector-service
      - dashboard-service
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all domain service jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more domain service CI jobs failed" && exit 1
          fi
          echo "All domain service CI checks passed or skipped"
