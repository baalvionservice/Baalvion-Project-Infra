  # NOTE: the GHCR `push-images` job was removed during the ECR consolidation.
  # These domain services are not part of the single-host production stack; production
  # image builds for the deployed fleet are owned by the canonical pipeline
  # (.github/workflows/deploy.yml → Amazon ECR only). The per-service jobs above keep
  # their local `docker build … :ci` compile-verification step (no registry push).

  # ── CI gate ────────────────────────────────────────────────────────────────
  domain-ci-success:
    needs:
      - mining-service
      - imperialpedia-service
      - real-estate-service
      - market-service
      - ir-service
      - about-service
      - brand-connector-service
      - dashboard-service
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all domain service jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more domain service CI jobs failed" && exit 1
          fi
          echo "All domain service CI checks passed or skipped"
