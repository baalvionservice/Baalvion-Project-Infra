name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Block GPL/AGPL-style copyleft from entering a proprietary codebase.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0
          # jszip is dual-licensed "GPL-3.0-only OR MIT" — usable under MIT, but the action
          # flags it because GPL-3.0 appears in the SPDX OR-expression. Exempt it explicitly.
          allow-dependencies-licenses: pkg:npm/jszip
          # Acknowledged transitive build-time advisories on node-tar 6.2.1, pulled ONLY by
          # @mapbox/node-pre-gyp@1.0.11 (install-time prebuilt-binary fetch, not runtime code).
          # Still tracked by Dependabot. Remediate by upgrading node-pre-gyp to v2 (uses tar@7),
          # then drop this allow-list.
          #
          # GHSA-5xrq-8626-4rwp — vitest <…: arbitrary file read/RCE ONLY while the Vitest UI
          # server (`vitest --ui` / API server) is listening on a dev machine. It is dev-tooling
          # only: CI/prod test runs never start the UI server, so there is no runtime exposure.
          # Still tracked by Dependabot; remediate by bumping vitest, then drop this entry.
          allow-ghsas: GHSA-8qq5-rm4j-mr97,GHSA-r6q2-hw4h-h46w,GHSA-34x7-hfp2-rc4v,GHSA-83g3-92jg-28cx,GHSA-qffp-2rhf-9h96,GHSA-9ppj-qmqm-q256,GHSA-5xrq-8626-4rwp
