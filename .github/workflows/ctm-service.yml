name: CTM Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Backend/services/ecosystem/ctm-service/**'
      - '.github/workflows/ctm-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/services/ecosystem/ctm-service/**'

defaults:
  run:
    working-directory: Backend/services/ecosystem/ctm-service

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: baalvion_test
          POSTGRES_USER: baalvion
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3017
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: baalvion_test
      DB_USER: baalvion
      DB_PASSWORD: test_pass
      JWT_ACCESS_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile --filter baalvion-ctm-service...

      # ctm-service's PCL shadow adapter requires @baalvion/payment-consistency at runtime, whose
      # package main is dist/index.js (gitignored, built via tsup). Build the workspace dependency
      # before tests so `require('@baalvion/payment-consistency')` resolves in CI (it does locally
      # only because dist/ already exists on disk).
      - name: Build workspace package deps
        working-directory: .
        run: pnpm --filter @baalvion/payment-consistency build

      - name: Run tests
        working-directory: .
        run: pnpm --filter baalvion-ctm-service test --if-present

  # NOTE: the GHCR `build-docker` push job was removed during the ECR consolidation.
  # ctm-service is now built + pushed to Amazon ECR (repo controlthemarket-ctm-service)
  # by the single canonical pipeline: .github/workflows/deploy.yml. Its image is also
  # build + Trivy-scanned in ci.yml (docker-build-scan). This workflow is now test-only.
