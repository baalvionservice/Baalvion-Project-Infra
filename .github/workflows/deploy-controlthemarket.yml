name: Deploy controlthemarket.com

# One git push → build the web + ctm-service images (GHCR) → SSH the EC2 and roll the stack.
# Triggers only when the CTM stack changes (or manually). Mirrors deploy-proxy-baalvionstack.yml.
on:
  push:
    branches: [main]
    paths:
      - 'Frontend/controlthemarket-main/**'
      - 'Backend/services/ecosystem/ctm-service/**'
      - 'Backend/packages/**'
      - 'deploy/controlthemarket/**'
      - '.github/workflows/deploy-controlthemarket.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Must match IMAGE_PREFIX in the EC2's .env.prod and the compose image: refs.
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/baalvion
  IMAGE_TAG: prod-latest

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: ctm-service
            file: Backend/services/ecosystem/ctm-service/Dockerfile
            args: ""
          - name: web
            file: Frontend/controlthemarket-main/Dockerfile
            # NEXT_PUBLIC_* are baked into the client bundle here — they MUST be the prod origin.
            # Same-origin: the browser calls https://controlthemarket.com/api/v1 (Caddy → ctm-service).
            args: |
              NEXT_PUBLIC_CTM_API_URL=https://controlthemarket.com/api/v1
              NEXT_PUBLIC_APP_URL=https://controlthemarket.com
              NEXT_PUBLIC_USE_MOCK=false
    steps:
      - uses: actions/checkout@v4
      # build-push-action below exports the GHA layer cache (cache-to: type=gha), which the
      # default docker driver cannot do. setup-buildx provisions the docker-container driver
      # that supports cache export. Mirrors the proven ci.yml build job.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/controlthemarket-${{ matrix.name }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha,prefix=
      # Build context is the REPO ROOT for both images (turbo prune over the pnpm workspace).
      # The web build relies on Frontend/controlthemarket-main/Dockerfile.dockerignore to keep the
      # Frontend/ tree in the context (the root .dockerignore excludes it for the backend builds).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          build-args: ${{ matrix.args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ctm-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=ctm-${{ matrix.name }}

  deploy:
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: production
    # Secrets can't be used in `if:` directly, so surface CTM_PROD_HOST as an env var
    # and gate the roll on it. Images are always built + pushed to GHCR by build-push;
    # the SSH roll only runs once the prod target is configured.
    env:
      CTM_PROD_HOST: ${{ secrets.CTM_PROD_HOST }}
    steps:
      - name: Check prod target is configured
        id: gate
        run: |
          if [ -z "${CTM_PROD_HOST}" ]; then
            echo "::notice title=Prod roll skipped::CTM_PROD_HOST is not set. Images were built and pushed to GHCR, but the production roll was skipped. Set CTM_PROD_HOST / CTM_PROD_USER / CTM_PROD_SSH_KEY (and the production environment) to enable auto-deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Pull images + roll the stack
        if: steps.gate.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CTM_PROD_HOST }}
          username: ${{ secrets.CTM_PROD_USER }}
          key: ${{ secrets.CTM_PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/baalvion
            git pull --ff-only
            # The EC2 must already be able to pull from GHCR: either the packages are public, or run
            # `docker login ghcr.io` once on the host with a read:packages PAT (see DEPLOY-AWS.md §9).
            COMPOSE="docker compose --env-file deploy/controlthemarket/.env.prod -f deploy/controlthemarket/docker-compose.prod.yml"
            $COMPOSE pull ctm-service web
            $COMPOSE up -d --no-build
            $COMPOSE restart caddy
            docker system prune -f
      - name: Smoke test
        if: steps.gate.outputs.ready == 'true'
        run: |
          sleep 15
          curl -sf https://controlthemarket.com/api/v1/payments/provider > /dev/null && echo "api OK" || echo "api NOT responding"
          curl -s -o /dev/null -w 'home: %{http_code}\n' https://controlthemarket.com/
