# Financial Services CI/CD — the real green-build gate for the Java suite.
# (This sandbox has no Maven/JDK17, so `mvn verify` runs HERE, not on a dev laptop.)
# Source of truth for edits: Backend/services/commerce/financial-services-java/deploy/ci/financial-services.yml
name: Financial Services CI/CD

on:
  push:
    branches: [main, hardening-phase-1, "release/**", "feat/**"]
    paths:
      - "Backend/services/commerce/financial-services-java/**"
      - ".github/workflows/financial-services.yml"
  pull_request:
    branches: [main, hardening-phase-1, "release/**"]
    paths:
      - "Backend/services/commerce/financial-services-java/**"

env:
  MODULE_DIR: Backend/services/commerce/financial-services-java
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build, test (Testcontainers), package
        working-directory: ${{ env.MODULE_DIR }}
        run: mvn -B -ntp clean verify
      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: financial-jars
          path: ${{ env.MODULE_DIR }}/*/target/*.jar
          if-no-files-found: ignore

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS (vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: ${{ env.MODULE_DIR }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"

  images:
    name: Build & scan images
    needs: [build-test, trivy-fs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - account-service
          - ledger-service
          - payment-service
          - escrow-service
          - settlement-service
          - reconciliation-service
          - audit-service
          - reporting-service
          - risk-service
          - trade-finance-service
          - credit-service
          - fx-service
          - wallet-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.MODULE_DIR }}
          file: ${{ env.MODULE_DIR }}/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
      - name: Trivy image scan (${{ matrix.service }})
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image (${{ matrix.service }})
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.MODULE_DIR }}
          file: ${{ env.MODULE_DIR }}/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
