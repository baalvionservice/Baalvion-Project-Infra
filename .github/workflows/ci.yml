name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.22'
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Dmaven.repo.local=${{ github.workspace }}/.m2/repository'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Root Dependencies
        run: npm ci
        
      - name: Run ESLint
        run: |
          npx eslint Backend/packages/sdk/src \
                      Backend/services/infrastructure \
                      Proxy-BaalvionStack/src \
                      admin-platform/src \
                      --max-warnings=0
                      
      - name: TypeScript Typecheck
        run: |
          npx tsc --noEmit --project Backend/packages/sdk/tsconfig.json
          for dir in Frontend/*/; do
            if [ -f "$dir/tsconfig.json" ]; then
              echo "Typechecking $dir..."
              npx tsc --noEmit --project "$dir/tsconfig.json" || exit 1
            fi
          done

  backend-go:
    name: Backend Go (Gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          
      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('Backend/gateway/go.sum', 'Backend/packages/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
            
      - name: Install Dependencies
        run: go mod download
        working-directory: Backend/gateway
        
      - name: Run Tests
        run: go test ./... -v -coverprofile=coverage.out
        working-directory: Backend/gateway
        
      - name: Build Gateway
        run: go build -o bin/gateway ./cmd/main.go
        working-directory: Backend/gateway

  backend-java:
    name: Backend Java (Financial Services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Cache Maven Repository
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            .m2/repository
          key: ${{ runner.os }}-java-maven-${{ hashFiles('Backend/services/commerce/financial-services-java/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-java-maven-
            
      - name: Run Tests & Build
        run: mvn clean verify -DskipTests=false
        working-directory: Backend/services/commerce/financial-services-java

  frontend-build:
    name: Frontend Apps Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(steps.extract-apps.outputs.dirs) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract App Directories from Config
        id: extract-apps
        run: |
          DIRS=$(node -p "require('./frontends.config.js').apps.map(a => a.cwd.replace('D:/Baalvion Projects/Frontend/', ''))" | tr '\n' ',' | sed 's/,$//')
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        working-directory: Frontend/${{ matrix.app }}
        
      - name: Determine Build Command
        id: build-cmd
        run: |
          if grep -q '"next"' Frontend/${{ matrix.app }}/package.json; then
            echo "cmd=next build" >> $GITHUB_OUTPUT
          elif grep -q '"vite"' Frontend/${{ matrix.app }}/package.json; then
            echo "cmd=vite build" >> $GITHUB_OUTPUT
          else
            echo "cmd=npm run build" >> $GITHUB_OUTPUT
          fi
          
      - name: Build App
        run: npm run ${{ steps.build-cmd.outputs.cmd }}
        working-directory: Frontend/${{ matrix.app }}
        
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.app }}-dist
          path: Frontend/${{ matrix.app }}/dist
          retention-days: 5

  integration-test:
    name: Integration Tests
    needs: [backend-go, backend-java, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Backend Integration Tests
        run: |
          echo "Running integration tests across services..."
          # Placeholder for actual test runner (e.g., docker-compose up, testcontainers, or custom script)
          go test ./... -tags=integration -v
          mvn verify -DskipTests=false
