name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.25'
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Dmaven.repo.local=${{ github.workspace }}/.m2/repository'

# Least-privilege default token; jobs that need more must opt in explicitly.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes and speed feedback.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile

      # Shared @baalvion/* packages publish their types from a gitignored dist/
      # (tsup output). Build them before any typecheck/lint that imports them.
      - name: Build Workspace Packages
        run: pnpm --filter "./Backend/packages/*" run build

      # Lint each package through its own toolchain (turbo runs the `lint`
      # script only where it exists, with the package's own eslint + config).
      # A root `pnpm exec eslint` cannot work: the root has no eslint, and the
      # target packages use incompatible config styles.
      # Blocking: the app-level lint debt for the two scoped apps has been
      # burned down (proxy-baalvionstack-web + baalvion-admin-platform are
      # clean — zero errors). Expand the --filter list as more apps are cleaned.
      - name: Run ESLint
        run: pnpm exec turbo run lint --filter=proxy-baalvionstack-web --filter=baalvion-admin-platform

      - name: TypeScript Typecheck
        run: |
          pnpm exec tsc --noEmit --project Backend/packages/sdk/tsconfig.json
          for dir in Frontend/*/; do
            if [ -f "$dir/tsconfig.json" ]; then
              echo "Typechecking $dir..."
              pnpm exec tsc --noEmit --project "$dir/tsconfig.json" || exit 1
            fi
          done

  backend-go:
    name: Backend Go (Gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # Track the module's declared toolchain (go 1.25.0) so coverage
          # instrumentation (`covdata`) matches; a 1.22 pin broke `go test`.
          go-version-file: Backend/gateway/go.mod
          
      - name: Cache Go Modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('Backend/gateway/go.sum', 'Backend/packages/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
            
      - name: Install Dependencies
        run: go mod download
        working-directory: Backend/gateway
        
      - name: Run Tests
        run: go test ./... -v -coverprofile=coverage.out
        working-directory: Backend/gateway
        
      - name: Build Gateway
        run: go build -o bin/gateway ./cmd/gateway
        working-directory: Backend/gateway

  backend-java:
    name: Backend Java (Financial Services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Cache Maven Repository
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            .m2/repository
          key: ${{ runner.os }}-java-maven-${{ hashFiles('Backend/services/commerce/financial-services-java/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-java-maven-
            
      - name: Run Tests & Build
        run: mvn clean verify -DskipTests=false
        working-directory: Backend/services/commerce/financial-services-java

  # Matrix inputs must be known at workflow setup — they cannot reference a
  # same-job `steps.*` output (that was the pre-existing startup_failure). So a
  # dedicated job discovers the frontend dirs and exposes them as a JSON output.
  discover-frontends:
    name: Discover Frontend Apps
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.extract-apps.outputs.dirs }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract App Directories from Config
        id: extract-apps
        run: |
          # Only include apps whose package.json is present in this checkout — a
          # guard so a missing app dir can't make the build step fall through to a
          # root `pnpm run build` that builds the entire monorepo.
          DIRS=$(node -p "JSON.stringify(require('./frontends.config.js').apps.map(a => a.cwd.replace('D:/Baalvion Projects/Frontend/', '')).filter(d => require('fs').existsSync('Frontend/' + d + '/package.json')))")
          echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"

  frontend-build:
    name: Frontend Apps Build
    runs-on: ubuntu-latest
    needs: discover-frontends
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover-frontends.outputs.dirs) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # Install at the workspace root so `workspace:*` deps link, not per-app.
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Build the shared @baalvion/* packages (gitignored tsup dist/) the apps
      # import, otherwise `next build` type-check fails to resolve them.
      - name: Build Workspace Packages
        run: pnpm --filter "./Backend/packages/*" run build

      - name: Determine Build Command
        id: build-cmd
        run: |
          if grep -q '"next"' Frontend/${{ matrix.app }}/package.json; then
            echo "cmd=exec next build" >> $GITHUB_OUTPUT
          elif grep -q '"vite"' Frontend/${{ matrix.app }}/package.json; then
            echo "cmd=exec vite build" >> $GITHUB_OUTPUT
          else
            echo "cmd=run build" >> $GITHUB_OUTPUT
          fi

      - name: Build App
        run: pnpm ${{ steps.build-cmd.outputs.cmd }}
        working-directory: Frontend/${{ matrix.app }}
        
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-${{ matrix.app }}-dist
          path: Frontend/${{ matrix.app }}/dist
          retention-days: 5

  security-cross-tenant:
    name: Security — Cross-Tenant RLS (R1)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: baalvion_db
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 12
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: baalvion_db
      PGPASSWORD: postgres
      # appConfig.js calls requireEnv('JWT_ACCESS_SECRET') at load time (pulled in
      # transitively by migrate.js -> models -> appConfig). Dummy value: this job
      # only runs migrations + an RLS probe, it never mints real tokens.
      JWT_ACCESS_SECRET: ci-dummy-access-secret-not-used-for-real-auth
    steps:
      - uses: actions/checkout@v6
      # trade-service is a regular folder in this repo (vendored from its former
      # submodule), so the normal checkout already includes it.
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      # trade-service declares @baalvion/auth-node as a pnpm `workspace:*` dep,
      # which npm cannot resolve in a standalone submodule checkout
      # (EUNSUPPORTEDPROTOCOL). migrate.js and the RLS probe don't use it, so
      # strip workspace-only deps and install the rest (pg, sequelize, …) with npm.
      - name: Install trade-service dependencies
        working-directory: Backend/services/commerce/trade-service
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));for(const f of ['dependencies','devDependencies','optionalDependencies']){if(!p[f])continue;for(const k of Object.keys(p[f]))if(String(p[f][k]).startsWith('workspace:'))delete p[f][k];}fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          npm install --no-package-lock --legacy-peer-deps
      # migrate.js -> models -> config/appConfig requires @baalvion/auth-node
      # (plain JS, main index.js, only needs jsonwebtoken which npm just installed).
      # Link it from the parent monorepo checkout so node can resolve the
      # workspace package we stripped above.
      - name: Link @baalvion/auth-node from the monorepo
        working-directory: Backend/services/commerce/trade-service
        run: |
          mkdir -p node_modules/@baalvion
          ln -sfn "$GITHUB_WORKSPACE/Backend/packages/auth-node" node_modules/@baalvion/auth-node
      - name: Create baalvion_app role (027)
        run: psql "postgresql://postgres:postgres@localhost:5432/baalvion_db" -v app_pw=ci_app_pw -f Backend/database/migrations/027_app_role.sql
      - name: Apply trade-service migrations (owner role)
        # --preserve-symlinks so the symlinked @baalvion/auth-node resolves its
        # own deps (jsonwebtoken) from trade-service/node_modules where npm put them.
        run: DB_USER=postgres DB_PASSWORD=postgres node --preserve-symlinks migrate.js
        working-directory: Backend/services/commerce/trade-service
      - name: Grant baalvion_app on freshly-created tables (027 re-run for defaults)
        run: psql "postgresql://postgres:postgres@localhost:5432/baalvion_db" -v app_pw=ci_app_pw -f Backend/database/migrations/027_app_role.sql
      - name: Run cross-tenant RLS probe (as baalvion_app)
        run: BAALVION_APP_PASSWORD=ci_app_pw node --test tests/rls-cross-tenant.test.mjs
        working-directory: Backend/services/commerce/trade-service

  # Static, DB-free guardrail: every tenant-scoped table (a table with a
  # tenant_id / org_id / organization_id column) across ALL services must ship
  # ENABLE + FORCE ROW LEVEL SECURITY + a tenant-isolation policy. A new tenant
  # table without RLS is a silent cross-tenant leak — this fails the build on it.
  tenant-rls-audit:
    name: Security — Tenant RLS Coverage Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      # trade-service is a regular folder in this repo (vendored from its former
      # submodule); its migrations come with the normal checkout and are part of
      # the coverage set.
      - name: Static tenant-isolation audit (fail-closed RLS on every tenant table)
        run: node Backend/scripts/tenant-isolation-audit.mjs
      - name: Audit guard + RLS SQL builder unit tests
        run: node --test Backend/scripts/tenant-isolation-audit.test.mjs Backend/packages/tenancy/test.smoke.js

  # Live proof on a real Postgres that the canonical enableRlsSql() policy (the
  # exact text every per-service RLS migration is generated from) fail-closed
  # isolates tenants and that the CR-8 bypass hardening holds for baalvion_app.
  tenant-rls-live:
    name: Security — Tenant RLS Live Probe
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: baalvion_db
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Create baalvion_app role (027)
        run: psql "postgresql://postgres:postgres@localhost:5432/baalvion_db" -v app_pw=ci_app_pw -f Backend/database/migrations/027_app_role.sql
      # The tenancy package does not declare pg (it ships only policy-builder SQL);
      # the live probe needs a driver. Install it out-of-band so the lockfile and
      # the package's dependency surface stay untouched.
      - name: Install pg for the probe
        working-directory: Backend/packages/tenancy
        run: npm install pg --no-save --no-audit --no-fund
      - name: Run live RLS isolation probe (as baalvion_app)
        working-directory: Backend/packages/tenancy
        env:
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: baalvion_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          BAALVION_APP_USER: baalvion_app
          BAALVION_APP_PASSWORD: ci_app_pw
        run: node --test tests/rls-live.test.mjs

  integration-test:
    name: Integration Tests
    needs: [backend-go, backend-java, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Backend Integration Tests
        run: |
          # No cross-service integration harness exists yet. The previous body ran
          # `go test ./...` and `mvn verify` from the repo root, which has no Go
          # module or Maven pom, so the step always errored once it was no longer
          # skipped. Per-service build/test coverage runs in the backend-go and
          # backend-java jobs. This placeholder stays green until a real harness
          # (docker-compose / testcontainers) is wired up.
          echo "Integration test harness pending — per-service checks run in backend-go / backend-java."

  node-package-tests:
    name: Node Package Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Workspace Packages
        run: pnpm --filter "./Backend/packages/*" run build
      # Runs each shared package's own test script (jest + node:test). @baalvion/upload
      # enforces a coverage threshold via its jest config — the gate to roll out per package
      # toward the 80% workspace target. Blocking: a failing or below-threshold package fails CI.
      - name: Run Package Tests (with coverage gates)
        run: pnpm --filter "./Backend/packages/*" run test

  dockerfile-lint:
    name: Dockerfile Lint (hadolint)
    runs-on: ubuntu-latest
    # Informational for now: surfaces Dockerfile issues without blocking (existing lint debt).
    # Promote into ci-success once the findings are burned down.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint all Dockerfiles (report-only)
        run: |
          find Backend Frontend -name Dockerfile \
            -not -path "*/node_modules/*" \
            -not -path "*/trade-service/*" | while read -r df; do
            echo "::group::$df"
            docker run --rm -i hadolint/hadolint hadolint --no-fail - < "$df" || true
            echo "::endgroup::"
          done

  deploy-compose-validate:
    name: Deploy Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate deploy docker-compose files
        run: |
          set -e
          for dir in deploy/*/; do
            compose="${dir}docker-compose.prod.yml"
            envfile="${dir}.env.prod.example"
            [ -f "$compose" ] || continue
            echo "Validating $compose"
            if [ -f "$envfile" ]; then
              docker compose --env-file "$envfile" -f "$compose" config -q
            else
              docker compose -f "$compose" config -q
            fi
          done

  # Build the production service images and scan them with Trivy. The scan STEP
  # fails (exit-code 1) on any fixable HIGH or CRITICAL OS/library CVE. Scope = the
  # curated set of images that are deploy-verified (repo-root context + `turbo prune`,
  # mirroring the deploy-* workflows). Extend the matrix as more Dockerfiles are
  # build-verified (same pattern as the frontend/eslint allow-list above).
  #
  # continue-on-error (informational, like dockerfile-lint): the gate is live and
  # red-on-findings, but does not yet block merges. It surfaced real pre-existing
  # image CVEs (turbo-prune ships some transitive deps un-pinned vs the root
  # pnpm.overrides; plus base-image OS CVEs). Promote into ci-success (add it to the
  # needs list + drop continue-on-error) once those are burned down — see
  # docs/RUNBOOK or the cert report's burn-down list.
  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-service
            file: Backend/services/identity/auth-service/Dockerfile
          - name: auth-gateway
            file: Backend/services/identity/auth-gateway/Dockerfile
          - name: dashboard-service
            file: Backend/services/platform/dashboard-service/Dockerfile
          - name: ctm-service
            file: Backend/services/ecosystem/ctm-service/Dockerfile
          - name: cms-service
            file: Backend/services/knowledge/cms-service/Dockerfile
          - name: proxy-service
            file: Backend/services/infrastructure/proxy-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build locally (load into the runner's docker, do NOT push) so Trivy scans the
      # exact artifact CI produced. Repo-root context: the Dockerfile runs `turbo prune`
      # over the pnpm workspace. GHA layer cache keeps re-runs fast.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: baalvion/${{ matrix.name }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.name }}

      # Image vulnerability scan. Fails the job (exit-code 1) on any FIXABLE HIGH or
      # CRITICAL OS/library CVE. `ignore-unfixed: true` keeps the gate actionable — it
      # does not block on CVEs that currently have no upstream fix. Pull the vuln DB
      # from the ECR mirror to avoid GHCR anonymous rate limits in CI.
      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db
        with:
          image-ref: baalvion/${{ matrix.name }}:ci
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

  # Aggregate gate required by branch protection on `main`.
  # A single stable context that turns red if ANY required job failed or was
  # cancelled — set this as the required status check in branch protection.
  ci-success:
    name: ci-success
    if: always()
    needs:
      - lint-and-typecheck
      - backend-go
      - backend-java
      - discover-frontends
      - frontend-build
      - security-cross-tenant
      - tenant-rls-audit
      - tenant-rls-live
      - integration-test
      - node-package-tests
      - deploy-compose-validate
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Upstream job results: $results"
          if echo "$results" | grep -qE 'failure|cancelled'; then
            echo "::error::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
