name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect changed services ────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth:    ${{ steps.filter.outputs.auth }}
      admin:   ${{ steps.filter.outputs.admin }}
      session: ${{ steps.filter.outputs.session }}
      oauth:   ${{ steps.filter.outputs.oauth }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'Backend/services/identity/auth-service/**'
            admin:
              - 'Backend/services/platform/admin-service/**'
            session:
              - 'Backend/services/identity/session-service/**'
            oauth:
              - 'Backend/services/identity/oauth-service/**'
            packages:
              - 'Backend/packages/**'

  # ── Architecture contract (always runs; required) ────────────────────────
  architecture-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # FULL pnpm workspace install (build model: Option A). engine-strict=false in
      # .npmrc lets the Node-22 frontend deps install as warnings on the Node-20 runner.
      - name: Install workspace (pnpm)
        run: pnpm install --frozen-lockfile
      - name: Install catalog tooling
        working-directory: Backend/catalog
        run: npm ci
      - name: Validate + enforce architecture contract
        run: pnpm run architecture:check
      - name: Build migrated template service end-to-end (about-service + @baalvion/* workspace deps)
        run: pnpm exec turbo run build --filter=about-service...
      - name: auth-node authority smoke test
        run: pnpm --filter @baalvion/auth-node test

  # ── Lint & type-check shared packages ─────────────────────────────────────
  packages:
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter='./Backend/packages/*'
      - run: pnpm turbo run type-check --filter='./Backend/packages/*'

  # ── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    needs: changes
    if: needs.changes.outputs.auth == 'true' || needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: baalvion_test
          POSTGRES_USER: baalvion
          POSTGRES_PASSWORD: test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter auth-service...
      - working-directory: Backend/services/identity/auth-service
        run: pnpm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: baalvion_test
          DB_USER: baalvion
          DB_PASSWORD: test_pass
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ── Admin Service ─────────────────────────────────────────────────────────
  admin-service:
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter admin-service...
      - name: Docker build smoke test (monorepo context = repo root)
        run: docker build -f Backend/services/platform/admin-service/Dockerfile -t admin-service:ci .

  # ── Session Service ───────────────────────────────────────────────────────
  session-service:
    needs: changes
    if: needs.changes.outputs.session == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter session-service...
      - name: Docker build smoke test (monorepo context = repo root)
        run: docker build -f Backend/services/identity/session-service/Dockerfile -t session-service:ci .

  # ── OAuth Service ─────────────────────────────────────────────────────────
  oauth-service:
    needs: changes
    if: needs.changes.outputs.oauth == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter oauth-service...
      - name: Docker build smoke test (monorepo context = repo root)
        run: docker build -f Backend/services/identity/oauth-service/Dockerfile -t oauth-service:ci .

  # ── Summary gate (required check for branch protection) ───────────────────
  ci-success:
    needs: [architecture-contract, auth-service, admin-service, session-service, oauth-service]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed" && exit 1
          fi
          echo "All CI checks passed"
