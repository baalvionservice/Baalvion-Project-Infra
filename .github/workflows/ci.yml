name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect changed services ────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth:    ${{ steps.filter.outputs.auth }}
      admin:   ${{ steps.filter.outputs.admin }}
      session: ${{ steps.filter.outputs.session }}
      oauth:   ${{ steps.filter.outputs.oauth }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'Backend/auth-service/**'
            admin:
              - 'Backend/admin-service/**'
            session:
              - 'Backend/session-service/**'
            oauth:
              - 'Backend/oauth-service/**'
            packages:
              - 'packages/**'

  # ── Lint & type-check shared packages ─────────────────────────────────────
  packages:
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter='./packages/*'
      - run: pnpm turbo run type-check --filter='./packages/*'

  # ── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    needs: changes
    if: needs.changes.outputs.auth == 'true' || needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: baalvion_test
          POSTGRES_USER: baalvion
          POSTGRES_PASSWORD: test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/auth-service/package-lock.json
      - working-directory: Backend/auth-service
        run: npm ci
      - working-directory: Backend/auth-service
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: baalvion_test
          DB_USER: baalvion
          DB_PASSWORD: test_pass
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ── Admin Service ─────────────────────────────────────────────────────────
  admin-service:
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/admin-service/package-lock.json
      - working-directory: Backend/admin-service
        run: npm ci
      - name: Docker build smoke test
        run: docker build -t admin-service:ci Backend/admin-service

  # ── Session Service ───────────────────────────────────────────────────────
  session-service:
    needs: changes
    if: needs.changes.outputs.session == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/session-service/package-lock.json
      - working-directory: Backend/session-service
        run: npm ci
      - name: Docker build smoke test
        run: docker build -t session-service:ci Backend/session-service

  # ── OAuth Service ─────────────────────────────────────────────────────────
  oauth-service:
    needs: changes
    if: needs.changes.outputs.oauth == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/oauth-service/package-lock.json
      - working-directory: Backend/oauth-service
        run: npm ci
      - name: Docker build smoke test
        run: docker build -t oauth-service:ci Backend/oauth-service

  # ── Summary gate (required check for branch protection) ───────────────────
  ci-success:
    needs: [auth-service, admin-service, session-service, oauth-service]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed" && exit 1
          fi
          echo "All CI checks passed"
