# Automatic release notes categorization (GitHub "Generate release notes").
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - dependabot[bot]
      - github-actions
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🔒 Security
      labels:
        - security
    - title: ⚡ Performance
      labels:
        - performance
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: 📖 Documentation
      labels:
        - documentation
    - title: 🏗️ Architecture & Platform
      labels:
        - architecture
    - title: 🧰 Other Changes
      labels:
        - "*"
