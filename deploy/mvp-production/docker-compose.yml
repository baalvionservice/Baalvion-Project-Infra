# Baalvion MVP — production stack
# Build context for every backend image is the MONOREPO ROOT.
# Run from the repo root:  docker compose -f deploy/mvp-production/docker-compose.yml --env-file deploy/mvp-production/.env.production up -d --build
#
# RDS / ElastiCache are EXTERNAL (managed). DB_HOST / REDIS_HOST point at them.
# Postgres + Redis are NOT defined here. Redpanda (Kafka) + Caddy are local sidecars.

name: baalvion-mvp

x-common-env: &common-env
  NODE_ENV: production
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME:-baalvion_db}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_SSL: ${DB_SSL:-require}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
  CORS_ORIGINS: ${CORS_ORIGINS}

x-restart: &restart
  restart: unless-stopped

networks:
  baalvion:
    driver: bridge

volumes:
  redpanda_data:
  caddy_data:
  caddy_config:

services:
  # ---------------------------------------------------------------- infra sidecars
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    <<: *restart
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks: [baalvion]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------- identity
  auth-service:
    image: baalvion/auth-service:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/identity/auth-service/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3001
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      API_BASE_URL: ${API_BASE_URL}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@baalvion.com}
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  rbac-service:
    image: baalvion/rbac-service:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/identity/rbac-service/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3055
      DB_SCHEMA: rbac
      # rbac-service READS this as INTERNAL_API_KEY; callers (commerce/inventory/order)
      # send the same value as RBAC_INTERNAL_API_KEY. Both must match.
      INTERNAL_API_KEY: ${RBAC_INTERNAL_API_KEY}
    depends_on: [auth-service]
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3055/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  audit-service:
    image: baalvion/audit-service:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/infrastructure/audit-service/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3032
      DB_SCHEMA: audit
      AUDIT_CONSUME_EVENTS: "true"
      EVENT_BUS_STREAM: baalvion:events
      INTERNAL_API_KEY: ${AUDIT_INTERNAL_KEY}
    depends_on: [auth-service]
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3032/readyz',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------- content
  cms-service:
    image: baalvion/cms-service:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/knowledge/cms-service/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3018
      DB_SCHEMA: cms
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CMS_SECRETS_KEY: ${CMS_SECRETS_KEY}
      CMS_BASE_URL: ${CMS_BASE_URL}
      EVENT_TRANSPORT: redis
      AWS_REGION: ${AWS_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    depends_on: [auth-service]
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3018/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------- commerce
  commerce-service:
    image: baalvion/commerce-service:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/commerce/commerce-service/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3012
      DB_SCHEMA: commerce
      RBAC_BASE_URL: http://rbac-service:3055
      RBAC_INTERNAL_API_KEY: ${RBAC_INTERNAL_API_KEY}
      RBAC_FAIL_MODE: closed
      MEDIA_DRIVER: s3
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    depends_on: [rbac-service]
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3012/readyz',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  inventory-service:
    image: baalvion/inventory-service:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/commerce/inventory-service/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3014
      DB_SCHEMA: inventory
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      INVENTORY_INTERNAL_KEY: ${INVENTORY_INTERNAL_KEY}
      INVENTORY_LOCK_TTL_MINUTES: 15
    depends_on: [auth-service]
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3014/readyz',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  order-service:
    image: baalvion/order-service:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/commerce/order-service/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3013
      DB_SCHEMA: orders
      # order-service captures Razorpay DIRECTLY (service/paymentProvider.js -> api.razorpay.com).
      # It does NOT call the Java payment-service. Keys resolve per-site from the CMS vault
      # (getPaymentCreds), FAIL-OPEN to these env keys when the vault has no entry.
      PAYMENT_PROVIDER: razorpay
      ALLOW_MOCK_PAYMENTS: "false"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_WEBHOOK_STRICT_AMOUNT: "true"
      # CMS vault (optional, enables admin-panel key rotation without redeploy):
      CMS_BASE_URL: ${CMS_BASE_URL}
      PAYMENT_SITE_SLUG: ${AMARISE_CMS_SLUG:-amarise-maison-avenue}
      CART_SESSION_SECRET: ${CART_SESSION_SECRET}
      RBAC_BASE_URL: http://rbac-service:3055
      RBAC_INTERNAL_API_KEY: ${RBAC_INTERNAL_API_KEY}
      RBAC_FAIL_MODE: closed
      INVENTORY_BASE_URL: http://inventory-service:3014
      INVENTORY_INTERNAL_KEY: ${INVENTORY_INTERNAL_KEY}
      NOTIFICATION_BASE_URL: http://notification-service:3031
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      LEDGER_INTERNAL_KEY: ""   # MVP: ledger posting fail-open (disabled)
    depends_on: [rbac-service, inventory-service, cms-service]
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3013/readyz',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # payment-service (Java) is a SEPARATE Razorpay gateway used by other sites (Proxy etc.).
  # The marketplace order->pay flow does NOT use it — order-service captures Razorpay itself.
  # Kept here because it is in MVP scope; to run the leanest storefront-only stack, drop this
  # service + redpanda and remove KAFKA_BROKERS. Its webhook path differs (see Caddyfile).
  payment-service:
    image: baalvion/payment-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../../Backend/services/commerce/financial-services-java
      dockerfile: Dockerfile
      args: { SERVICE: payment-service }
    <<: *restart
    environment:
      PORT: 3015
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-baalvion_db}
      # Flyway migrates AS the OWNER role (DDL); runtime datasource connects AS baalvion_app (RLS).
      # Without DB_MIGRATION_USER, application.yml falls back to postgres/postgres and Flyway fails.
      DB_MIGRATION_USER: ${DB_USER}
      DB_MIGRATION_PASSWORD: ${DB_PASSWORD}
      DB_APP_USER: ${DB_APP_USER:-baalvion_app}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      DB_JDBC_PARAMS: ${DB_JDBC_PARAMS:-?sslmode=require}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      KAFKA_BROKERS: redpanda:9092
      PSP_MOCK: "false"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_BASE_URL: ${RAZORPAY_BASE_URL:-https://api.razorpay.com}
      RAZORPAY_REPLAY_WINDOW_SECONDS: "600"
      CMS_BASE_URL: ${CMS_BASE_URL}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      redpanda: { condition: service_healthy }
    networks: [baalvion]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3015/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 70s

  # ---------------------------------------------------------------- gateway + workers
  auth-gateway:
    image: baalvion/auth-gateway:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/identity/auth-gateway/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3099
      AUTH_SERVICE_URL: http://auth-service:3001
      JWKS_URI: http://auth-service:3001/.well-known/jwks.json
      GATEWAY_SIGNING_SECRET: ${GATEWAY_SIGNING_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      BFF_ENFORCEMENT_MODE: hybrid
      SVC_RBAC: http://rbac-service:3055
      SVC_CMS: http://cms-service:3018
      SVC_COMMERCE: http://commerce-service:3012
      SVC_INVENTORY: http://inventory-service:3014
      SVC_ORDER: http://order-service:3013
      SVC_PAYMENT: http://payment-service:3015
    depends_on: [auth-service]
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3099/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  notification-service:
    image: baalvion/notification-service:${IMAGE_TAG:-prod-latest}
    build: { context: ../.., dockerfile: Backend/services/infrastructure/notification-service/Dockerfile }
    <<: *restart
    environment:
      <<: *common-env
      PORT: 3031
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@baalvion.com}
    networks: [baalvion]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3031/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------- frontends
  # NEXT_PUBLIC_* are BUILD-TIME values: Next.js inlines them into the client bundle during
  # `next build`. They MUST be passed under build.args (not environment:) — a runtime env var
  # of the same name has NO effect on an already-built bundle. Only genuine server-side runtime
  # vars (NODE_ENV, PORT, AUTH_PROXY_TARGET, CMS_PUBLIC_URL/SLUG) stay under environment:.
  admin-platform:
    image: baalvion/admin-platform:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Frontend/admin-platform/Dockerfile.deploy
      args:
        NEXT_PUBLIC_GATEWAY_URL: https://${DOMAIN_API}
        NEXT_PUBLIC_APP_URL: https://${DOMAIN_ADMIN}
        NEXT_PUBLIC_API_URL: https://${DOMAIN_API}/api/v1/infrastructure/proxy/v1
        NEXT_PUBLIC_ADMIN_API_URL: https://${DOMAIN_API}/api/v1/platform/admin/v1
        NEXT_PUBLIC_CMS_API_URL: https://${DOMAIN_API}/api/v1/knowledge/cms/api/v1
        NEXT_PUBLIC_AUTH_URL: https://${DOMAIN_API}/api/v1/identity/auth/v1/auth
        NEXT_PUBLIC_SESSION_API_URL: https://${DOMAIN_API}/api/v1/identity/session/v1
        NEXT_PUBLIC_APP_ENV: production
    <<: *restart
    environment:
      NODE_ENV: production
      PORT: 3030
    networks: [baalvion]

  about-web:
    image: baalvion/about-web:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Frontend/about-baalvion-main/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: https://${DOMAIN_WEB}
    <<: *restart
    environment:
      NODE_ENV: production
      PORT: 3020
      # Server-side runtime reads (NOT baked): about-web fetches the CMS delivery API per request.
      CMS_PUBLIC_URL: https://${DOMAIN_API}/api/cms/api/v1/public
      CMS_WEBSITE_SLUG: about-baalvion
    networks: [baalvion]

  amarise-web:
    image: baalvion/amarise-web:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Frontend/AmariseMaisonAvenue-main/Dockerfile
      args:
        NEXT_PUBLIC_COMMERCE_URL: https://${DOMAIN_API}/api/commerce/api/v1
        NEXT_PUBLIC_COMMERCE_API_URL: https://${DOMAIN_API}/api/commerce/api/v1
        NEXT_PUBLIC_ORDER_URL: https://${DOMAIN_API}/api/orders/api/v1
        NEXT_PUBLIC_INVENTORY_URL: https://${DOMAIN_API}/api/inventory/api/v1
        NEXT_PUBLIC_CMS_URL: https://${DOMAIN_API}/api/cms/api/v1
        NEXT_PUBLIC_CMS_WEBSITE_SLUG: amarise-maison-avenue
        NEXT_PUBLIC_STORE_ID: ${AMARISE_STORE_ID}
        NEXT_PUBLIC_APP_URL: https://${DOMAIN_SHOP}
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN_SHOP}
        # Custom media/CDN host for next/image remotePatterns + image CSP. Set to the S3/CloudFront
        # host serving product images, else next/image rejects remote product images.
        NEXT_PUBLIC_MEDIA_HOST: ${AMARISE_MEDIA_HOST}
    <<: *restart
    environment:
      NODE_ENV: production
      PORT: 3033
      # Server-side runtime: same-origin /auth-bff reverse-proxy target so the httpOnly refresh
      # cookie stays first-party (NOT a NEXT_PUBLIC value, so it is correct as runtime env).
      AUTH_PROXY_TARGET: https://${DOMAIN_API}/auth
    networks: [baalvion]

  # ---------------------------------------------------------------- ingress
  caddy:
    image: caddy:2.8-alpine
    <<: *restart
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [auth-gateway, admin-platform, about-web, amarise-web, payment-service]
    networks: [baalvion]
