# Baalvion MVP — Redis production config.
#
# RECOMMENDED: use AWS ElastiCache (Redis 7) instead of self-hosting. If you do,
# this file is informational — set the equivalents in the ElastiCache parameter
# group. The settings below matter because Redis carries BOTH durable work
# (BullMQ queues in notification/cms/order, the baalvion:events stream consumed
# by audit/notification) AND ephemeral cache. Do NOT evict the durable keyspace.

# ---- networking ----
bind 0.0.0.0
protected-mode yes
port 6379
tcp-keepalive 300
timeout 0

# ---- auth ----
# requirepass <set via REDIS_PASSWORD / ElastiCache AUTH token>

# ---- memory & eviction ----
# noeviction so BullMQ jobs and the event stream are never dropped under pressure.
# Size the instance for working set + queue backlog; alert at 75% used_memory.
maxmemory-policy noeviction
# maxmemory 1500mb   # set to ~75% of node memory if self-hosting

# ---- persistence (durability for queues/streams) ----
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
save 900 1
save 300 10
save 60 10000

# ---- streams ----
# baalvion:events is an XADD stream with consumer groups (audit, notification).
# Keep it bounded by app-side XTRIM/MAXLEN, not by eviction.

# ---- safety ----
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
