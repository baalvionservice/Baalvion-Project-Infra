# ─────────────────────────────────────────────────────────────────────────────
# CORE 3-SERVICE STACK — single EC2 host, Docker Compose.
#
# The reduced platform core. Three bounded-context services, the proven wiring:
#
#   auth-service   :3001  — Identity. Mints RS256 access tokens + serves JWKS.
#   cms-service    :3011  — Content/admin data + the per-tenant "Integrations & Keys" vault.
#   payment-service:3015  — Java PSP gateway. Razorpay + transactions; reads provider keys
#                           from the CMS vault (per website slug) over the internal network.
#
#   Auth flow (unchanged):  auth-service mints RS256 → cms-service verifies admin tokens via
#     JWKS → CMS public delivery (/api/v1/public/*) needs NO token and bypasses the gateway.
#   Money flow (unchanged): client → payment-service /v1/gateway/payments → CMS vault
#     (GET /api/v1/internal/integrations/{slug}, x-internal-secret) → Razorpay. Razorpay calls
#     back to /v1/gateway/webhooks/razorpay (HMAC-verified).
#
# Only Caddy binds public ports (80/443). Postgres, Redis, Kafka and every service are
# internal to the compose network. Kafka backs payment-service's transactional outbox +
# saga listeners (it is @EnableKafka) — infra, like Postgres/Redis.
#
#   CORE — run from the REPO ROOT:
#     docker compose --env-file deploy/core-stack/.env.prod \
#       -f deploy/core-stack/docker-compose.prod.yml up -d --build
#
#   ONE-SHOT tools (profile "tools"): cms schema migrate + website register (CMS-vault mode).
#   ADMIN console (profile "admin"): auth-gateway + admin-web — to manage the CMS vault UI.
#   See README.md for the full runbook (init-data.sh automates first-time DB setup).
# ─────────────────────────────────────────────────────────────────────────────

x-db: &db
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${POSTGRES_DB}
  DB_USER: ${POSTGRES_USER}
  DB_PASSWORD: ${POSTGRES_PASSWORD}
  # In-network Postgres has no TLS. Services default to requiring DB TLS in production
  # (correct for RDS), so disable it here — the DB is never publicly exposed. Set DB_SSL=true
  # (and DB_JDBC_PARAMS=?sslmode=require for the Java service) when DB_HOST moves to RDS.
  DB_SSL: ${DB_SSL:-false}

x-redis: &redis
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}

services:
  # ── Infra ───────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    # Shared DB for ~9 services now — give it the most headroom of the infra tier.
    mem_limit: 1g
    mem_reservation: 256m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Fresh-DB bootstrap (runs once, only when the data dir is empty): creates the
      # `postgres` role so payment-service Flyway V001 succeeds without a crash-loop.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "200mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 96m
    environment:
      # Cap the JVM heap so the cgroup mem_limit above is never breached (8 GB box).
      KAFKA_HEAP_OPTS: "-Xmx192m -Xms128m"
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    volumes:
      - zkdata:/var/lib/zookeeper/data
      - zklog:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 256m
    depends_on: [zookeeper]
    environment:
      # Cap the JVM heap so the cgroup mem_limit above is never breached (8 GB box).
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafkadata:/var/lib/kafka/data

  # ── Identity: mints RS256 tokens (needs the PRIVATE key) + serves JWKS ───────
  auth-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-auth-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/identity/auth-service/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    environment:
      <<: [*db, *redis]
      NODE_ENV: production
      PORT: "3001"
      # GC before the cgroup mem_limit so a leak self-corrects instead of OOM-killing (8 GB box).
      NODE_OPTIONS: --max-old-space-size=192
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      JWT_ALLOW_HS256_FALLBACK: "false"
      API_BASE_URL: https://${DOMAIN_API}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@baalvion.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      OTP_EMAIL_BRAND: ${OTP_EMAIL_BRAND:-Baalvion}
      # ── Passwordless email-OTP shared sign-in (auth.baalvion.com) ──────────────
      # Cross-subdomain SSO: scope the refresh cookie to .baalvion.com so one sign-in on the shared
      # surface is shared by every *.baalvion.com site. Empty (default) = host-only (current behaviour).
      REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN:-}
      # Cloudflare Turnstile secret (server-side siteverify). When SET, the captcha is ENFORCED on the
      # public OTP-request endpoint (fail-closed); when empty, it is skipped. Keep it SET in production.
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ── CMS: public delivery + admin API + per-tenant provider-key vault ─────────
  cms-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-cms-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/knowledge/cms-service/Dockerfile
    restart: unless-stopped
    mem_limit: 320m
    mem_reservation: 96m
    environment:
      <<: [*db, *redis]
      NODE_ENV: production
      PORT: "3011"
      NODE_OPTIONS: --max-old-space-size=256
      # Verify admin-API tokens against auth-service's JWKS (public delivery needs no token).
      BAALVION_JWKS_URI: http://auth-service:3001/.well-known/jwks.json
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      # Production guards — cms-service refuses to start with the dev defaults.
      # INTERNAL_SERVICE_SECRET also gates GET /api/v1/internal/integrations/{slug} (the vault
      # read), which payment-service calls with header x-internal-secret. They MUST match.
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      # CMS_SECRETS_KEY encrypts the stored PSP provider keys at rest (AES). If you rotate it
      # AFTER seeding the vault you must re-enter the keys (old ciphertext won't decrypt).
      CMS_SECRETS_KEY: ${CMS_SECRETS_KEY}
      CMS_BASE_URL: http://cms-service:3011/api/v1
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Content-delivery + admin API make several calls per page; the 200 default is too low.
      RATE_LIMIT_IP_MAX: ${RATE_LIMIT_IP_MAX:-5000}
      EVENT_TRANSPORT: redis
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3011/api/v1/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }

  # ── Payment: Java PSP gateway (Razorpay) → CMS vault → Razorpay ──────────────
  # Self-migrates on boot (Flyway, history table flyway_history_payment). Razorpay keys resolve
  # per-call: pass ?site=<slug> → CMS-vault keys for that tenant; omit → GLOBAL env keys below.
  payment-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-payment-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../../Backend/services/commerce/financial-services-java
      args:
        SERVICE: payment-service
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      <<: *db
      # Container-aware JVM: cap heap at ~65% of mem_limit (~333 MB) so the cgroup ceiling
      # above is never breached. SerialGC keeps GC overhead tiny on a small heap (8 GB box).
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65.0 -XX:+UseSerialGC -Xss512k"
      PORT: "3015"
      DB_JDBC_PARAMS: ${DB_JDBC_PARAMS:-}
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # payment-service → CMS vault (internal). Resolver fetches {CMS_BASE_URL}/internal/integrations/{slug}.
      CMS_BASE_URL: ${CMS_BASE_URL:-http://cms-service:3011/api/v1}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      # PSP_MOCK=true → deterministic create/refund ids, NO real charges (safe first boot).
      # Flip to false + real keys (env GLOBAL or CMS vault) to hit api.razorpay.com.
      PSP_MOCK: "${PSP_MOCK:-true}"
      # GLOBAL (single-tenant) Razorpay keys — used only when a call omits ?site=. For the
      # multi-tenant "keep current pattern" flow, leave these blank and store keys in the vault.
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      RAZORPAY_BASE_URL: ${RAZORPAY_BASE_URL:-https://api.razorpay.com}
      # Permissive by default (matches the proven stack): no IdP minted for the Java suite, and
      # the public surface is locked down at the Caddy edge (only initiate/status/webhook are
      # exposed; refund/capture/api/actuator are denied). To enforce RS256 here instead, set
      # APP_SECURITY_ENABLED=true AND OAUTH_JWK_SET_URI=http://auth-service:3001/.well-known/jwks.json
      # — but note that also 401s the Razorpay webhook (it carries an HMAC, not a JWT).
      APP_SECURITY_ENABLED: "${APP_SECURITY_ENABLED:-false}"
      # Shared DB: let the Java service baseline its own Flyway history on the shared schema.
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}"
      SPRING_FLYWAY_BASELINE_VERSION: "${SPRING_FLYWAY_BASELINE_VERSION:-0}"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
      cms-service: { condition: service_started }

  # ═══════════════════════ Platform + commerce services ═══════════════════════
  # Added onto the core: RBAC, audit, commerce, order, notification, trade. All share the one
  # Postgres (each owns an isolated SCHEMA) + Redis, verify RS256 tokens via auth-service's JWKS,
  # and stay INTERNAL to the compose network (no new public Caddy routes this round). Every block
  # has a hard mem_limit + a matching Node heap cap so the 8 GB box can't be OOM'd by one runaway.
  # Their schemas are created by the one-shot *-migrate jobs below (profile "tools") — see
  # init-extras.sh for the one-time, idempotent migration of these 5 schemas on a live DB.

  # ── Platform: RBAC — tenants / roles / policies. Owns the `rbac` schema. ─────
  rbac-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-rbac-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/identity/rbac-service/Dockerfile
    restart: unless-stopped
    mem_limit: 224m
    mem_reservation: 64m
    environment:
      <<: [*db, *redis]
      NODE_ENV: production
      PORT: "3055"
      DB_SCHEMA: rbac
      NODE_OPTIONS: --max-old-space-size=160
      BAALVION_JWKS_URI: http://auth-service:3001/.well-known/jwks.json
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # commerce/order call rbac internally with this key (RBAC_FAIL_MODE=closed → must match).
      INTERNAL_API_KEY: ${RBAC_INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3055/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }

  # ── Platform: immutable, hash-chained audit trail. Owns the `audit` schema. ──
  # Consumes domain events off the Redis event bus (baalvion:events) and records them WORM.
  audit-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-audit-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/infrastructure/audit-service/Dockerfile
    restart: unless-stopped
    mem_limit: 224m
    mem_reservation: 64m
    environment:
      <<: [*db, *redis]
      NODE_ENV: production
      PORT: "3032"
      DB_SCHEMA: audit
      NODE_OPTIONS: --max-old-space-size=160
      AUDIT_CONSUME_EVENTS: "true"
      EVENT_TRANSPORT: redis
      EVENT_BUS_STREAM: baalvion:events
      BAALVION_JWKS_URI: http://auth-service:3001/.well-known/jwks.json
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      CORS_ORIGINS: ${CORS_ORIGINS}
      INTERNAL_API_KEY: ${AUDIT_INTERNAL_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3032/readyz',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }

  # ── Commerce: catalog / pricing. Owns the `commerce` schema; RBAC-gated (fail-closed). ──
  commerce-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-commerce-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/commerce/commerce-service/Dockerfile
    restart: unless-stopped
    mem_limit: 320m
    mem_reservation: 96m
    environment:
      <<: [*db, *redis]
      NODE_ENV: production
      PORT: "3012"
      DB_SCHEMA: commerce
      NODE_OPTIONS: --max-old-space-size=256
      BAALVION_JWKS_URI: http://auth-service:3001/.well-known/jwks.json
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EVENT_TRANSPORT: redis
      RBAC_BASE_URL: http://rbac-service:3055
      RBAC_INTERNAL_API_KEY: ${RBAC_INTERNAL_API_KEY}
      RBAC_FAIL_MODE: closed
      # Media uploads need object storage; leave S3_* blank to serve content with uploads disabled.
      MEDIA_DRIVER: ${MEDIA_DRIVER:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-ap-south-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3012/readyz',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rbac-service: { condition: service_started }

  # ── Commerce: orders + checkout (live Razorpay, Node-direct). Owns `orders`. ──
  # NOTE: inventory-service is NOT in this slice — stock-lock / reservation calls will fail at
  # REQUEST time (the service still boots + serves /readyz). Deploy inventory-service to enable it.
  order-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-order-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/commerce/order-service/Dockerfile
    restart: unless-stopped
    mem_limit: 320m
    mem_reservation: 96m
    environment:
      <<: [*db, *redis]
      NODE_ENV: production
      PORT: "3013"
      DB_SCHEMA: orders
      NODE_OPTIONS: --max-old-space-size=256
      BAALVION_JWKS_URI: http://auth-service:3001/.well-known/jwks.json
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # LIVE payments: real Razorpay charges, server-priced, strict webhook amount-check, NO mock.
      PAYMENT_PROVIDER: razorpay
      ALLOW_MOCK_PAYMENTS: "false"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_WEBHOOK_STRICT_AMOUNT: "true"
      CART_SESSION_SECRET: ${CART_SESSION_SECRET}
      CMS_BASE_URL: ${CMS_BASE_URL:-http://cms-service:3011/api/v1}
      PAYMENT_SITE_SLUG: ${ORDER_PAYMENT_SITE_SLUG:-}
      RBAC_BASE_URL: http://rbac-service:3055
      RBAC_INTERNAL_API_KEY: ${RBAC_INTERNAL_API_KEY}
      RBAC_FAIL_MODE: closed
      INVENTORY_BASE_URL: ${INVENTORY_BASE_URL:-}
      INVENTORY_INTERNAL_KEY: ${INVENTORY_INTERNAL_KEY:-}
      NOTIFICATION_BASE_URL: http://notification-service:3031
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3013/readyz',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rbac-service: { condition: service_started }
      cms-service: { condition: service_started }

  # ── Platform: notifications (email via SMTP/Resend, BullMQ on Redis). No DB. ──
  notification-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-notification-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/infrastructure/notification-service/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    environment:
      <<: *redis
      NODE_ENV: production
      PORT: "3031"
      NODE_OPTIONS: --max-old-space-size=192
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@baalvion.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3031/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      redis: { condition: service_healthy }

  # ── Ecosystem: trade / GTI backend. Owns the `trade` schema (DB_SYNC off → migrated). ──
  # Boots standalone; gateway-signed identity flows need the admin-profile auth-gateway + a Caddy
  # route (not added this round). The GTI web UI (gti-web) is NOT included here.
  trade-service:
    image: ${IMAGE_PREFIX:-baalvion}/core-trade-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/commerce/trade-service/Dockerfile
    restart: unless-stopped
    mem_limit: 320m
    mem_reservation: 96m
    environment:
      <<: [*db, *redis]
      NODE_ENV: production
      PORT: "3025"
      SERVICE_NAME: trade-service
      DB_SYNC: "false"
      NODE_OPTIONS: --max-old-space-size=256
      REDIS_URL: redis://redis:6379
      BAALVION_JWKS_URI: http://auth-service:3001/.well-known/jwks.json
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      GATEWAY_SIGNING_SECRET: ${GATEWAY_SIGNING_SECRET:-}
      CORS_ORIGINS: ${TRADE_CORS_ORIGINS:-${CORS_ORIGINS}}
      RATE_LIMIT_IP_MAX: ${RATE_LIMIT_IP_MAX:-120}
      # Firebase Admin SDK is OPTIONAL — trade-service boots without it (powers a feature subset).
      FIREBASE_PROJECT_ID: ${TRADE_FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${TRADE_FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${TRADE_FIREBASE_PRIVATE_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3025/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 50s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }

  # ── ONE-SHOT: create the `cms` schema tables (Sequelize migrations). ─────────
  # Built to the Dockerfile's `installer` target (keeps devDeps + migrations the slim image strips).
  cms-migrate:
    profiles: ["tools"]
    # On the EC2 host this is PULLED from ECR (core-cms-tools); locally `--build` builds it.
    image: ${IMAGE_PREFIX:-baalvion}/core-cms-tools:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/knowledge/cms-service/Dockerfile
      target: installer
    working_dir: /repo/Backend/services/knowledge/cms-service
    command: ["sh", "-c", "pnpm exec sequelize-cli db:migrate"]
    environment:
      <<: *db
      NODE_ENV: production
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  # ── ONE-SHOT (CMS-vault mode only): register the payment website tenant. ─────
  # Needed only if you resolve Razorpay keys PER-SITE from the vault (call with ?site=<slug>).
  # Pass CMS_ORG_ID + CMS_CREATED_BY = the orgId/userId printed by bootstrapSuperAdmin (init-data.sh
  # does this for you). Skip entirely if you use GLOBAL env keys (single-tenant).
  cms-register:
    profiles: ["tools"]
    # On the EC2 host this is PULLED from ECR (core-cms-tools); locally `--build` builds it.
    image: ${IMAGE_PREFIX:-baalvion}/core-cms-tools:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/knowledge/cms-service/Dockerfile
      target: installer
    working_dir: /repo/Backend/services/knowledge/cms-service
    command: ["node", "scripts/registerProductionWebsites.cjs"]
    environment:
      <<: *db
      NODE_ENV: production
      CMS_ORG_ID: ${CMS_ORG_ID:-}
      CMS_CREATED_BY: ${CMS_CREATED_BY:-}
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  # ═══════════ ONE-SHOT migrations for the added services (profile "tools") ═════════
  # These NEVER auto-start. Run once on a fresh schema (init-extras.sh chains them in order).
  # All are idempotent: rbac/audit/trade use CREATE … IF NOT EXISTS (+ trade tracks
  # trade.schema_migrations); commerce/order use sequelize-cli (tracks SequelizeMeta).

  # rbac + audit ship RAW .sql — apply with psql straight from the reused postgres:16 image
  # (no extra build), mounting the repo's migrations dir read-only. PG* env auto-connects psql.
  rbac-migrate:
    profiles: ["tools"]
    image: postgres:16
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    entrypoint: ["bash", "-c"]
    command:
      - "psql -f /migs/001_rbac_schema.sql && psql -f /migs/002_permissions.sql && psql -f /migs/003_policies.sql && psql -v ON_ERROR_STOP=1 -f /migs/004_rls_tenant_isolation.sql"
    volumes:
      - ../../Backend/services/identity/rbac-service/migrations:/migs:ro
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  audit-migrate:
    profiles: ["tools"]
    image: postgres:16
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    entrypoint: ["bash", "-c"]
    command:
      - "psql -f /migs/001_audit_schema.sql && psql -v ON_ERROR_STOP=1 -f /migs/002_rls_tenant_isolation.sql"
    volumes:
      - ../../Backend/services/infrastructure/audit-service/migrations:/migs:ro
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  # commerce + order migrate via sequelize-cli → need the `installer` target (keeps devDeps the
  # slim runtime image strips). Same pattern as cms-migrate; pulled from ECR on the host.
  commerce-migrate:
    profiles: ["tools"]
    image: ${IMAGE_PREFIX:-baalvion}/core-commerce-tools:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/commerce/commerce-service/Dockerfile
      target: installer
    working_dir: /repo/Backend/services/commerce/commerce-service
    command: ["sh", "-c", "pnpm exec sequelize-cli db:migrate"]
    environment:
      <<: *db
      NODE_ENV: production
      DB_SCHEMA: commerce
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  order-migrate:
    profiles: ["tools"]
    image: ${IMAGE_PREFIX:-baalvion}/core-order-tools:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/commerce/order-service/Dockerfile
      target: installer
    working_dir: /repo/Backend/services/commerce/order-service
    command: ["sh", "-c", "pnpm exec sequelize-cli db:migrate"]
    environment:
      <<: *db
      NODE_ENV: production
      DB_SCHEMA: orders
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  # trade migrate.js uses only PROD deps (pg + sequelize) → reuse the runtime image, override CMD.
  trade-migrate:
    profiles: ["tools"]
    image: ${IMAGE_PREFIX:-baalvion}/core-trade-service:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/commerce/trade-service/Dockerfile
    working_dir: /app
    command: ["node", "migrate.js"]
    environment:
      <<: *db
      NODE_ENV: production
      DB_SYNC: "false"
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  # ── BFF cookie gateway for the admin console (HttpOnly cookies ↔ RS256). ─────
  auth-gateway:
    profiles: ["admin"]
    image: ${IMAGE_PREFIX:-baalvion}/core-auth-gateway:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Backend/services/identity/auth-gateway/Dockerfile
    restart: unless-stopped
    environment:
      <<: *redis
      NODE_ENV: production
      PORT: "3099"
      AUTH_SERVICE_URL: http://auth-service:3001/v1/auth
      JWKS_URI: http://auth-service:3001/.well-known/jwks.json
      JWT_ISSUER: ${JWT_ISSUER:-baalvion-auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-baalvion-platform}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      CORS_ORIGINS: https://${DOMAIN_ADMIN}
      BFF_ENFORCEMENT_MODE: hybrid
      GATEWAY_SIGNING_SECRET: ${GATEWAY_SIGNING_SECRET}
      COOKIE_ACCESS_NAME: baalvion_access
      COOKIE_REFRESH_NAME: baalvion_refresh
      CSRF_COOKIE_NAME: csrf_token
      COOKIE_SAMESITE: lax
      # Route the console's CMS calls through the gateway (it forwards the Bearer).
      SVC_CMS: http://cms-service:3011
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3099/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      auth-service: { condition: service_started }
      cms-service: { condition: service_started }
      redis: { condition: service_healthy }

  # ── Admin console (Next.js standalone). NEXT_PUBLIC_* are baked at BUILD. ─────
  # Use this UI to enter Razorpay keys into the CMS "Integrations & Keys" vault per website.
  admin-web:
    profiles: ["admin"]
    image: ${IMAGE_PREFIX:-baalvion}/core-admin-web:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Frontend/admin-platform/Dockerfile.deploy
      args:
        NEXT_PUBLIC_APP_URL: https://${DOMAIN_ADMIN}
        NEXT_PUBLIC_GATEWAY_URL: /auth-bff
        NEXT_PUBLIC_CMS_API_URL: https://${DOMAIN_ADMIN}/api-bff/knowledge/cms/api/v1
        NEXT_PUBLIC_AUTH_URL: https://${DOMAIN_ADMIN}/auth-bff
        NEXT_PUBLIC_APP_ENV: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3030"
      HOSTNAME: 0.0.0.0
      # Server-side rewrites proxy /auth-bff + /api-bff to the internal gateway.
      NEXT_PUBLIC_GATEWAY_URL: http://auth-gateway:3099
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3030',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      auth-gateway: { condition: service_started }

  # ── Shared sign-in surface (auth.baalvion.com) — brand-aware passwordless email-OTP ──
  # The single hosted "Sign in" surface every Baalvion site delegates to. Next.js standalone,
  # mirrors admin-web: NEXT_PUBLIC_* are baked at BUILD (Turnstile site key, allowed return hosts).
  # The browser only ever sees same-origin /auth-bff/*, which Caddy terminates at the EDGE →
  # auth-service (so the .baalvion.com refresh cookie flows). Public surface → default profile.
  auth-baalvion:
    image: ${IMAGE_PREFIX:-baalvion}/core-auth-baalvion:${IMAGE_TAG:-prod-latest}
    build:
      context: ../..
      dockerfile: Frontend/auth-baalvion/Dockerfile
      args:
        # SITE key is public (safe to bake). Its SECRET counterpart is TURNSTILE_SECRET_KEY on
        # auth-service. Leave blank to ship without a captcha widget (server check also skipped).
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        # Extra (non-baalvion.com) return_to apexes, comma-separated. *.baalvion.com is always allowed.
        NEXT_PUBLIC_ALLOWED_RETURN_HOSTS: ${AUTH_ALLOWED_RETURN_HOSTS:-}
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    environment:
      NODE_ENV: production
      PORT: "3055"
      HOSTNAME: 0.0.0.0
      # Belt-and-suspenders: the app's own next.config rewrite also targets auth-service, but Caddy
      # terminates /auth-bff/* at the edge first (below), so this is only a fallback for direct hits.
      AUTH_SERVICE_URL: http://auth-service:3001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3055',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      auth-service: { condition: service_started }

  # ── Edge: TLS termination + the ONLY public ports. Locks down the surface. ───
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_API: ${DOMAIN_API}
      DOMAIN_CMS: ${DOMAIN_CMS}
      DOMAIN_ADMIN: ${DOMAIN_ADMIN}
      # Shared sign-in surface host. Defaulted so an existing host without this key set still parses
      # (Caddy retries ACME for it harmlessly until DNS for auth.baalvion.com points here).
      DOMAIN_AUTH: ${DOMAIN_AUTH:-auth.baalvion.com}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      auth-service: { condition: service_started }
      cms-service: { condition: service_started }
      payment-service: { condition: service_started }
      auth-baalvion: { condition: service_started }

volumes:
  # EXTERNAL on purpose: production data must survive `docker compose down -v` and any
  # stack re-creation. Declaring it external means compose will NEVER delete it. deploy.sh
  # `docker volume create`s it (idempotent) so a first-time host still works with no manual
  # step. NEVER `docker volume rm core-stack_pgdata` to "reset" — it is the live prod DB.
  pgdata:
    external: true
    name: core-stack_pgdata
  redisdata:
  zkdata:
  zklog:
  kafkadata:
  caddy_data:
  caddy_config:
