# Baalvion OS infra — Keycloak (SSO) + MinIO (object storage)
# Reuses the shared Postgres/Redis already defined in docker-compose.yml.
# Start:  docker compose -f docker-compose.baalvion-os.yml up -d
# (requires the external network: docker network create baalvion-net)

services:
  # ── Keycloak (SSO IdP) — http://localhost:8088  (admin / admin) ─────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: baalvion-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      # Confidential client secret for the baalvion-os client — substituted into
      # realm-baalvion.json's ${KEYCLOAK_BAALVION_OS_SECRET} placeholder on import.
      KEYCLOAK_BAALVION_OS_SECRET: ${KEYCLOAK_BAALVION_OS_SECRET}
      # Dev uses the embedded H2 store. For production set:
      #   KC_DB=postgres
      #   KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      #   KC_DB_USERNAME / KC_DB_PASSWORD
    ports:
      - "8088:8080"
    volumes:
      - ./docker/keycloak/realm-baalvion.json:/opt/keycloak/data/import/realm-baalvion.json:ro
      - keycloak_data:/opt/keycloak/data
    networks:
      - baalvion-net

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  # API: http://localhost:9000   Console: http://localhost:9001 (baalvion / baalvion_dev_pass)
  minio:
    image: minio/minio:latest
    container_name: baalvion-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: baalvion
      MINIO_ROOT_PASSWORD: baalvion_dev_pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - baalvion-net

  # ── One-shot: create the default bucket ─────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: baalvion-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 baalvion baalvion_dev_pass; do sleep 2; done;
      mc mb --ignore-existing local/baalvion;
      mc anonymous set download local/baalvion/public;
      echo 'MinIO bucket ready';
      "
    networks:
      - baalvion-net

volumes:
  keycloak_data:
  minio_data:

networks:
  baalvion-net:
    external: true
    name: baalvion-net
