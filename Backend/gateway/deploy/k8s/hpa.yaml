apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: baalvion-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: baalvion-gateway
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 75 }
    # Connection-aware scaling (requires prometheus-adapter exposing the
    # gateway's active_connections gauge as a custom pod metric):
    - type: Pods
      pods:
        metric: { name: active_connections }
        target: { type: AverageValue, averageValue: "2000" }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - { type: Percent, value: 25, periodSeconds: 60 }
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - { type: Percent, value: 100, periodSeconds: 30 }
