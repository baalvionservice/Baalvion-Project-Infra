# BAALVION API GATEWAY — Traefik static config.
# The ONE public API ingress. Backend services have NO public entrypoint; they
# are reachable only on the internal network via the routes in dynamic.yml.

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint: { to: websecure, scheme: https }
  websecure:
    address: ":443"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# TLS: wire ACME (Let's Encrypt) for api.baalvion.com in production, or mount a
# cert for local. Left minimal here so the routing table is the reviewable unit.
# certificatesResolvers:
#   le:
#     acme:
#       email: infra@baalvion.com
#       storage: /etc/traefik/acme.json
#       httpChallenge: { entryPoint: web }

api:
  dashboard: true
  insecure: false

log:
  level: INFO
accessLog: {}
