# Defaults — a service overrides only what differs (image, port, replicas, deps).
nameOverride: ""
namespace: baalvion
division: platform-core
tier: tier-2

image:
  repository: ghcr.io/baalvion/service
  tag: latest
  pullPolicy: IfNotPresent

command: []        # e.g. ["node", "server.js"]
containerPort: 3000

replicas:
  min: 2
  max: 10
  targetCPUUtilization: 70

resources:
  requests: { cpu: "100m", memory: 256Mi }
  limits:   { cpu: "1", memory: 1Gi }

# Platform standard env — wired to the shared secrets/config (created by ESO).
env:
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
  IDENTITY_JWKS_URL: https://identity.baalvion.com/.well-known/jwks.json
  EVENT_BUS_TRANSPORT: nats
  NATS_URL: nats://nats.baalvion-eventbus.svc.cluster.local:4222
secretRefs:
  - name: DATABASE_URL
    secret: { name: service-secrets, key: database-url }
  - name: REDIS_URL
    secret: { name: service-secrets, key: redis-url }

probes:
  readinessPath: /readyz
  livenessPath: /healthz

metrics:
  enabled: true
  path: /metrics

# Zero-trust: deny-all by default; only the listed sources may reach this service.
networkPolicy:
  enabled: true
  allowFrom:
    - traefik               # north-south ingress (single gateway — ADR-0004 superseded → Traefik)
    - baalvion              # same-namespace mesh peers

podDisruptionBudget:
  minAvailable: 1
