<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="K8s Overlays — Baalvion Platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="0.55" stop-color="#0C1228"/>
      <stop offset="1" stop-color="#0A1530"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.80" cy="0.40" r="0.62" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#4F46E5" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0A0E1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Card -->
  <rect x="0" y="0" width="1280" height="300" rx="26" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="300" rx="26" fill="url(#grid)"/>
  <rect x="0" y="0" width="1280" height="300" rx="26" fill="url(#glow)"/>
  <rect x="0.75" y="0.75" width="1278.5" height="298.5" rx="25.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Federated-network motif (right) -->
  <g transform="translate(1052,150)" opacity="0.95">
    <circle r="124" fill="none" stroke="#FBBF24" stroke-opacity="0.10" stroke-width="1"/>
    <circle r="80" fill="none" stroke="#6366F1" stroke-opacity="0.18" stroke-width="1"/>
    <g stroke="url(#accent)" stroke-opacity="0.55" stroke-width="1.5">
      <line x1="0" y1="0" x2="0" y2="-80"/>
      <line x1="0" y1="0" x2="76" y2="25"/>
      <line x1="0" y1="0" x2="47" y2="65"/>
      <line x1="0" y1="0" x2="-47" y2="65"/>
      <line x1="0" y1="0" x2="-76" y2="25"/>
    </g>
    <g fill="#0C1228" stroke="url(#accent)" stroke-width="2">
      <circle cx="0" cy="-80" r="8"/>
      <circle cx="76" cy="25" r="8"/>
      <circle cx="47" cy="65" r="8"/>
      <circle cx="-47" cy="65" r="8"/>
      <circle cx="-76" cy="25" r="8"/>
    </g>
    <g fill="#FBBF24">
      <circle cx="0" cy="-80" r="3"/>
      <circle cx="76" cy="25" r="3"/>
      <circle cx="47" cy="65" r="3"/>
      <circle cx="-47" cy="65" r="3"/>
      <circle cx="-76" cy="25" r="3"/>
    </g>
    <circle r="30" fill="#FBBF24" fill-opacity="0.12"/>
    <circle r="16" fill="url(#core)"/>
  </g>

  <!-- Content (left) -->
  <text x="82" y="84" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="600" letter-spacing="3.5" fill="#FBBF24">BAALVION&#160;&#183;&#160;INFRASTRUCTURE</text>
  <text x="78" y="168" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="800" letter-spacing="0.5" fill="#FFFFFF">K8s Overlays</text>
  <rect x="82" y="190" width="128" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="82" y="230" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="500" fill="#E2E8F0">Multi-region Kustomize &#183; active-active edge clusters</text>
  <text x="82" y="266" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="12.5" font-weight="600" letter-spacing="2" fill="#8B95B2">BAALVION&#160;&#160;PLATFORM</text>
</svg>
