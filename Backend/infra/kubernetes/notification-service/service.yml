apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: baalvion
  labels:
    app:  notification-service
    tier: platform
spec:
  # Only the API component is reachable via Service; workers have no inbound traffic
  selector:
    app:       notification-service
    component: api
  ports:
    - name:       http
      port:       3031
      targetPort: 3031
    - name:       metrics
      port:       9467
      targetPort: 9467
  type: ClusterIP
