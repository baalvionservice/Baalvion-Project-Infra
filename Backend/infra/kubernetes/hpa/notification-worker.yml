apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-worker-hpa
  namespace: baalvion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       notification-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type:          Pods
          value:         2
          periodSeconds: 60
    scaleDown:
      # Slow scale-down: workers drain queues — do not kill pods quickly
      stabilizationWindowSeconds: 600
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 180
