  # ── Upload ────────────────────────────────────────────────────────────────────
  /upload/presign:
    post:
      tags: [Upload]
      summary: Get a presigned S3 PUT URL for direct client upload
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, contentType]
              properties:
                filename:      { type: string }
                contentType:   { type: string }
                module:        { type: string, description: Logical bucket prefix, e.g. avatars, documents }
                fileSizeBytes: { type: integer }
      responses:
        '200':
          description: Presigned upload URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:       { type: string, format: uri }
                  key:       { type: string }
                  expiresAt: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /upload/signed/{key}:
    get:
      tags: [Upload]
      summary: Get a presigned S3 GET URL for a stored object
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
          description: Full S3 object key (may contain slashes)
      responses:
        '200':
          description: Presigned download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:       { type: string, format: uri }
                  expiresAt: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /upload/{key}:
    delete:
      tags: [Upload]
      summary: Permanently delete an S3 object
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
          description: Full S3 object key
