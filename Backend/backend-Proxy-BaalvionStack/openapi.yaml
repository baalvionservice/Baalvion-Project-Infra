                scopes:    { type: array, items: { type: string } }
      responses:
        '201':
          description: API key created — key value shown only once
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiKey'
                  - type: object
                    properties:
                      key: { type: string, description: Full key shown once only }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Delete an API key (requires apikey:revoke)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: API key deleted
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api-keys/{id}/revoke:
    post:
      tags: [API Keys]
      summary: Revoke an API key without deleting it (requires apikey:revoke)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Key revoked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Security ──────────────────────────────────────────────────────────────────
  /security/sessions:
