      tags: [Support]
      summary: Create a support ticket (requires support:view)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, message]
              properties:
                subject:  { type: string }
                message:  { type: string }
                priority: { type: string, enum: [low, medium, high, urgent] }
                category: { type: string }
