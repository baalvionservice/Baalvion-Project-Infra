openapi: '3.0.3'
info:
  title: Baalvion Proxy / NetStack API
  version: '1.0.0'
  description: Main proxy and platform management backend — auth, users, proxies, billing, analytics, support, admin.
servers:
  - url: http://localhost:4000/v1
    description: Development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:   { type: string }
        message: { type: string }

    MessageResponse:
      type: object
      properties:
        message: { type: string }

    PaginatedMeta:
      type: object
      properties:
        total:   { type: integer }
        page:    { type: integer }
        perPage: { type: integer }

    User:
      type: object
      properties:
        id:        { type: string, format: uuid }
        email:     { type: string, format: email }
        firstName: { type: string }
        lastName:  { type: string }
        role:      { type: string }
        status:    { type: string, enum: [active, suspended, banned] }
        createdAt: { type: string, format: date-time }

    Org:
      type: object
      properties:
        id:        { type: string, format: uuid }
        name:      { type: string }
        plan:      { type: string }
        status:    { type: string }
        createdAt: { type: string, format: date-time }

    Proxy:
      type: object
      properties:
        id:       { type: string, format: uuid }
        host:     { type: string }
        port:     { type: integer }
        protocol: { type: string, enum: [http, https, socks5] }
        country:  { type: string }
        status:   { type: string, enum: [active, inactive, rotating] }

    Plan:
      type: object
      properties:
        id:       { type: string }
        name:     { type: string }
        price:    { type: number }
        currency: { type: string }
        interval: { type: string, enum: [monthly, yearly] }
        features: { type: array, items: { type: string } }

    Invoice:
      type: object
      properties:
        id:        { type: string }
        amount:    { type: number }
        currency:  { type: string }
        status:    { type: string }
        createdAt: { type: string, format: date-time }
        pdfUrl:    { type: string, format: uri }

    Ticket:
      type: object
      properties:
        id:        { type: string, format: uuid }
        subject:   { type: string }
        status:    { type: string, enum: [open, pending, closed] }
        priority:  { type: string, enum: [low, medium, high, urgent] }
        createdAt: { type: string, format: date-time }

    ApiKey:
      type: object
      properties:
        id:        { type: string, format: uuid }
        name:      { type: string }
        prefix:    { type: string }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time, nullable: true }

    AuditLog:
      type: object
      properties:
        id:        { type: string, format: uuid }
        action:    { type: string }
        actorId:   { type: string, format: uuid }
        targetId:  { type: string, nullable: true }
        metadata:  { type: object }
        createdAt: { type: string, format: date-time }

    Provider:
      type: object
      properties:
        id:     { type: string, format: uuid }
        name:   { type: string }
        type:   { type: string }
        status: { type: string, enum: [active, inactive, degraded] }
        weight: { type: integer }

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Unprocessable Entity — validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName]
              properties:
                email:     { type: string, format: email }
                password:  { type: string, minLength: 8 }
                firstName: { type: string }
                lastName:  { type: string }
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:     { type: string }
                  accessToken: { type: string }
                  user:        { $ref: '#/components/schemas/User' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and obtain tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string }
                mfaCode:  { type: string, description: TOTP code if MFA is enabled }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:  { type: string }
                  expiresIn:    { type: integer }
                  user:         { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate current session and refresh token
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange refresh token (cookie) for a new access token
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  expiresIn:   { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send a password-reset e-mail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Reset link sent (response identical regardless of whether e-mail exists)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token from e-mail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:    { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify e-mail address with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: E-mail verified
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }

  /auth/mfa/enable:
    post:
      tags: [Auth]
      summary: Enable TOTP MFA for the current user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: MFA setup secret and QR code URI
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:    { type: string }
                  otpauthUrl: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Confirm and activate MFA using a TOTP code
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, description: 6-digit TOTP }
      responses:
        '200':
          description: MFA verified and enabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/mfa/disable:
    post:
      tags: [Auth]
      summary: Disable MFA for the current user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: MFA disabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/validate-invite:
    get:
      tags: [Auth]
      summary: Validate an invitation token
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Token details
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:     { type: boolean }
                  email:     { type: string }
                  orgName:   { type: string }
                  expiresAt: { type: string, format: date-time }
        '400': { $ref: '#/components/responses/ValidationError' }

  /auth/accept-invite:
    post:
      tags: [Auth]
      summary: Accept an organisation invitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:     { type: string }
                password:  { type: string, minLength: 8 }
                firstName: { type: string }
                lastName:  { type: string }
      responses:
        '200':
          description: Invitation accepted and account created/linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  user:        { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }

  # ── Users ─────────────────────────────────────────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Get the authenticated user's profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/change-password:
    post:
      tags: [Users]
      summary: Change the authenticated user's password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword:     { type: string, minLength: 8 }
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /users:
    get:
      tags: [Users]
      summary: List users in the organisation (requires user:view)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: perPage
          schema: { type: integer, default: 20 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/User' } }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /users/invite:
    post:
      tags: [Users]
      summary: Invite a new user to the organisation (requires user:invite)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role:  { type: string }
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /users/{id}:
    put:
      tags: [Users]
      summary: Update a user (requires user:update)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName:  { type: string }
                email:     { type: string, format: email }
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Users]
      summary: Delete a user (requires user:delete)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: User deleted
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{id}/role:
    put:
      tags: [Users]
      summary: Update a user's role (requires user:update)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string }
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /users/{id}/suspend:
    post:
      tags: [Users]
      summary: Suspend a user account (requires user:suspend)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User suspended
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /users/{id}/reactivate:
    post:
      tags: [Users]
      summary: Reactivate a suspended user (requires user:suspend)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User reactivated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ── Proxies ───────────────────────────────────────────────────────────────────
  /proxies:
    get:
      tags: [Proxies]
      summary: List proxies (requires proxy:view)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: perPage
          schema: { type: integer, default: 20 }
        - in: query
          name: country
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive, rotating] }
      responses:
        '200':
          description: Proxy list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Proxy' } }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      tags: [Proxies]
      summary: Create a proxy (requires proxy:create)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host, port, protocol]
              properties:
                host:     { type: string }
                port:     { type: integer }
                protocol: { type: string, enum: [http, https, socks5] }
                country:  { type: string }
                username: { type: string }
                password: { type: string }
      responses:
        '201':
          description: Proxy created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proxy' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /proxies/test:
    post:
      tags: [Proxies]
      summary: Test connectivity through a proxy (requires proxy:view)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                proxyId:   { type: string, format: uuid }
                targetUrl: { type: string, format: uri }
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:    { type: boolean }
                  latencyMs:  { type: number }
                  statusCode: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /proxies/export:
    post:
      tags: [Proxies]
      summary: Export proxy list (requires proxy:view)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:  { type: string, enum: [csv, json, txt] }
                filters: { type: object }
      responses:
        '200':
          description: Export file
          content:
            text/csv:
              schema: { type: string }
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Proxy' } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /proxies/{id}:
    get:
      tags: [Proxies]
      summary: Get a single proxy (requires proxy:view)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Proxy details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proxy' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Proxies]
      summary: Update a proxy (requires proxy:update)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Updated proxy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proxy' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Proxies]
      summary: Delete a proxy (requires proxy:delete)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Proxy deleted
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /proxies/{id}/rotate:
    post:
      tags: [Proxies]
      summary: Rotate proxy credentials/IP (requires proxy:update)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Rotation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  newHost: { type: string }
                  newPort: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /proxies/{id}/logs:
    get:
      tags: [Proxies]
      summary: Get usage logs for a proxy (requires proxy:view)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Proxy logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { type: object } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Presets ───────────────────────────────────────────────────────────────────
  /presets:
    get:
      tags: [Presets]
      summary: List proxy presets (requires preset:view)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Preset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { type: object } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Presets]
      summary: Create a preset (requires preset:create)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:     { type: string }
                filters:  { type: object }
                rotation: { type: object }
      responses:
        '201':
          description: Preset created
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /presets/{id}:
    put:
      tags: [Presets]
      summary: Update a preset (requires preset:update)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Updated preset
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [Presets]
      summary: Delete a preset (requires preset:delete)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Preset deleted
