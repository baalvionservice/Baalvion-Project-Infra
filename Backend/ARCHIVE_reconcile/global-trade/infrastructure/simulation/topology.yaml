# BAALVION SINGULARITY GRID: SIMULATION TOPOLOGY
# Deployment Strategy: Ephemeral Probabilistic Compute Shards
# Security Level: SECURE_ISOLATION

apiVersion: apps/v1
kind: Deployment
metadata:
  name: baalvion-simulation-runtime
  namespace: singularity-simulation
spec:
  replicas: 12 # Scalable burst capacity for Monte Carlo processing
  selector:
    matchLabels:
      app: simulation-runtime
  template:
    metadata:
      labels:
        app: simulation-runtime
        security.baalvion.gov/mtls: "true"
        tier: strategic-compute
    spec:
      containers:
      - name: sim-engine
        image: vault.baalvion.gov/core/sim-runtime:v7.0.0-PROB
        ports:
        - containerPort: 3000
        env:
        - name: KAFKA_BROKERS
          value: "kafka-cluster-kafka-bootstrap.messaging:9092"
        - name: CLICKHOUSE_URL
          value: "http://clickhouse-ha.data:8123"
        resources:
          limits:
            cpu: "4"
            memory: "8Gi"
          requests:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
---
# SIMULATION ISOLATION (NetworkPolicy)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-simulation-egress
  namespace: singularity-simulation
spec:
  podSelector:
    matchLabels:
      app: simulation-runtime
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: clickhouse
      namespaceSelector:
        matchLabels:
          name: data-fabric
    ports:
    - protocol: TCP
      port: 8123
  - to:
    - podSelector:
        matchLabels:
          app: kafka
      namespaceSelector:
        matchLabels:
          name: messaging
    ports:
    - protocol: TCP
      port: 9092