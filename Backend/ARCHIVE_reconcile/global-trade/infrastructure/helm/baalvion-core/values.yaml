# BAALVION SOVEREIGN OS: CORE RUNTIME CONFIG
global:
  region: "zurich-ch-01"
  environment: "production"
  integrityLevel: "SOVEREIGN"

executionKernel:
  replicaCount: 48
  image:
    repository: vault.baalvion.gov/core/execution-kernel
    tag: "v4.2.0-FINAL"
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  env:
    DATABASE_URL: "postgresql://sgek_user@postgres-ha:5432/baalvion_ssot"
    KAFKA_BROKERS: "kafka-cluster-kafka-bootstrap.messaging:9092"
    VAULT_ADDR: "https://vault.security.svc:8200"

aiCognition:
  replicaCount: 12
  image:
    repository: vault.baalvion.gov/core/ai-runtime
    tag: "v4.2.0-STABLE"
  inference:
    model: "gemini-1.5-pro"
    vectorStore: "pgvector-ha.data:5432"

observability:
  otelCollector: "otel-collector.observability.svc:4317"
  logging:
    loki: "loki-gateway.observability.svc:3100"
  tracing:
    tempo: "tempo-gateway.observability.svc:4317"

security:
  mtls:
    enabled: true
    trustDomain: "baalvion.gov"
  opa:
    enabled: true
    policyPath: "governance/policies/trade-gate.rego"