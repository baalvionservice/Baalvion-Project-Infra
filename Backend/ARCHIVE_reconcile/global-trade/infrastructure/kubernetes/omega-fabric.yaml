# BAALVION OMEGA SOVEREIGN OMNIGRID: PLANETARY RUNTIME TOPOLOGY
# Deployment Strategy: Multi-Cloud / Sovereign Regional Hypergrid
# Security Level: SUPREME (mTLS / SPIFFE / Kyverno / Zero-Trust)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: baalvion-omega-coordinator
  namespace: omega-core
spec:
  replicas: 142 # Distributed across all 142 planetary hyper-clusters
  selector:
    matchLabels:
      app: omega-coordinator
  template:
    metadata:
      labels:
        app: omega-coordinator
        security.baalvion.gov/mtls: "true"
        tier: supreme-execution
        domain: global-kernel
    spec:
      containers:
      - name: coordinator-runtime
        image: vault.baalvion.gov/core/omega-coordinator:v12.0.0-FINAL
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: omega-authority-secrets
        resources:
          limits:
            cpu: "8"
            memory: "16Gi"
          requests:
            cpu: "4"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000

---
# SOVEREIGN ISOLATION POLICY (Kyverno)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-omega-isolation
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: require-sovereign-mtls
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Nodes must utilize the Omega mTLS fabric (SPIFFE) for institutional cross-talk."
      pattern:
        metadata:
          labels:
            security.baalvion.gov/mtls: "true"
  - name: pin-data-jurisdiction
    match:
      any:
      - resources:
          kinds:
          - PersistentVolumeClaim
    validate:
      message: "Data residency violation: Persistent storage must be bound to the jurisdictional regional cluster."
      pattern:
        metadata:
          labels:
            residency: "{{region}}"
