spring:
  application:
    name: trust-score-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}
    username: ${DB_APP_USER:${DB_USER:postgres}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      data-source-properties:
        stringtype: unspecified
      maximum-pool-size: 20
      minimum-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy

  flyway:
    user: ${DB_MIGRATION_USER:${DB_USER:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}
    enabled: true
    table: flyway_history_trust_score

server:
  port: ${PORT:3046}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG

app:
  name: Baalvion Trust Score Service
  version: 1.0.0
  description: Composite 0-1000 counterparty trust scoring
  outbox:
    poll-ms: 2000
    batch-size: 100
    max-attempts: 10
  trust-score:
    # Active scoring provider: "simulated" (default, built-in weighted model) | "vendor".
    provider: ${TRUST_SCORE_PROVIDER:simulated}
    # Factor weights (must sum to 1.0). Tune from observed default/fraud outcomes.
    weight-kyc: 0.20
    weight-payment-reliability: 0.25
    weight-dispute-rate: 0.20
    weight-activity: 0.15
    weight-tenure: 0.10
    weight-compliance: 0.10
    # Account age (months) at which the tenure factor saturates.
    tenure-saturation-months: 24
