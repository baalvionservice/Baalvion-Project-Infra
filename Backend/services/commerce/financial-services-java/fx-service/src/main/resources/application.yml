spring:
  application:
    name: fx-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}
    username: ${DB_APP_USER:${DB_USER:postgres}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      # Send String params with an unspecified OID so Postgres casts them to the target
      # column type (notably String fields mapped onto jsonb columns). URL-independent, so it
      # also applies to the Testcontainers-provided JDBC URL in integration tests.
      data-source-properties:
        stringtype: unspecified
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 10000
      max-lifetime: 1800000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy
    consumer:
      group-id: fx-service-group
      auto-offset-reset: earliest
      max-poll-records: 500

  flyway:
    user: ${DB_MIGRATION_USER:${DB_USER:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}
    enabled: true
    table: flyway_history_fx

server:
  port: ${PORT:3038}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG
    org.springframework.web: INFO

app:
  name: Baalvion FX Service
  version: 1.0.0
  description: FX rates, spot conversion, rate-lock and forwards for Global Trade Infrastructure
  outbox:
    poll-ms: 2000
    batch-size: 100
    max-attempts: 10
  fx:
    # Dealer spread applied around the mid rate, in basis points (25 = 0.25% each side).
    spread-bps: 25
    # How long a published rate is considered fresh (the platform's 30s standard).
    rate-ttl-seconds: 30
    # Default validity window for a rate-lock quote.
    rate-lock-seconds: 120
    # Cash margin blocked on the applicant when booking a forward (fraction of notional).
    forward-margin-rate: 0.05
    # Maximum tenor (days) allowed for a forward contract.
    forward-max-tenor-days: 365
    # Rate provider: "simulated" (deterministic in-process feed) | "live" (external feed, needs creds).
    rate-provider: ${FX_RATE_PROVIDER:simulated}
    # How often the rate snapshot is refreshed into the fx_rates table (ms).
    refresh-ms: 15000
