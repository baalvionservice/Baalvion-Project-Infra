spring:
  application:
    name: risk-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}
    username: ${DB_APP_USER:${DB_USER:postgres}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      # Send String params with an unspecified OID so Postgres casts them to the target
      # column type (notably String fields mapped onto jsonb columns). URL-independent, so it
      # also applies to the Testcontainers-provided JDBC URL in integration tests.
      data-source-properties:
        stringtype: unspecified
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 10000
      max-lifetime: 1800000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: risk-service-group
      auto-offset-reset: earliest
      max-poll-records: 500

  sql:
    init:
      mode: always
      continue-on-error: true

  # Per-service Flyway history table — services share one DB, so isolate migration state.
  flyway:
    user: ${DB_MIGRATION_USER:${DB_USER:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}
    enabled: true
    table: flyway_history_risk

server:
  port: ${PORT:3035}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,sanctions
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

app:
  name: Baalvion Risk Service
  version: 1.0.0
  description: Transaction monitoring and fraud scoring for Global Trade Infrastructure
  risk:
    high-value-threshold: 250000
    velocity-count-threshold: 5
    velocity-amount-threshold: 500000
    velocity-window-minutes: 60
    review-score: 40
    decline-score: 70
  sanctions:
    # Compliance enforcement posture (SanctionsBootstrap), DECOUPLED from app.security.enabled.
    #   strict      (DEFAULT): production. OFAC/UN/EU must be enabled, loaded, and non-empty at boot or the
    #               service REFUSES TO START; the seed list is forbidden; screening fails closed on an empty
    #               watchlist. There is NO seed/mock fallback in this flow.
    #   permissive: local/dev/test ONLY. Allows the offline seed list and never fails boot on an empty list.
    #               Must be set explicitly (SANCTIONS_ENFORCEMENT=permissive), e.g. in docker-compose / tests.
    # Production simply runs with SPRING_PROFILES_ACTIVE=production (application-production.yml), which keeps
    # strict and enables OFAC/UN/EU. Strict-by-default means a forgotten env var/profile FAILS the deploy.
    enforcement: ${SANCTIONS_ENFORCEMENT:strict}
    # The development seed list ('seed') is a DEV/OFFLINE convenience only — NOT AML/KYC compliant, and
    # forbidden under strict. 'seed' loads it; any other value (e.g. "live") disables the seed bean.
    provider: ${SANCTIONS_PROVIDER:seed}
    # Authoritative provider ids that strict enforcement requires loaded + non-empty at boot.
    required-sources: ${SANCTIONS_REQUIRED_SOURCES:ofac,un,eu}
    # Boot-time sanity floor per source — catches an empty/partially-parsed feed. Well below real sizes.
    min-entities:
      ofac: ${SANCTIONS_MIN_OFAC:1000}
      un: ${SANCTIONS_MIN_UN:100}
      eu: ${SANCTIONS_MIN_EU:500}
    # Health marks a source STALE (and readiness DOWN under strict) once its data is older than this.
    dataset-max-age-hours: ${SANCTIONS_DATASET_MAX_AGE_HOURS:48}
    # Name similarity (0-1) at/above which a watchlist entity is recorded as a hit (POTENTIAL_MATCH).
    match-threshold: 0.85
    # Similarity at/above which a hit is auto-escalated to CONFIRMED_MATCH (block without manual review).
    auto-block-threshold: 0.95
    # Max (top-scoring) hits retained per screening.
    max-hits: 10
    # Load the enabled providers' lists on startup if the watchlist table is empty.
    auto-seed-on-startup: true
    # In-memory active-watchlist snapshot TTL (the DB is the durable cache; evicted on ingest).
    cache-ttl-seconds: 300
    # Per-source reliability weights → matches[].sourceConfidence (does NOT change the block verdict).
    source-weights:
      OFAC: 1.0
      EU: 0.9
      UN: 0.85
      UK: 0.9
      AU: 0.85
    default-source-weight: 0.8
    refresh:
      # Master switch for the per-provider scheduled refresh jobs.
      enabled: ${SANCTIONS_REFRESH_ENABLED:true}
      cron: ${SANCTIONS_REFRESH_CRON:0 0 3 * * *}   # legacy single-refresh (back-compat)
    ofac:
      enabled: ${SANCTIONS_OFAC_ENABLED:false}
      # Official OFAC SDN CSV feeds (override to the sanctionslistservice.ofac.treas.gov exports if needed).
      sdn-url: ${OFAC_SDN_URL:https://www.treasury.gov/ofac/downloads/sdn.csv}
      alt-url: ${OFAC_ALT_URL:https://www.treasury.gov/ofac/downloads/alt.csv}
      add-url: ${OFAC_ADD_URL:https://www.treasury.gov/ofac/downloads/add.csv}
      connect-timeout-ms: 10000
      read-timeout-ms: 60000
      max-retries: 3
      retry-backoff-ms: 2000
      # External-provider rate-limit guard: never hit the OFAC feeds more often than this.
      min-refresh-interval-minutes: 60
      cron: ${OFAC_REFRESH_CRON:0 0 3 * * *}        # daily
    eu:
      enabled: ${SANCTIONS_EU_ENABLED:false}
      # EU Consolidated Financial Sanctions List (FSD XML, full list).
      url: ${EU_SANCTIONS_URL:https://webgate.ec.europa.eu/fsd/fsf/public/files/xmlFullSanctionsList_1_1/content?token=dG9rZW4tMjAxNw}
      connect-timeout-ms: 10000
      read-timeout-ms: 60000
      max-retries: 3
      retry-backoff-ms: 2000
      min-refresh-interval-minutes: 60
      cron: ${EU_REFRESH_CRON:0 30 3 * * *}         # daily
    un:
      enabled: ${SANCTIONS_UN_ENABLED:false}
      # UN Security Council Consolidated List (XML).
      url: ${UN_SANCTIONS_URL:https://scsanctions.un.org/resources/xml/en/consolidated.xml}
      connect-timeout-ms: 10000
      read-timeout-ms: 60000
      max-retries: 3
      retry-backoff-ms: 2000
      min-refresh-interval-minutes: 120
      cron: ${UN_REFRESH_CRON:0 0 */4 * * *}        # every 4h (2–6h target)
