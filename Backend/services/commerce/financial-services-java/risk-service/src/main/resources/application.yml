spring:
  application:
    name: risk-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 10000
      max-lifetime: 1800000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: risk-service-group
      auto-offset-reset: earliest
      max-poll-records: 500

  sql:
    init:
      mode: always
      continue-on-error: true

  # Per-service Flyway history table — services share one DB, so isolate migration state.
  flyway:
    enabled: true
    table: flyway_history_risk

server:
  port: ${PORT:3025}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

app:
  name: Baalvion Risk Service
  version: 1.0.0
  description: Transaction monitoring and fraud scoring for Global Trade Infrastructure
  risk:
    high-value-threshold: 250000
    velocity-count-threshold: 5
    velocity-amount-threshold: 500000
    velocity-window-minutes: 60
    review-score: 40
    decline-score: 70
