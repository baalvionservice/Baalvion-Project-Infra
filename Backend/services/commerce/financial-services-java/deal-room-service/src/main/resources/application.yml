spring:
  application:
    name: deal-room-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: none          # Flyway is the single schema authority
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}${DB_JDBC_PARAMS:}
    username: ${DB_APP_USER:${DB_USER:postgres}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      # Send String params with an unspecified OID so Postgres casts them to the target
      # column type (notably String fields mapped onto jsonb columns). URL-independent, so it
      # also applies to the Testcontainers-provided JDBC URL in integration tests.
      data-source-properties:
        stringtype: unspecified
      maximum-pool-size: 20
      minimum-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy

  flyway:
    user: ${DB_MIGRATION_USER:${DB_USER:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}
    enabled: true
    table: flyway_history_deal_room

server:
  port: ${PORT:3040}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG

app:
  name: Baalvion Deal Room Service
  version: 1.0.0
  description: Real-time bilateral trade negotiation, counter-offer engine and term-sheet execution
  outbox:
    poll-ms: 2000
    batch-size: 100
    max-attempts: 10
  deal-room:
    # Default lifetime of an open deal room before it auto-expires (hours).
    default-ttl-hours: 168
    # Default validity window of a counter-offer if the proposer sets none (hours).
    offer-validity-hours: 48
    # Maximum negotiation rounds before the room must be re-opened (guards runaway haggling).
    max-rounds: 50
