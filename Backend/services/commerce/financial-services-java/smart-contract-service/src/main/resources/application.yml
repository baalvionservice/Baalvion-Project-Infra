spring:
  application:
    name: smart-contract-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      # Send String params with an unspecified OID so Postgres casts them to the target
      # column type (notably String fields mapped onto jsonb columns). URL-independent, so it
      # also applies to the Testcontainers-provided JDBC URL in integration tests.
      data-source-properties:
        stringtype: unspecified
      maximum-pool-size: 20
      minimum-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy

  flyway:
    enabled: true
    table: flyway_history_smart_contract

server:
  port: ${PORT:3041}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG

app:
  name: Baalvion Smart Contract Service
  version: 1.0.0
  description: Incoterms 2020 / UCP 600 sale contracts with e-signature
  outbox:
    poll-ms: 2000
    batch-size: 100
    max-attempts: 10
  smart-contract:
    # Default governing law / dispute-resolution clauses applied when the caller sets none.
    default-governing-law: "English Law"
    default-dispute-resolution: "ICC Arbitration, single arbitrator, seat London"
    # Days a signature request stays open before it auto-expires.
    signature-expiry-days: 14
    # e-signature provider: "simulated" (default, self-contained) | "docuseal" (real, needs creds).
    esign-provider: ${ESIGN_PROVIDER:simulated}
