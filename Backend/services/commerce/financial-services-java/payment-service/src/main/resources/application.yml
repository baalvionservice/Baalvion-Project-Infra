spring:
  application:
    name: payment-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      # Send String params with an unspecified OID so Postgres casts them to the target
      # column type (notably String fields mapped onto jsonb columns). URL-independent, so it
      # also applies to the Testcontainers-provided JDBC URL in integration tests.
      data-source-properties:
        stringtype: unspecified
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 10000
      max-lifetime: 1800000

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000
    database: 0

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy
      properties:
        linger.ms: 10
        batch.size: 32768
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      max-poll-records: 500

  sql:
    init:
      mode: always
      continue-on-error: true

  # Per-service Flyway history table — services share one DB, so isolate migration state.
  flyway:
    enabled: true
    table: flyway_history_payment

server:
  port: ${PORT:3015}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

app:
  name: Baalvion Payment Service
  version: 1.0.0
  description: Payment processing with tiered fees for Global Trade Infrastructure
  vat-rate: 0.075
  daily-limit: 1000000
  transaction-min-limit: 100
  transaction-max-limit: 500000
  idempotency-ttl: 86400
  outbox:
    poll-ms: 2000
    batch-size: 100
    max-attempts: 10
  # Maker-checker (§7.1): reversals at/above this amount require a second approver.
  maker-checker:
    reversal-threshold: 100000

# Resilience4j on the external scheme boundary (design §9.1)
resilience4j:
  circuitbreaker:
    instances:
      scheme:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      scheme:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  bulkhead:
    instances:
      scheme:
        max-concurrent-calls: 50
        max-wait-duration: 100ms
  timelimiter:
    instances:
      scheme:
        timeout-duration: 30s        # external scheme calls must complete within 30s (§9.1)
        cancel-running-future: true
