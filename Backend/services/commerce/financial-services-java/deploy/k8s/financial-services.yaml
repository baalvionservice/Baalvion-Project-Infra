# Kubernetes manifests for the Baalvion financial services (design §8.2 / §9.2).
# namespace + shared config + Deployment/Service/HPA per service.
# Images are expected as baalvion/<service>:latest (built from the shared Dockerfile).
# Secrets (DB password, etc.) should come from a Secret/External Secrets Operator in prod;
# inline values here are for non-prod only.
---
apiVersion: v1
kind: Namespace
metadata:
  name: financial
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: financial-config
  namespace: financial
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "baalvion"
  DB_USER: "postgres"
  KAFKA_BROKERS: "kafka:9092"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # Zero-trust: enforce JWT and point the resource server at the platform RS256 JWKS.
  APP_SECURITY_ENABLED: "true"
  OAUTH_ISSUER_URI: "https://auth.baalvion.com"
  OAUTH_JWK_SET_URI: "http://oauth-service.default.svc.cluster.local:3023/.well-known/jwks.json"
---
apiVersion: v1
kind: Secret
metadata:
  name: financial-secrets
  namespace: financial
type: Opaque
stringData:
  DB_PASSWORD: "postgres"   # replace via External Secrets Operator in prod
---
# ---------- account-service (3016) ----------
apiVersion: apps/v1
kind: Deployment
metadata: { name: account-service, namespace: financial }
spec:
  replicas: 2
  selector: { matchLabels: { app: account-service } }
  template:
    metadata: { labels: { app: account-service } }
    spec:
      containers:
        - name: account-service
          image: baalvion/account-service:latest
          ports: [{ containerPort: 3016 }]
          envFrom:
            - configMapRef: { name: financial-config }
            - secretRef: { name: financial-secrets }
          env: [{ name: PORT, value: "3016" }]
          readinessProbe: { httpGet: { path: /actuator/health/readiness, port: 3016 }, initialDelaySeconds: 30, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 3016 }, initialDelaySeconds: 45, periodSeconds: 15 }
          resources: { requests: { cpu: "250m", memory: "512Mi" }, limits: { cpu: "1", memory: "1Gi" } }
---
apiVersion: v1
kind: Service
metadata: { name: account-service, namespace: financial }
spec:
  selector: { app: account-service }
  ports: [{ port: 3016, targetPort: 3016 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: account-service, namespace: financial }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: account-service }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
