# Financial Services CI/CD — staged copy that mirrors the ACTIVE root workflow.
# The deployed pipeline is .github/workflows/financial-services.yml (test + image build/scan only).
# Production images are built + pushed to Amazon ECR by the canonical pipeline
# .github/workflows/deploy.yml — this workflow pushes to NO registry (no GHCR). Keep in sync.
name: Financial Services CI/CD

on:
  push:
    branches: [main, hardening-phase-1, "release/**"]
    paths:
      - "Backend/services/commerce/financial-services-java/**"
      - ".github/workflows/financial-services.yml"
  pull_request:
    branches: [main, hardening-phase-1, "release/**"]
    paths:
      - "Backend/services/commerce/financial-services-java/**"

env:
  MODULE_DIR: Backend/services/commerce/financial-services-java
  # Local-only image tag prefix used for the Trivy scan below. Production images are
  # built + pushed to Amazon ECR by the canonical pipeline (.github/workflows/deploy.yml).
  # This workflow no longer pushes to any registry — it builds + scans only (no GHCR).
  IMAGE_PREFIX: baalvion-financial

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build, test (Testcontainers), package
        working-directory: ${{ env.MODULE_DIR }}
        run: mvn -B -ntp clean verify
      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: financial-jars
          path: ${{ env.MODULE_DIR }}/*/target/*.jar
          if-no-files-found: ignore

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS (vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.MODULE_DIR }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"

  images:
    name: Build & scan images
    needs: [build-test, trivy-fs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - account-service
          - ledger-service
          - payment-service
          - escrow-service
          - settlement-service
          - reconciliation-service
          - audit-service
          - reporting-service
          - risk-service
          - trade-finance-service
          - credit-service
          - fx-service
          - wallet-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.MODULE_DIR }}
          file: ${{ env.MODULE_DIR }}/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
      - name: Trivy image scan (${{ matrix.service }})
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
      # GHCR login + push removed during the ECR consolidation. The deployed Java
      # payment-service is built + pushed to Amazon ECR (repo baalvion/payment-service,
      # build-arg SERVICE=payment-service) by the canonical pipeline
      # .github/workflows/deploy.yml. This job now builds + Trivy-scans only.
