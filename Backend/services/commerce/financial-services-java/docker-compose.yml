# Local stack for the Baalvion financial services (design §8).
# Infra bundled here: Kafka (KRaft-less w/ Zookeeper). PostgreSQL and Redis are NOT bundled —
# the whole platform runs ONE shared Postgres (`baalvion-postgres`, PostgreSQL 15, host 5432) and
# ONE shared Redis (`baalvion-redis`, host 6379), both from the root docker-compose.yml. The
# self-contained postgres:16 (host 5433) and redis:7 (host 6380) that used to live here were
# removed to end the duplicate "two Postgres / two Redis servers" setup; these services now use the
# one shared instance of each, like every other service in the monorepo.
# Each service builds from the shared parametrized Dockerfile (SERVICE build-arg).
#
#   # 1. bring up the shared platform Postgres + Redis first (root compose, host 5432 / 6379):
#   #      docker compose -f ../../../../docker-compose.yml up -d postgres redis
#   # 2. then this stack (its own Kafka builds alongside):
#   docker compose up --build
#
# Note: every service runs a full Maven build in its image; first build is slow.
# All services share the `baalvion_db` database (separate schemas + per-service Flyway history).

name: baalvion-financial

x-service-env: &service-env
  # These services connect to the platform's single shared Postgres (`baalvion-postgres`,
  # root docker-compose.yml). They reach it via the host-published port (`host.docker.internal:5432`)
  # rather than by service DNS on the external `baalvion-net`, because the root compose already
  # defines services named `ledger-service`/`payment-service`/`redis` — joining that network would
  # create colliding DNS aliases. Override DB_HOST for non-Docker-Desktop hosts (e.g. Linux Docker
  # Engine: set DB_HOST to the host IP, or add `host.docker.internal:host-gateway` via extra_hosts).
  DB_HOST: ${DB_HOST:-host.docker.internal}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME:-baalvion_db}
  DB_USER: ${DB_USER:-baalvion}
  DB_PASSWORD: ${DB_PASSWORD:-baalvion_dev_pass}
  KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
  # Redis: the platform's single shared `baalvion-redis` (root docker-compose.yml, host 6379),
  # reached via host.docker.internal like Postgres. The bundled redis:7 was removed too. Redis is
  # used only by payment-service idempotency + the optional redis rate-limit backend (fails open).
  REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
  REDIS_PORT: ${REDIS_PORT:-6379}
  # Local dev has no IdP — run permissive. In real environments set APP_SECURITY_ENABLED=true
  # and OAUTH_ISSUER_URI / OAUTH_JWK_SET_URI to point at the platform's RS256 JWKS (auth-service).
  APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-false}
  # Services share one Postgres (separate schemas); once any service has populated the
  # default `public` schema, a sibling's first Flyway run refuses with "non-empty schema,
  # no history table". Baseline-on-migrate lets each service initialize its own history
  # against the shared DB. Safe: each service's migrations target its own schema.
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}
  # Baseline at v0 so a service's own V1+ migrations still apply (default baseline=1
  # would mark V1 as already-applied and skip table creation on the shared DB).
  SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION:-0}

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  account-service:
    build: { context: ., args: { SERVICE: account-service } }
    environment: { <<: *service-env, PORT: "3016" }
    ports: ["3016:3016"]
    depends_on:
      kafka: { condition: service_started }

  ledger-service:
    build: { context: ., args: { SERVICE: ledger-service } }
    environment: { <<: *service-env, PORT: "3014" }
    # Host port overridable (LEDGER_HOST_PORT) to coexist with a process already on 3014.
    ports: ["${LEDGER_HOST_PORT:-3014}:3014"]
    depends_on:
      kafka: { condition: service_started }

  payment-service:
    build: { context: ., args: { SERVICE: payment-service } }
    environment: { <<: *service-env, PORT: "3015" }
    ports: ["${PAYMENT_HOST_PORT:-3015}:3015"]
    depends_on:
      kafka: { condition: service_started }

  escrow-service:
    build: { context: ., args: { SERVICE: escrow-service } }
