# Local stack for the Baalvion financial services (design §8).
# Infra: PostgreSQL 16, Kafka (KRaft-less w/ Zookeeper), Redis 7.
# Each service builds from the shared parametrized Dockerfile (SERVICE build-arg).
#
#   docker compose up --build
#
# Note: every service runs a full Maven build in its image; first build is slow.
# All services share the `baalvion` database (separate schemas + per-service Flyway history).

name: baalvion-financial

x-service-env: &service-env
  # Self-contained by default (the `postgres`/`redis` services below). To CONSOLIDATE onto the
  # platform's shared instance instead, override these to the root docker-compose's baalvion-postgres
  # and attach this stack to the external `baalvion-net` network (see RUN_LOCAL.md):
  #   DB_HOST=baalvion-postgres  DB_NAME=baalvion_db  DB_USER=baalvion  DB_PASSWORD=baalvion_dev_pass
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME:-baalvion}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  # Local dev has no IdP — run permissive. In real environments set APP_SECURITY_ENABLED=true
  # and OAUTH_ISSUER_URI / OAUTH_JWK_SET_URI to point at the platform's RS256 JWKS (auth-service).
  APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-false}
  # Services share one Postgres (separate schemas); once any service has populated the
  # default `public` schema, a sibling's first Flyway run refuses with "non-empty schema,
  # no history table". Baseline-on-migrate lets each service initialize its own history
  # against the shared DB. Safe: each service's migrations target its own schema.
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}
  # Baseline at v0 so a service's own V1+ migrations still apply (default baseline=1
  # would mark V1 as already-applied and skip table creation on the shared DB).
  SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION:-0}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: baalvion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Host port 5433 (not 5432) so this self-contained DB never fights the platform's
    # shared baalvion-postgres (root docker-compose, host 5432). Container port stays 5432.
    ports: ["5433:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d baalvion"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7
    # Host port 6380 (not 6379) so this self-contained Redis never fights the platform's
    # shared baalvion-redis (root docker-compose, host 6379). Container port stays 6379.
    ports: ["6380:6379"]

  account-service:
    build: { context: ., args: { SERVICE: account-service } }
    environment: { <<: *service-env, PORT: "3016" }
    ports: ["3016:3016"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  ledger-service:
    build: { context: ., args: { SERVICE: ledger-service } }
    environment: { <<: *service-env, PORT: "3014" }
    # Host port overridable (LEDGER_HOST_PORT) to coexist with a process already on 3014.
    ports: ["${LEDGER_HOST_PORT:-3014}:3014"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  payment-service:
    build: { context: ., args: { SERVICE: payment-service } }
    environment: { <<: *service-env, PORT: "3015", REDIS_HOST: redis, REDIS_PORT: "6379" }
    ports: ["${PAYMENT_HOST_PORT:-3015}:3015"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
      redis: { condition: service_started }

  escrow-service:
    build: { context: ., args: { SERVICE: escrow-service } }
    environment: { <<: *service-env, PORT: "3017" }
    ports: ["3017:3017"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  settlement-service:
    build: { context: ., args: { SERVICE: settlement-service } }
    environment: { <<: *service-env, PORT: "3018" }
    ports: ["3018:3018"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  reconciliation-service:
    build: { context: ., args: { SERVICE: reconciliation-service } }
    environment: { <<: *service-env, PORT: "3019" }
    ports: ["3019:3019"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  audit-service:
    build: { context: ., args: { SERVICE: audit-service } }
    environment: { <<: *service-env, PORT: "3020" }
    ports: ["${AUDIT_HOST_PORT:-3020}:3020"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  reporting-service:
    build: { context: ., args: { SERVICE: reporting-service } }
    environment: { <<: *service-env, PORT: "3024" }
    ports: ["3024:3024"]
    depends_on:
      postgres: { condition: service_healthy }

  risk-service:
    build: { context: ., args: { SERVICE: risk-service } }
    environment: { <<: *service-env, PORT: "3035" }
    # Host port is overridable (RISK_HOST_PORT) so the suite can run alongside another
    # process already bound to 3035 on the host. Container port stays 3035.
    ports: ["${RISK_HOST_PORT:-3035}:3035"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  trade-finance-service:
    build: { context: ., args: { SERVICE: trade-finance-service } }
    environment: { <<: *service-env, PORT: "3036" }
    ports: ["3036:3036"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  credit-service:
    build: { context: ., args: { SERVICE: credit-service } }
    # Host port remapped 3037→13037 for local dev (a stray node process holds 3037 on this host);
    # the container still listens on 3037. Override CREDIT_HOST_PORT to change.
    environment: { <<: *service-env, PORT: "3037" }
    ports: ["${CREDIT_HOST_PORT:-13037}:3037"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  fx-service:
    build: { context: ., args: { SERVICE: fx-service } }
    environment: { <<: *service-env, PORT: "3038" }
    ports: ["3038:3038"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  wallet-service:
    build: { context: ., args: { SERVICE: wallet-service } }
    environment: { <<: *service-env, PORT: "3039" }
    ports: ["3039:3039"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  deal-room-service:
    build: { context: ., args: { SERVICE: deal-room-service } }
    environment: { <<: *service-env, PORT: "3040" }
    ports: ["3040:3040"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  smart-contract-service:
    build: { context: ., args: { SERVICE: smart-contract-service } }
    environment: { <<: *service-env, PORT: "3041" }
    ports: ["3041:3041"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  payment-rails-service:
    build: { context: ., args: { SERVICE: payment-rails-service } }
    environment: { <<: *service-env, PORT: "3042" }
    ports: ["3042:3042"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  # Read/compute service (no money movement) — depends on Postgres only, no Kafka.
  trade-intelligence-service:
    build: { context: ., args: { SERVICE: trade-intelligence-service } }
    environment: { <<: *service-env, PORT: "3043" }
    ports: ["3043:3043"]
    depends_on:
      postgres: { condition: service_healthy }

  dispute-service:
    build: { context: ., args: { SERVICE: dispute-service } }
    environment: { <<: *service-env, PORT: "3044" }
    ports: ["3044:3044"]
    depends_on:
