spring:
  application:
    name: escrow-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}${DB_JDBC_PARAMS:}
    username: ${DB_APP_USER:${DB_USER:postgres}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      # Send String params with an unspecified OID so Postgres casts them to the target
      # column type (notably String fields mapped onto jsonb columns). URL-independent, so it
      # also applies to the Testcontainers-provided JDBC URL in integration tests.
      data-source-properties:
        stringtype: unspecified
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 10000
      max-lifetime: 1800000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        linger.ms: 10
        batch.size: 32768
    consumer:
      group-id: escrow-service-group
      auto-offset-reset: earliest
      max-poll-records: 500

  sql:
    init:
      mode: always
      continue-on-error: true

  # Per-service Flyway history table — services share one DB, so isolate migration state.
  flyway:
    user: ${DB_MIGRATION_USER:${DB_USER:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}
    enabled: true
    table: flyway_history_escrow

server:
  port: ${PORT:3017}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

app:
  name: Baalvion Escrow Service
  version: 1.0.0
  description: Conditional fund holds for Global Trade Infrastructure
  expiry-sweep-ms: 300000
