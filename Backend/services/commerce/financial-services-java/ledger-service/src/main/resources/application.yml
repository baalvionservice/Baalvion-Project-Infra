spring:
  application:
    name: ledger-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}
    username: ${DB_APP_USER:${DB_USER:postgres}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      # Send String params with an unspecified OID so Postgres casts them to the target
      # column type (notably String fields mapped onto jsonb columns). URL-independent, so it
      # also applies to the Testcontainers-provided JDBC URL in integration tests.
      data-source-properties:
        stringtype: unspecified
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 10000
      max-lifetime: 1800000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy
      properties:
        linger.ms: 10
        batch.size: 32768
    consumer:
      group-id: ledger-service-group
      auto-offset-reset: earliest
      max-poll-records: 500

  sql:
    init:
      mode: always
      continue-on-error: true

  # Per-service Flyway history table — services share one DB, so isolate migration state.
  flyway:
    user: ${DB_MIGRATION_USER:${DB_USER:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}
    enabled: true
    table: flyway_history_ledger

server:
  port: ${PORT:3014}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    # Do not leak internal exception detail (Hibernate/SQL/Kafka messages) to API callers.
    # Dev verbosity is opt-in via the `dev` Spring profile (see the profile document below).
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

app:
  name: Baalvion Ledger Service
  version: 1.0.0
  description: Double-entry ledger for Global Trade Infrastructure

  # Transactional-outbox relay (LedgerOutboxRelay). All values env-overridable.
  outbox:
    poll-ms: ${OUTBOX_POLL_MS:2000}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:10}
    send-timeout-ms: ${OUTBOX_SEND_TIMEOUT_MS:10000}
    backoff-base-ms: ${OUTBOX_BACKOFF_BASE_MS:2000}
    backoff-max-ms: ${OUTBOX_BACKOFF_MAX_MS:300000}

---
# Dev-only verbosity: surface exception/binding detail in error responses ONLY under the `dev`
# profile (SPRING_PROFILES_ACTIVE=dev). Never enabled in the default/prod configuration above.
spring:
  config:
    activate:
      on-profile: dev

server:
  error:
    include-message: always
    include-binding-errors: always
