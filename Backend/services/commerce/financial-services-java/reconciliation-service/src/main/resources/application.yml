spring:
  application:
    name: reconciliation-service
    version: 1.0.0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baalvion}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 10000
      max-lifetime: 1800000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      compression-type: snappy
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        linger.ms: 10
        batch.size: 32768
    consumer:
      group-id: reconciliation-service-group
      auto-offset-reset: earliest
      max-poll-records: 500

  sql:
    init:
      mode: always
      continue-on-error: true

  # Per-service Flyway history table — services share one DB, so isolate migration state.
  flyway:
    enabled: true
    table: flyway_history_reconciliation

server:
  port: ${PORT:3019}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.baalvion: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

app:
  name: Baalvion Reconciliation Service
  version: 1.0.0
  description: Inbound settlement matching and exception workflow for Global Trade Infrastructure
  reconciliation:
    inbound:
      # Off by default — no poller starts, no SFTP connection is attempted.
      enabled: ${RECON_INBOUND_ENABLED:false}
      source: ${RECON_INBOUND_SOURCE:local}   # local | sftp
      poll-ms: 30000
      # local source
      dir: ${RECON_INBOUND_DIR:./inbound/reconciliation}
      quiet-period-ms: 5000
      # sftp source (set when source=sftp; credentials from the secret store)
      sftp:
        host: ${RECON_SFTP_HOST:}
        port: ${RECON_SFTP_PORT:22}
        username: ${RECON_SFTP_USERNAME:}
        password: ${RECON_SFTP_PASSWORD:}
        private-key-path: ${RECON_SFTP_KEY_PATH:}
        known-hosts-path: ${RECON_SFTP_KNOWN_HOSTS:}
        host-key-fingerprint: ${RECON_SFTP_FINGERPRINT:}
        insecure-allow-any-host-key: ${RECON_SFTP_INSECURE:false}
        inbound-dir: ${RECON_SFTP_INBOUND_DIR:/inbound}
        archive-dir: ${RECON_SFTP_ARCHIVE_DIR:/inbound/archive}
        error-dir: ${RECON_SFTP_ERROR_DIR:/inbound/error}
