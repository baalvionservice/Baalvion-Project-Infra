# Isolated legal sub-stack. The platform reaches it ONLY through the API gateway,
# which routes /api/v1/ecosystem/law-elite → law-elite-gateway:8090 (see
# Backend/infra/api-gateway/dynamic.yml). Internal services (user/case)
# are NOT published to the host and live on the private `law-elite` network; only
# the gateway joins `baalvion-net` so Traefik can reach it.
#
# Prereq: the shared network must exist →  docker network create baalvion-net
# Secret:  export LAW_ELITE_JWT_SECRET=<random>   (no insecure default any more)
services:
  law-elite-gateway:
    build: ./gateway
    container_name: law-elite-gateway
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - USER_SERVICE_URL=http://user-service:3001
      - CASE_SERVICE_URL=http://case-service:3002
      # Payments now use the canonical Java payment-service (financial-services-java) PSP gateway
      # on the host (:13015); the law-elite payment stub was removed in the finance consolidation.
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL:-http://host.docker.internal:13015}
      - JWT_SECRET=${LAW_ELITE_JWT_SECRET:?LAW_ELITE_JWT_SECRET must be set}
    depends_on: [user-service, case-service]
    networks: [law-elite, baalvion-net]

  user-service:
    build: ./services/user-service
    container_name: law-elite-user
    restart: unless-stopped
    environment:
      - PORT=3001
    networks: [law-elite]          # internal only — never published

  case-service:
    build: ./services/case-service
    container_name: law-elite-case
    restart: unless-stopped
    environment:
      - PORT=3002
    networks: [law-elite]          # internal only — never published

  # payment-service REMOVED (finance consolidation) — the law-elite payment stub was deleted;
  # the gateway now proxies /api/payments to the canonical Java payment-service (PAYMENT_SERVICE_URL).

networks:
  law-elite:
    name: law-elite
  baalvion-net:
    external: true                 # shared platform net; create with: docker network create baalvion-net
