# BAALVION SOVEREIGN OS: PLANETARY RUNTIME TOPOLOGY
# Deployment Strategy: Multi-Cloud / Sovereign Regional Federation

apiVersion: apps/v1
kind: Deployment
metadata:
  name: baalvion-core-kernel
  namespace: sovereign-core
spec:
  replicas: 48 # Multi-region node distribution
  selector:
    matchLabels:
      app: core-kernel
  template:
    metadata:
      labels:
        app: core-kernel
        security.baalvion.gov/mtls: "true"
        tier: sovereign-execution
        domain: global-kernel
    spec:
      containers:
      - name: kernel
        image: baalvion/core-kernel:v4.2.0-FINAL
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: kernel-authority-secrets
        - configMapRef:
            name: cluster-topology-config
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"

---
# SOVEREIGN ISOLATION POLICY
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-institutional-isolation
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: require-mtls-signed-handshake
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Nodes must utilize the Sovereign mTLS fabric for institutional cross-talk."
      pattern:
        metadata:
          labels:
            security.baalvion.gov/mtls: "true"
  - name: restrict-to-jurisdictional-registry
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Images must originate from the Sovereign Vault (vault.baalvion.gov)."
      pattern:
        spec:
          containers:
          - image: "vault.baalvion.gov/*"