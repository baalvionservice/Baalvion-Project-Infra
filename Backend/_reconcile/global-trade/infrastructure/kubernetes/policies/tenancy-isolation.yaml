apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-institutional-tenancy-isolation
  annotations:
    policies.kyverno.io/title: Sovereign Isolation Protocol
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: critical
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-mtls-label
      match:
        any:
        - resources:
            kinds:
            - Pod
      validate:
        message: "Institutional nodes must utilize the Sovereign mTLS fabric. Label 'security.baalvion.gov/mtls' is mandatory."
        pattern:
          metadata:
            labels:
              security.baalvion.gov/mtls: "true"
    - name: restrict-cross-tenant-volumes
      match:
        any:
        - resources:
            kinds:
            - PersistentVolumeClaim
      validate:
        message: "Data residency violation: Persistent storage must be bound to the local tenant namespace."
        pattern:
          metadata:
            namespace: "?*"
    - name: block-untrusted-registries
      match:
        any:
        - resources:
            kinds:
            - Pod
      validate:
        message: "Node variance detected: Container images must originate from the Sovereign Vault (vault.baalvion.gov)."
        pattern:
          spec:
            containers:
            - image: "vault.baalvion.gov/*"
