# BAALVION QUANTUM CONSTELLATION: PLANETARY RUNTIME TOPOLOGY
# Deployment Strategy: Multi-Cloud / Sovereign Regional Federation
# Security Level: SUPREME (mTLS / SPIFFE / Kyverno)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: baalvion-quantum-kernel
  namespace: quantum-core
spec:
  replicas: 124 # Planetary distribution across all 124 hyper-clusters
  selector:
    matchLabels:
      app: quantum-kernel
  template:
    metadata:
      labels:
        app: quantum-kernel
        security.baalvion.gov/mtls: "true"
        tier: supreme-execution
    spec:
      containers:
      - name: quantum-runtime
        image: vault.baalvion.gov/core/quantum-runtime:v7.4.0-SINGULARITY
        ports:
        - containerPort: 3000
        env:
        - name: KAFKA_BROKERS
          value: "kafka-cluster-kafka-bootstrap.messaging:9092"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: db-url
        resources:
          limits:
            cpu: "4"
            memory: "8Gi"
          requests:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000

---
# SOVEREIGN ISOLATION POLICY (Kyverno)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-quantum-isolation
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: require-sovereign-mtls
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Nodes must utilize the Sovereign mTLS fabric (SPIFFE) for institutional cross-talk."
      pattern:
        metadata:
          labels:
            security.baalvion.gov/mtls: "true"
  - name: pin-data-jurisdiction
    match:
      any:
      - resources:
          kinds:
          - PersistentVolumeClaim
    validate:
      message: "Data residency violation: Persistent storage must be bound to the jurisdictional regional cluster."
      pattern:
        metadata:
          labels:
            residency: "{{region}}"
