apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: baalvion-federated-collector
  namespace: observability
spec:
  mode: deployment
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:
      prometheus:
        config:
          scrape_configs:
            - job_name: 'sovereign-kernel'
              scrape_interval: 10s
              static_configs:
                - targets: ['sgek-service:9090']

    processors:
      batch:
      memory_limiter:
        limit_mib: 1536
        spike_limit_mib: 512
        check_interval: 5s
      resource:
        attributes:
          - key: cluster.id
            value: "${CLUSTER_ID}"
            action: insert
          - key: region
            value: "${REGION}"
            action: insert

    exporters:
      prometheusremotewrite:
        endpoint: "http://mimir-gateway.observability.svc:8080/api/v1/push"
        headers:
          X-Scope-OrgID: baalvion-master
      loki:
        endpoint: "http://loki-gateway.observability.svc:3100/loki/api/v1/push"
      tempo:
        endpoint: "tempo-gateway.observability.svc:4317"
        tls:
          incsecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [tempo]
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, batch, resource]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [loki]