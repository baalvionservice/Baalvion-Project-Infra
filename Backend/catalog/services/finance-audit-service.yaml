apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: finance-audit-service
  description: Append-only immutable audit trail for the financial domain — Kafka aggregator over (payments|ledger|settlement|escrow|account).*, DLT monitor/replay, HMAC webhook fan-out. Part of financial-services-java (port 3020, schema `audit`). Distinct from the platform-wide audit-platform.
  domain: commerce
  division: commerce
  context: financial-audit
  owner: "@baalvion/commerce"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/audit-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres, kafka]
  dependsOn: [auth-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/audit"]
  slo: { availability: 0.999, latencyP95Ms: 400 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 2, maxReplicas: 6 }
