apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: escrow-service
  description: Escrow holds — create/release/refund/dispute with time-based auto-expiry; posts double-entry legs to a per-tenant suspense account via ledger. Part of financial-services-java (port 3017, schema `escrow`).
  domain: commerce
  division: commerce
  context: escrow
  owner: "@baalvion/commerce"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/escrow-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres, kafka]
  dependsOn: [auth-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/escrow"]
  slo: { availability: 0.999, latencyP95Ms: 300 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 2, maxReplicas: 6 }
