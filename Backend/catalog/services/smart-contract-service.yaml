apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: smart-contract-service
  description: Binding sale contracts assembled from ICC Incoterms 2020 + UCP 600 clause templates, executed via pluggable e-signature (DocuSeal / simulated). Part of financial-services-java (port 3041, schema `smart_contract`).
  domain: commerce
  division: commerce
  context: smart-contract
  owner: "@baalvion/commerce"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/smart-contract-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres, kafka]
  dependsOn: [auth-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/contracts"]
  slo: { availability: 0.99, latencyP95Ms: 400 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 2, maxReplicas: 8 }
