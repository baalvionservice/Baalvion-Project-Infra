apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: ledger-service
  description: Double-entry general ledger (system of record for money movement). Posts/reverses balanced journal entries; the source of truth for balances. Part of financial-services-java (port 3014, schema `ledger`).
  domain: commerce
  division: commerce
  context: ledger
  owner: "@baalvion/commerce"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/ledger-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres, kafka]
  dependsOn: [auth-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/ledger"]
  slo: { availability: 0.999, latencyP95Ms: 300 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 2, maxReplicas: 6 }
