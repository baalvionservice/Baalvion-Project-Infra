apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: payment-rails-service
  description: Multi-rail payment routing + settlement — selects SWIFT/SEPA/ACH/FedWire/UPI/Pix/M-Pesa/SPEI/PayNow/FPS by currency/country/amount/urgency and submits via a pluggable rail provider. Part of financial-services-java (port 3042, schema `payment_rails`).
  domain: commerce
  division: commerce
  context: payment-rails
  owner: "@baalvion/commerce"
  tier: tier-0
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/payment-rails-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres, kafka]
  dependsOn: [auth-service, ledger-service, settlement-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/payments"]
  slo: { availability: 0.999, latencyP95Ms: 400 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 2, maxReplicas: 10 }
