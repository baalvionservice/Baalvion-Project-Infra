apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: fx-service
  description: Foreign-exchange engine — live multi-currency rates (short TTL), spot conversion, rate-lock quotes, and forward contracts priced by covered interest-rate parity. Part of financial-services-java (port 3038, schema `fx`).
  domain: commerce
  division: commerce
  context: fx
  owner: "@baalvion/commerce"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/fx-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres, kafka]
  dependsOn: [auth-service, wallet-service, ledger-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/fx"]
  slo: { availability: 0.999, latencyP95Ms: 300 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 2, maxReplicas: 8 }
