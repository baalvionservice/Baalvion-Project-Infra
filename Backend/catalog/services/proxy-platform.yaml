apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: proxy-platform
  description: Proxy reseller + infrastructure platform — gateway control plane, metering, orchestration, edge, billing-of-usage, trust & AI intelligence.
  domain: infrastructure
  division: proxy-infrastructure
  context: proxy
  owner: "@baalvion/proxy-division"
  tier: tier-0
  repo: baalvion-platform
  path: Backend/services/infrastructure/proxy-service
spec:
  lifecycle: production
  language: node
  datastores: [postgres, timescaledb, clickhouse, redis]
  dependsOn:
    - auth-service   # token verification (JWKS)
    - commerce-service    # usage ingestion + quota
  consumesEvents:
    - org.created
  producesEvents:
    - proxy.session.started
    - proxy.session.ended
    - provider.health.changed
    - abuse.action.triggered
    - billing.invoice.generated
  apis:
    - baalvion.proxy.v1.OrchestrationService
    - /v1
  slo:
    availability: 0.999
    latencyP95Ms: 800
  deploy:
    chart: baalvion-service
    namespace: baalvion
    minReplicas: 3
    maxReplicas: 50
