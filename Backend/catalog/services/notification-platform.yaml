apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: notification-platform
  description: Shared notifications — in-app, email, webhook, Slack/Discord. Event-driven; reacts to platform domain events. No product sends its own email.
  domain: platform
  division: platform-core
  context: notification
  owner: "@baalvion/platform-core"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/infrastructure/notification-service
spec:
  lifecycle: beta
  language: node
  datastores: [postgres, redis]
  dependsOn: [identity-platform]
  consumesEvents:
    - billing.invoice.generated
    - billing.payment.failed
    - abuse.action.triggered
    - provider.health.changed
    - security.incident
  producesEvents: [notification.sent]
  apis: ["/v1/notifications"]
  slo: { availability: 0.99, latencyP95Ms: 500 }
  deploy: { chart: baalvion-service, namespace: baalvion, minReplicas: 2, maxReplicas: 10 }
