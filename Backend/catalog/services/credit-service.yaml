apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: credit-service
  description: Receivables financing (invoice finance / factoring) and trade BNPL — risk assessment, advance/disbursement, installment scheduling, repayment, collections and delinquency. Part of financial-services-java (port 3037, schema `credit`).
  domain: commerce
  division: commerce
  context: credit
  owner: "@baalvion/commerce"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/credit-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres, kafka]
  dependsOn: [auth-service, ledger-service, account-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/invoice-finance", "/api/v1/bnpl"]
  slo: { availability: 0.999, latencyP95Ms: 400 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 2, maxReplicas: 8 }
