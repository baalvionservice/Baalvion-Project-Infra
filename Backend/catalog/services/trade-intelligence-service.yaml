apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: trade-intelligence-service
  description: AI/intelligence APIs — demand forecasting, supplier-default early warning (risk), NL trade assistant, and the anonymised Baalvion Trade Intelligence (BTI) benchmarks. Heavy ML delegated to a pluggable provider (Python ml-service / simulated). Part of financial-services-java (port 3043, schema `trade_intelligence`).
  domain: commerce
  division: commerce
  context: trade-intelligence
  owner: "@baalvion/commerce"
  tier: tier-2
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/trade-intelligence-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres]
  dependsOn: [auth-service, ml-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/intelligence"]
  slo: { availability: 0.99, latencyP95Ms: 800 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 1, maxReplicas: 6 }
