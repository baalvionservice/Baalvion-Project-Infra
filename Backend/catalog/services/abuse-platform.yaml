apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: abuse-platform
  description: Trust & Safety — risk scoring, KYC/AML, moderation, destination intel, enforcement. Consumes signals; produces enforcement actions.
  domain: platform
  division: platform-core
  context: trust-safety
  owner: "@baalvion/trust-safety"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/infrastructure/proxy-service
spec:
  lifecycle: beta
  language: node
  datastores: [postgres, redis, clickhouse]
  dependsOn: [identity-platform]
  consumesEvents: [proxy.session.started, provider.health.changed]
  producesEvents: [abuse.action.triggered]
  apis: ["/v1/admin/trust"]
  slo: { availability: 0.999, latencyP95Ms: 300 }
  deploy: { chart: baalvion-service, namespace: baalvion, minReplicas: 2, maxReplicas: 10 }
