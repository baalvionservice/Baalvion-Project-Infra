apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: wallet-service
  description: Multi-currency wallet — per-holder currency balances, deposits, withdrawals/payouts, holds (reserve/capture/release), same-currency transfers, and in-wallet conversions, with a full movement ledger. Part of financial-services-java (port 3039, schema `wallet`).
  domain: commerce
  division: commerce
  context: wallet
  owner: "@baalvion/commerce"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/commerce/financial-services-java/wallet-service
spec:
  lifecycle: beta
  language: java
  datastores: [postgres, kafka]
  dependsOn: [auth-service, ledger-service]
  consumesEvents: []
  producesEvents: []
  apis: ["/api/v1/wallets"]
  slo: { availability: 0.999, latencyP95Ms: 300 }
  deploy: { chart: baalvion-financial, namespace: financial, minReplicas: 2, maxReplicas: 8 }
