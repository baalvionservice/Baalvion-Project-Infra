apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: proxy-gateway
  description: Go data plane — HTTP/HTTPS-CONNECT + SOCKS5 forward proxy, provider orchestration, metering emission, AI-weighted routing. The hot path.
  domain: infrastructure
  division: proxy-infrastructure
  context: proxy
  owner: "@baalvion/proxy-division"
  tier: tier-0
  repo: baalvion-platform
  path: Backend/gateway
spec:
  lifecycle: production
  language: go
  datastores: [postgres, redis]
  dependsOn:
    - proxy-platform      # control-plane config (providers, quotas, AI weights via Redis)
  producesEvents: []      # emits usage to Redis stream (consumed by metering)
  apis: []
  slo:
    availability: 0.9995
    latencyP95Ms: 300
  deploy:
    chart: baalvion-service
    namespace: baalvion-edge
    minReplicas: 6
    maxReplicas: 150
