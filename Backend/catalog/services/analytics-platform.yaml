apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: analytics-platform
  description: Cross-division analytics + AI intelligence — feature store, forecasting, anomaly detection, routing-weight publishing. CQRS read models over the event stream.
  domain: knowledge
  division: platform-core
  context: analytics
  owner: "@baalvion/data-platform"
  tier: tier-1
  repo: baalvion-platform
  path: Backend/services/infrastructure/proxy-service
spec:
  lifecycle: beta
  language: node
  datastores: [clickhouse, timescaledb, redis]
  dependsOn: []
  consumesEvents:
    - proxy.session.started
    - proxy.session.ended
    - provider.health.changed
    - billing.invoice.generated
    - abuse.action.triggered
  producesEvents: [metrics.threshold]
  apis: ["/v1/analytics", "/v1/admin/intelligence"]
  slo: { availability: 0.99, latencyP95Ms: 1000 }
  deploy: { chart: baalvion-service, namespace: baalvion, minReplicas: 2, maxReplicas: 12 }
