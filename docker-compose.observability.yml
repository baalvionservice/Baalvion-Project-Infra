# Observability stack for the Baalvion platform.
# Prometheus scrapes realtime-service:/metrics (host) and Grafana visualises it.
#   docker compose -f docker-compose.observability.yml up -d
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: baalvion-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - baalvion-prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: baalvion-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      # HARDENED (cleanup/infra-hardening): admin password from env, not baked in.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me-in-env}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - baalvion-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  baalvion-prometheus-data:
  baalvion-grafana-data:
