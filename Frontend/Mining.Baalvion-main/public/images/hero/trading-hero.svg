  <circle cx="980" cy="190" r="320" fill="#21CEDD" opacity="0.06"/>
  <!-- mountain range -->
  <path d="M0 720 L220 470 L360 600 L520 380 L700 640 L860 430 L1040 660 L1200 520 L1200 900 L0 900 Z" fill="#0E2E4E"/>
  <path d="M0 760 L180 560 L340 700 L520 520 L720 720 L920 560 L1120 740 L1200 690 L1200 900 L0 900 Z" fill="#103a63"/>
  <path d="M520 380 L560 440 L470 600 L380 460 Z" fill="url(#acc)" opacity="0.85"/>
  <circle cx="520" cy="380" r="7" fill="#FFFFFF"/>
  <rect x="64" y="96" width="150" height="6" rx="3" fill="url(#acc)"/>
  <text x="64" y="160" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800" fill="#FFFFFF">BAALVION MINING INC.</text>
  <text x="64" y="200" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#9FC6D6">Global Mineral Trade &amp; Commodity Supply Network</text>
</svg>
