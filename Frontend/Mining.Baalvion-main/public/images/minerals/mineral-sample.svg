<svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mineral commodity sample">
  <defs>
    <linearGradient id="mm" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B2540"/><stop offset="1" stop-color="#0A1A2B"/>
