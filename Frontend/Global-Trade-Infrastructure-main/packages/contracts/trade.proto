syntax = "proto3";

package baalvion.trade.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/baalvion/sovereign-os/packages/contracts/generated";

service TradeExecutionService {
  rpc ExecuteMandate(TradeMandateRequest) returns (TradeMandateResponse);
  rpc ValidateHandshake(HandshakeRequest) returns (HandshakeResponse);
}

message TradeMandateRequest {
  string mandate_id = 1;
  string domain = 2;
  string action = 3;
  string from_state = 4;
  string to_state = 5;
  bytes payload = 6;
  string actor_id = 7;
  string tenant_id = 8;
  string signature = 9;
}

message TradeMandateResponse {
  string event_id = 1;
  string correlation_id = 2;
  google.protobuf.Timestamp finalized_at = 3;
  bool success = 4;
  string error_code = 5;
}

message HandshakeRequest {
  string deal_id = 1;
  string party_id = 2;
  bytes terms_hash = 3;
}

message HandshakeResponse {
  bool authorized = 1;
  string governance_proof = 2;
}