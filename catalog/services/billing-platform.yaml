apiVersion: baalvion.io/v1
kind: Service
metadata:
  name: billing-platform
  description: Shared billing platform — subscriptions, invoicing, payments, usage billing, tax engine, reconciliation. All products consume it; none reimplement it.
  division: platform-core
  context: billing
  owner: "@baalvion/platform-core"
  tier: tier-0
  repo: baalvion-platform
  path: Backend/commerce-service
spec:
  lifecycle: beta
  language: node
  datastores: [postgres, timescaledb, redis]
  dependsOn:
    - identity-platform
  consumesEvents:
    - proxy.session.ended      # usage-based billing ingestion
    - org.created
  producesEvents:
    - billing.invoice.generated
    - billing.payment.succeeded
    - billing.payment.failed
  apis:
    - baalvion.billing.v1.BillingService
  slo:
    availability: 0.999
    latencyP95Ms: 250
  deploy:
    chart: baalvion-service
    namespace: baalvion
    minReplicas: 2
    maxReplicas: 20
