# ── Global plugins ────────────────────────────────────────────────────────────
plugins:

  # Prometheus metrics for all routes
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics:     true
      bandwidth_metrics:   true
      per_consumer:        false

  # Global CORS
  - name: cors
    config:
      origins:         ["http://localhost:3000", "http://localhost:3030", "https://baalvion.com", "https://admin.baalvion.com"]
      methods:         [GET, POST, PATCH, DELETE, OPTIONS, HEAD]
      headers:         [Authorization, Content-Type, X-CSRF-Token, X-Request-ID, X-Correlation-ID]
      exposed_headers: [X-Request-ID, X-RateLimit-Remaining, X-RateLimit-Reset]
      credentials:     true
      max_age:         3600

  # Global bot detection
  - name: bot-detection
    config:
      allow: []
      deny:  [baiduspider, netcraft, 360spider, semrushbot, ahrefsbot, mj12bot]

  # Request size limit — prevent large payload attacks
  - name: request-size-limiting
    config:
      allowed_payload_size: 8  # MB
      require_content_length: false

  # Add security headers to all responses
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Frame-Options: DENY"
          - "X-Content-Type-Options: nosniff"
          - "Referrer-Policy: strict-origin-when-cross-origin"
          - "Permissions-Policy: camera=(), microphone=(), geolocation=()"
          - "X-XSS-Protection: 1; mode=block"

# ── Per-route plugins ─────────────────────────────────────────────────────────

  # JWT validation on all protected routes
  - name:  jwt
    route: admin-routes
    config:
      key_claim_name:     kid
      claims_to_verify:   [exp, nbf]
      secret_is_base64:   false
      run_on_preflight:   false

  - name:  jwt
    route: session-routes
    config:
      key_claim_name:   kid
      claims_to_verify: [exp]
      run_on_preflight: false

  - name:  jwt
    route: notification-routes
    config:
      key_claim_name:   kid
      claims_to_verify: [exp]
      run_on_preflight: false

  # Rate limiting — auth endpoints (strict)
  - name:  rate-limiting
    route: auth-routes
    config:
      minute:          60
      hour:            300
      policy:          redis
      redis_host:      baalvion-redis
      redis_port:      6379
      redis_timeout:   2000
      limit_by:        ip
      fault_tolerant:  true
      hide_client_headers: false
      error_code:      429
      error_message:   "Rate limit exceeded. Please slow down."

  # Rate limiting — admin API (more generous but still protected)
  - name:  rate-limiting
    route: admin-routes
    config:
      minute:       120
      hour:         1000
      policy:       redis
