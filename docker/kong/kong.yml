_format_version: "3.0"
_transform: true

# ── JWT signing keys ────────────────────────────────────────────────────────
# Kong validates RS256 JWTs from auth-service using the public key.
# Add via Admin API: POST /consumers/baalvion-services/jwt
# or configure JWKS endpoint below.

# ── Services ─────────────────────────────────────────────────────────────────
services:

  - name: auth-service
    url:  http://baalvion-auth:3001
    tags: [identity, internal]
    connect_timeout: 10000
    read_timeout:    60000
    write_timeout:   60000
    routes:
      - name:  auth-routes
        paths: [/api/v1/auth]
        strip_path: false
        methods: [GET, POST, PATCH, DELETE, OPTIONS]
        tags: [auth]

  - name: admin-service
    url:  http://baalvion-admin-svc:3021
    tags: [identity, admin, internal]
    routes:
      - name:  admin-routes
        paths: [/api/v1/admin]
        strip_path: false
        methods: [GET, POST, PATCH, DELETE, OPTIONS]
        tags: [admin]

  - name: session-service
    url:  http://baalvion-session:3022
    tags: [identity, internal]
    routes:
      - name:  session-routes
        paths: [/api/v1/sessions]
        strip_path: false
        methods: [GET, POST, PATCH, DELETE, OPTIONS]
        tags: [session]

  - name: oauth-service
    url:  http://baalvion-oauth:3023
    tags: [identity, oauth]
    routes:
      - name:  oauth-routes
        paths: [/oauth, /.well-known]
        strip_path: false
        methods: [GET, POST, OPTIONS]
        tags: [oauth]

  - name: notification-service
    url:  http://baalvion-notification:3031
    tags: [internal]
    routes:
      - name:  notification-routes
        paths: [/api/v1/notifications]
        strip_path: false
