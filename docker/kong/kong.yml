    connect_timeout: 15000
    read_timeout:    60000
    write_timeout:   60000
    routes:
      - name:  brand-connector-routes
        paths: [/api/v1/brands, /api/v1/influencers, /api/v1/campaigns, /api/v1/partnerships, /api/v1/deliverables, /api/v1/leads, /api/v1/deals, /api/v1/proposals, /api/v1/payments, /api/v1/outreach, /api/v1/matching, /api/v1/acquisition, /api/v1/billing, /api/v1/team, /api/v1/scoring, /api/v1/disputes, /api/v1/onboarding, /api/v1/automation]
