version: '3.9'

# Baalvion API Gateway (Kong)
# Usage: docker compose -f docker/kong/docker-compose.yml up -d
#
# Kong Admin API:  http://localhost:8001
# Kong Proxy:      http://localhost:8000
# Kong HTTPS:      https://localhost:8443

networks:
  baalvion-net:
    external: true
    name: baalvion-net
  kong-net:
    name: baalvion-kong

volumes:
  kong_postgres:

services:

  # ── Kong database ──────────────────────────────────────────────────────────
  kong-db:
    image: postgres:15-alpine
    container_name: baalvion-kong-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kong
      POSTGRES_USER:     kong
      POSTGRES_PASSWORD: kong_pass
    volumes:
      - kong_postgres:/var/lib/postgresql/data
    networks: [kong-net]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong", "-d", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kong migrations ────────────────────────────────────────────────────────
  kong-migrations:
    image: kong:3.8-alpine
    container_name: baalvion-kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE:          postgres
      KONG_PG_HOST:           kong-db
      KONG_PG_PORT:           5432
      KONG_PG_DATABASE:       kong
      KONG_PG_USER:           kong
      KONG_PG_PASSWORD:       kong_pass
    networks: [kong-net]
    depends_on:
      kong-db:
        condition: service_healthy
    restart: on-failure

  # ── Kong gateway ───────────────────────────────────────────────────────────
  kong:
    image: kong:3.8-alpine
    container_name: baalvion-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE:          postgres
      KONG_PG_HOST:           kong-db
      KONG_PG_PORT:           5432
      KONG_PG_DATABASE:       kong
      KONG_PG_USER:           kong
      KONG_PG_PASSWORD:       kong_pass
      KONG_PROXY_LISTEN:      "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN:      "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      KONG_ADMIN_GUI_URL:     http://localhost:8002
      KONG_PROXY_ACCESS_LOG:  /dev/stdout
      KONG_ADMIN_ACCESS_LOG:  /dev/stdout
      KONG_PROXY_ERROR_LOG:   /dev/stderr
      KONG_ADMIN_ERROR_LOG:   /dev/stderr
      KONG_PLUGINS:           bundled,jwt,rate-limiting,request-termination,cors,ip-restriction,bot-detection,request-size-limiting,response-transformer,prometheus
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_LOG_LEVEL:         notice
      KONG_TRUSTED_IPS:       "0.0.0.0/0"
      KONG_REAL_IP_HEADER:    X-Forwarded-For
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
      - ./plugins:/usr/local/share/lua/5.1/kong/plugins:ro
    ports:
      - "8000:8000"   # HTTP proxy
      - "8443:8443"   # HTTPS proxy
      - "8001:8001"   # Admin API
      - "8444:8444"   # Admin HTTPS
    networks: [kong-net, baalvion-net]
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Kong JWT consumer bootstrap ───────────────────────────────────────────
  # Registers the auth-service RS256 public key as a Kong JWT credential.
  # Runs once after Kong is healthy; safe to re-run on key rotation.
  kong-jwt-setup:
    image: node:20-alpine
    container_name: baalvion-kong-jwt-setup
    restart: "no"
    command: node /scripts/setup-kong-jwt.js
    volumes:
      - ./setup-kong-jwt.js:/scripts/setup-kong-jwt.js:ro
    environment:
      KONG_ADMIN_URL: http://baalvion-kong:8001
      JWKS_URI:       http://baalvion-auth:3001/.well-known/jwks.json
      CONSUMER_NAME:  baalvion-services
      MAX_RETRIES:    "40"
      RETRY_DELAY_MS: "3000"
    networks: [kong-net, baalvion-net]
    depends_on:
      kong:
        condition: service_healthy

  # ── Kong Manager UI (optional) ─────────────────────────────────────────────
  kong-manager:
    image: pantsel/konga:0.14.9
    container_name: baalvion-konga
    restart: unless-stopped
    environment:
      NODE_ENV:   production
      DB_ADAPTER: postgres
      DB_HOST:    kong-db
      DB_PORT:    5432
      DB_USER:    kong
      DB_PASSWORD: kong_pass
      DB_DATABASE: konga
    ports:
      - "1337:1337"
    networks: [kong-net]
    depends_on:
      kong-db:
        condition: service_healthy
