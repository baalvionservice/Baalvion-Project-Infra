receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]

  # Prometheus metrics from all services
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          static_configs:
            - targets: [localhost:8888]

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

  # Add resource attributes to all telemetry
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:NODE_ENV}
        action: upsert

  # Redact sensitive data from spans
  attributes:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: db.statement
        pattern: "(password|token|secret)=[^&]*"
        action: hash

exporters:
  # Send traces to Jaeger
  otlp/jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  # Send metrics to Prometheus scrape endpoint
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: baalvion
    const_labels:
      cluster: local

  # Send logs to Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    labels:
      resource:
        service.name: service_name
        service.version: service_version
      attributes:
        level: level

  # Debug output (dev only)
  debug:
    verbosity: basic

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, batch, resource, attributes]
      exporters:  [otlp/jaeger]

    metrics:
      receivers:  [otlp, prometheus]
      processors: [memory_limiter, batch, resource]
      exporters:  [prometheus]

    logs:
      receivers:  [otlp]
      processors: [memory_limiter, batch, resource]
      exporters:  [loki]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679
