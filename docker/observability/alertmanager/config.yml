global:
  smtp_from:      alerts@baalvion.com
  smtp_smarthost: smtp.gmail.com:587
  smtp_auth_username: ${SMTP_USER}
  smtp_auth_password: ${SMTP_PASS}
  resolve_timeout: 5m

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  group_by: [alertname, service]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 1h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: pagerduty
      continue: true
    - match:
        team: security
      receiver: security-team
    - match:
        slo: auth-availability
      receiver: oncall

receivers:
  - name: default
    email_configs:
      - to: platform@baalvion.com
        send_resolved: true

  - name: pagerduty
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_KEY}
        send_resolved: true

  - name: security-team
    email_configs:
      - to: security@baalvion.com
        send_resolved: true

  - name: oncall
    email_configs:
      - to: oncall@baalvion.com
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, service]
