version: '3.9'

# Baalvion Observability Stack
# Usage: docker compose -f docker/observability/docker-compose.yml up -d
#
# Services:
#   Prometheus     http://localhost:9090
#   Grafana        http://localhost:3100  (admin / baalvion_grafana)
#   Loki           http://localhost:3200
#   Jaeger UI      http://localhost:16686
#   OTel Collector grpc:4317 http:4318
#   Alertmanager   http://localhost:9093

networks:
  observability:
    name: baalvion-observability
  baalvion-net:
    external: true
    name: baalvion-net

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  jaeger_data:

services:

  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: baalvion-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./otel-collector/config.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector metrics
      - "8889:8889"   # Prometheus scrape endpoint
    networks: [observability, baalvion-net]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: baalvion-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [observability, baalvion-net]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Alertmanager ─────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: baalvion-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager/config.yml:/etc/alertmanager/config.yml:ro
    ports:
      - "9093:9093"
    networks: [observability]

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: baalvion-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: baalvion_grafana
      GF_SERVER_HTTP_PORT:        3100
      GF_USERS_ALLOW_SIGN_UP:     'false'
      GF_FEATURE_TOGGLES_ENABLE:  traceToMetrics,tempoSearch
      GF_AUTH_ANONYMOUS_ENABLED:  'false'
      GF_SMTP_ENABLED:            'false'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3100:3100"
    networks: [observability]
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Loki (log aggregation) ───────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: baalvion-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3200:3100"
    networks: [observability]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Promtail (log shipper) ───────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.0
    container_name: baalvion-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks: [observability]
    depends_on: [loki]

  # ── Jaeger (distributed tracing) ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.61
    container_name: baalvion-jaeger
    restart: unless-stopped
    environment:
      SPAN_STORAGE_TYPE:        badger
      BADGER_EPHEMERAL:         'false'
      BADGER_DIRECTORY_VALUE:   /badger/data
      BADGER_DIRECTORY_KEY:     /badger/key
      COLLECTOR_OTLP_ENABLED:   'true'
    volumes:
      - jaeger_data:/badger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector
      - "14250:14250"  # gRPC model.proto
    networks: [observability]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Node Exporter (host metrics) ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: baalvion-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks: [observability]

  # ── Redis Exporter ────────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: baalvion-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://baalvion-redis:6379
    ports:
      - "9121:9121"
    networks: [observability, baalvion-net]

  # ── Postgres Exporter ─────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: baalvion-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://baalvion:${POSTGRES_PASSWORD:-baalvion_dev_pass}@baalvion-postgres:5432/baalvion_db?sslmode=disable"
    ports:
      - "9187:9187"
    networks: [observability, baalvion-net]
