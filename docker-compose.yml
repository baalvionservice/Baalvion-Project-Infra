      dockerfile: Backend/services/platform/admin-service/Dockerfile
    container_name: baalvion-admin-svc
    restart: unless-stopped
    ports:
      - "3021:3021"
    environment:
      - PORT=3021
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
