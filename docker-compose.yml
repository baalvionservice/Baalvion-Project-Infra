      - default
      - baalvion-net
    profiles:
      - backend

  # ── Imperialpedia Service (port 3004) ────────────────────────────────────
  imperialpedia-service:
    build:
      context: .
      dockerfile: Backend/services/knowledge/imperialpedia-service/Dockerfile
    container_name: baalvion-imperialpedia
