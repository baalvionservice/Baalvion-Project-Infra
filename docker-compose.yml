services:

  # ── PostgreSQL (shared database for all services) ─────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: baalvion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: baalvion_db
      POSTGRES_USER: baalvion
      POSTGRES_PASSWORD: baalvion_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baalvion -d baalvion_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - baalvion-net

  # ── Redis (queues + caching for proxy backend) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: baalvion-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - baalvion-net

  # ── pgAdmin (DB GUI — http://localhost:5050) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: baalvion-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@baalvion.com
      PGADMIN_DEFAULT_PASSWORD: baalvion_admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # ── CMS Service ──────────────────────────────────────────────────────────────
  cms-service:
    build:
      context: .
      dockerfile: Backend/services/knowledge/cms-service/Dockerfile
    container_name: baalvion-cms
    restart: unless-stopped
    ports:
      - "3011:3011"
    environment:
      - PORT=3011
      # development → use the dev vault key (matches the already-encrypted payment integrations)
      # + dev inter-service secret. Real deploy: NODE_ENV=production + CMS_SECRETS_KEY + INTERNAL_SERVICE_SECRET.
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # ── Commerce Service ──────────────────────────────────────────────────────────
  commerce-service:
    build:
      context: .
      dockerfile: Backend/services/commerce/commerce-service/Dockerfile
    container_name: baalvion-commerce
    restart: unless-stopped
    ports:
      - "3012:3012"
    environment:
      - PORT=3012
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # ── Order Service ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: Backend/services/commerce/order-service/Dockerfile
    container_name: baalvion-orders
    restart: unless-stopped
    # Join the shared gateway network so Traefik resolves http://order-service:3013.
    # Keeps `default` for existing intra-compose connectivity (postgres/redis are on both).
    networks:
      - default
      - baalvion-net
    ports:
      - "3013:3013"
    environment:
      - PORT=3013
      - NODE_ENV=production
      # Local/integration stack exercises prod code paths (RS256 enforcement) while using the
      # backend-authoritative MOCK payment provider. A real deploy sets PAYMENT_PROVIDER + keys
      # instead; this flag is the explicit, audited opt-in the provider guard requires.
      - ALLOW_MOCK_PAYMENTS=true
      # Commerce RBAC PDP (store-team roles / refund authorization) — containerized on baalvion-net.
      - RBAC_BASE_URL=http://rbac-service:3055
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rbac-service:
        condition: service_healthy
    profiles:
      - backend

  # ── Inventory Service ─────────────────────────────────────────────────────────
  inventory-service:
    build:
      context: .
      dockerfile: Backend/services/commerce/inventory-service/Dockerfile
    container_name: baalvion-inventory
    restart: unless-stopped
    ports:
      - "3014:3014"
    environment:
      - PORT=3014
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # ── Fulfillment Service ───────────────────────────────────────────────────────
  fulfillment-service:
    build:
      context: .
      dockerfile: Backend/services/commerce/fulfillment-service/Dockerfile
    container_name: baalvion-fulfillment
    restart: unless-stopped
    ports:
      - "3016:3015"
    environment:
      - PORT=3015
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # ── Auth Service (port 3001) ─────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Backend/services/identity/auth-service/Dockerfile
    container_name: baalvion-auth
    restart: unless-stopped
    # Join the shared gateway network so Traefik resolves http://auth-service:3001.
    # Keeps `default` for existing intra-compose connectivity (postgres/redis are on both).
    networks:
      - default
      - baalvion-net
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      # Email → Mailpit dev SMTP catcher (no real auth; dummy creds satisfy the gate). Inbox: :8025
      - EMAIL_FROM=noreply@baalvion.com
      - SMTP_HOST=baalvion-mailpit
      - SMTP_PORT=1025
      - SMTP_USER=dev
      - SMTP_PASS=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - identity
      - backend

  # ── Admin Service (port 3021) ─────────────────────────────────────────────────
  admin-service:
    build:
      context: .
      dockerfile: Backend/services/platform/admin-service/Dockerfile
    container_name: baalvion-admin-svc
    restart: unless-stopped
    ports:
      - "3021:3021"
    environment:
      - PORT=3021
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - identity
      - backend

  # ── Session Service (port 3022) ───────────────────────────────────────────────
  session-service:
    build:
      context: .
      dockerfile: Backend/services/identity/session-service/Dockerfile
    container_name: baalvion-session
    restart: unless-stopped
    ports:
      - "3022:3022"
    environment:
      - PORT=3022
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - IMPOSSIBLE_TRAVEL_KMH=900
      - HIGH_RISK_SCORE=70
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - identity
      - backend

  # ── OAuth Service (port 3023) ─────────────────────────────────────────────────
  oauth-service:
    build:
      context: .
      dockerfile: Backend/services/identity/oauth-service/Dockerfile
    container_name: baalvion-oauth
    restart: unless-stopped
    ports:
      - "3023:3023"
    environment:
      - PORT=3023
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - OAUTH_BASE_URL=http://localhost:3023
      - AUTH_UI_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - identity
      - backend

  # ── RBAC Service / Policy Decision Point (port 3055) ──────────────────────────
  # Verify-only RS256 PDP for commerce store-team roles + ABAC. Containerized so the
  # whole stack boots from `docker compose` with no host node process.
  rbac-service:
    build:
      context: .
      dockerfile: Backend/services/identity/rbac-service/Dockerfile
    container_name: baalvion-rbac
    restart: unless-stopped
    # Shared gateway network so sibling containers resolve http://rbac-service:3055.
    networks:
      - default
      - baalvion-net
    ports:
      - "3055:3055"
    environment:
      - PORT=3055
      - NODE_ENV=production
      - API_BASE_URL=http://rbac-service:3055
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - DB_SCHEMA=rbac
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      # Service-to-service PDP calls (commerce/order PEP -> /v1/authorize). User-token
      # forwarding is the default path; this enables system-context calls when needed.
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3055/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - identity
      - backend

  # ── Admin Platform (optional: production only — use npm run dev locally) ─────
  admin-platform:
    build:
      context: ./Frontend/admin-platform
      dockerfile: Dockerfile
    container_name: baalvion-admin
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/v1
      - NEXT_PUBLIC_AUTH_URL=http://localhost:3001/v1/auth
      - NEXT_PUBLIC_ADMIN_API_URL=http://localhost:3021/v1
      - NEXT_PUBLIC_SESSION_API_URL=http://localhost:3022/v1
      - NEXT_PUBLIC_OAUTH_URL=http://localhost:3023
      - NEXT_PUBLIC_APP_URL=http://localhost:3030
      - NODE_ENV=production
    profiles:
      - admin

  # ── Proxy Backend (port 4000) ─────────────────────────────────────────────
  proxy-backend:
    build:
      context: .
      dockerfile: Backend/services/infrastructure/proxy-service/Dockerfile
    container_name: baalvion-proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      # proxy-service issues its own tokens during migration (Phase 5 removes this) → needs the private key,
      # else createAuthServer({requireRs256InProduction:true}) throws at startup with HS256 fallback off.
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - PAYU_MERCHANT_KEY=${PAYU_MERCHANT_KEY}
      - PAYU_MERCHANT_SALT=${PAYU_MERCHANT_SALT}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

  # ── Jobs Service (port 3002) ──────────────────────────────────────────────
  jobs-service:
    build:
      context: .
      dockerfile: Backend/services/ecosystem/jobs-service/Dockerfile
    container_name: baalvion-jobs
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://localhost:9200}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

  # ── CTM Service / ControlTheMarket (port 3011) ────────────────────────────
  # Note: cms-service also uses host port 3011 — disable cms-service or this if running both
  ctm-service:
    build:
      context: .
      dockerfile: Backend/services/ecosystem/ctm-service/Dockerfile
    container_name: baalvion-ctm
    restart: unless-stopped
    ports:
      - "3017:3011"
    environment:
      - PORT=3011
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3011/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

  # ── Mining Service / GeoTrade Nexus (port 3003) ───────────────────────────
  mining-service:
    build:
      context: .
      dockerfile: Backend/services/ecosystem/mining-service/Dockerfile
    container_name: baalvion-mining
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

  # ── Imperialpedia Service (port 3004) ────────────────────────────────────
  imperialpedia-service:
    build:
      context: .
      dockerfile: Backend/services/knowledge/imperialpedia-service/Dockerfile
    container_name: baalvion-imperialpedia
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

  # ── Real Estate Service / AmariseMaisonAvenue (port 3005) ────────────────
  real-estate-service:
    build:
      context: .
      dockerfile: Backend/services/ecosystem/real-estate-service/Dockerfile
    container_name: baalvion-real-estate
    restart: unless-stopped
    ports:
