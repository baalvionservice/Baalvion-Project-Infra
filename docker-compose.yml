      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://localhost:9200}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

  # ── CTM Service / ControlTheMarket (port 3011) ────────────────────────────
  # Note: cms-service also uses host port 3011 — disable cms-service or this if running both
  ctm-service:
    build:
      context: .
      dockerfile: Backend/services/ecosystem/ctm-service/Dockerfile
