      - JWT_AUDIENCE=baalvion-platform
      - AUTH_SERVICE_URL=http://baalvion-auth:3001
      # JWKS lives at ROOT on auth-service (index.js: app.use('/.well-known', wellKnown)) — NOT under /v1/auth
