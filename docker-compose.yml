    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3014/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Financial Services: Payment (port 3015) ──────────────────────────────
  payment-service:
    build:
      # Monorepo build (context = repo root) so the workspace deps @baalvion/sdk + @baalvion/auth-node
      # are bundled into the image (they were a dev node_modules junction, unbuildable in Docker).
      context: .
      dockerfile: Backend/services/commerce/payment-service/Dockerfile
    container_name: baalvion-payment-service
    restart: unless-stopped
    ports:
      # Host 3015 is owned by law-service; payment-service publishes on host 3019 to avoid the
      # collision. Internal callers use payment-service:3015 (container port) over baalvion-net.
      - "3019:3015"
    environment:
      - NODE_ENV=development
      - PORT=3015
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1
      - KAFKA_BROKERS=kafka:9092
      # No Kafka in the Limited-Beta stack; the gateway vertical uses Redis + the CMS vault.
      - KAFKA_ENABLED=false
      # Provider + decrypted keys are resolved per-tenant from the CMS vault (the only secret source).
      - CMS_BASE_URL=http://cms-service:3011/api/v1
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3025,http://localhost:8080
      - DAILY_LIMIT=1000000
      - TX_MAX_LIMIT=500000
      - TX_MIN_LIMIT=100
      - FEE_PERCENTAGE=0.01
      - FEE_FLAT=50
      - VAT_RATE=0.05
      - IDEMPOTENCY_TTL=86400
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cms-service:
        condition: service_started
    networks:
      - default
      - baalvion-net
    profiles:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3015/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Migration Runner (one-shot job) ──────────────────────────────────────
  migrate:
    image: node:20-alpine
    container_name: baalvion-migrate
    working_dir: /migrations
    command: ["node", "migrate.js", "up"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
    volumes:
      - ./Backend/database/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - migrate
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  baalvion-net:
    external: true
    name: baalvion-net
