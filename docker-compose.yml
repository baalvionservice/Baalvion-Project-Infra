      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - OAUTH_BASE_URL=http://localhost:3023
      - AUTH_UI_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
