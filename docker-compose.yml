      - backend

  # ── Admin Platform (optional: production only — use npm run dev locally) ─────
  admin-platform:
    build:
      context: ./Frontend/admin-platform
      dockerfile: Dockerfile
    container_name: baalvion-admin
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/v1
      - NEXT_PUBLIC_AUTH_URL=http://localhost:3001/v1/auth
      - NEXT_PUBLIC_ADMIN_API_URL=http://localhost:3021/v1
      - NEXT_PUBLIC_SESSION_API_URL=http://localhost:3022/v1
      - NEXT_PUBLIC_OAUTH_URL=http://localhost:3023
      - NEXT_PUBLIC_APP_URL=http://localhost:3030
      - NODE_ENV=production
    profiles:
      - admin

  # ── Proxy Backend (port 4000) ─────────────────────────────────────────────
  proxy-backend:
    build:
      context: .
      dockerfile: Backend/services/infrastructure/proxy-service/Dockerfile
    container_name: baalvion-proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      # proxy-service issues its own tokens during migration (Phase 5 removes this) → needs the private key,
      # else createAuthServer({requireRs256InProduction:true}) throws at startup with HS256 fallback off.
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - PAYU_MERCHANT_KEY=${PAYU_MERCHANT_KEY}
      - PAYU_MERCHANT_SALT=${PAYU_MERCHANT_SALT}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

  # ── Jobs Service (port 3002) ──────────────────────────────────────────────
