  # ── Auth Service (port 3001) ─────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Backend/services/identity/auth-service/Dockerfile
    container_name: baalvion-auth
    restart: unless-stopped
    # Join the shared gateway network so Traefik resolves http://auth-service:3001.
    # Keeps `default` for existing intra-compose connectivity (postgres/redis are on both).
    networks:
      - default
      - baalvion-net
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - identity
      - backend

  # ── Admin Service (port 3021) ─────────────────────────────────────────────────
  admin-service:
