      - HIGH_RISK_SCORE=70
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - identity
      - backend

  # ── OAuth Service (port 3023) ─────────────────────────────────────────────────
