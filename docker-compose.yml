version: '3.9'

services:

  # ── PostgreSQL (shared database for all services) ─────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: baalvion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: baalvion_db
      POSTGRES_USER: baalvion
      POSTGRES_PASSWORD: baalvion_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baalvion -d baalvion_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - baalvion-net

  # ── Redis (queues + caching for proxy backend) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: baalvion-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - baalvion-net

  # ── pgAdmin (DB GUI — http://localhost:5050) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: baalvion-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@baalvion.com
      PGADMIN_DEFAULT_PASSWORD: baalvion_admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # ── CMS Service ──────────────────────────────────────────────────────────────
  cms-service:
    build:
      context: .
      dockerfile: Backend/services/knowledge/cms-service/Dockerfile
    container_name: baalvion-cms
    restart: unless-stopped
    ports:
      - "3011:3011"
    environment:
      - PORT=3011
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # ── Commerce Service ──────────────────────────────────────────────────────────
  commerce-service:
    build:
      context: .
      dockerfile: Backend/services/commerce/commerce-service/Dockerfile
    container_name: baalvion-commerce
    restart: unless-stopped
    ports:
      - "3012:3012"
    environment:
      - PORT=3012
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # ── Order Service ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: Backend/services/commerce/order-service/Dockerfile
    container_name: baalvion-orders
    restart: unless-stopped
    # Join the shared gateway network so Traefik resolves http://order-service:3013.
    # Keeps `default` for existing intra-compose connectivity (postgres/redis are on both).
    networks:
      - default
      - baalvion-net
    ports:
      - "3013:3013"
    environment:
      - PORT=3013
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # ── Inventory Service ─────────────────────────────────────────────────────────
  inventory-service:
    build:
      context: .
      dockerfile: Backend/services/commerce/inventory-service/Dockerfile
    container_name: baalvion-inventory
    restart: unless-stopped
    ports:
      - "3014:3014"
    environment:
      - PORT=3014
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
