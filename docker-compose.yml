  # ── ML Service (8000, Python/FastAPI) — HMAC-signed (NOT JWT), internal; gateway: knowledge/ml ─
  ml-service:
    build:
      context: Backend/services/knowledge/ml-service
    container_name: baalvion-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # HMAC secret shared with callers (mlInferenceClient.sign). Blank = dev/unsigned mode.
      - ML_SERVICE_SECRET=${ML_SERVICE_SECRET}
      - DATABASE_URL=postgres://baalvion:baalvion_dev_pass@postgres:5432/baalvion_db
      - MODEL_DIR=/var/lib/baalvion/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

  # ── Migration Runner (one-shot job) ──────────────────────────────────────
  migrate:
    image: node:20-alpine
    container_name: baalvion-migrate
    working_dir: /migrations
    command: ["node", "migrate.js", "up"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
    volumes:
      - ./Backend/database/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - migrate
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  baalvion-net:
    external: true
    name: baalvion-net
