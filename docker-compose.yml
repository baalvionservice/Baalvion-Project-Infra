  # ── Law Service / Law Elite Network (port 3015) ──────────────────────────
  law-service:
    build:
      context: .
      dockerfile: Backend/services/knowledge/law-service/Dockerfile
    container_name: baalvion-law
    restart: unless-stopped
    ports:
      - "3015:3015"
    environment:
      - PORT=3015
      - NODE_ENV=production
      - CORS_ORIGINS=${LAW_CORS_ORIGINS:-http://localhost:9002,http://localhost:3000,https://lawelitenetwork.com}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=baalvion_db
      - DB_USER=baalvion
      - DB_PASSWORD=baalvion_dev_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ISSUER=baalvion-auth
      - JWT_AUDIENCE=baalvion-platform
      - JWT_ALLOW_HS256_FALLBACK=false
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      # Object storage (MinIO) for the document vault — internal endpoint for uploads,
      # public endpoint for browser-reachable presigned downloads.
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_ENDPOINT=${LAW_MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-baalvion}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-baalvion_dev_pass}
      - MINIO_BUCKET=${LAW_MINIO_BUCKET:-law-documents}
      # Razorpay payment gateway — set keys to enable real charges (cards/UPI/netbanking/
      # wallets/bank). Empty = simulated settlement (fully testable without keys).
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      # Public web origin (used in transactional email links).
      - APP_PUBLIC_URL=${LAW_APP_PUBLIC_URL:-http://localhost:9002}
      # Marketplace: platform commission withheld from each settled payment.
      - PLATFORM_FEE_PERCENT=${LAW_PLATFORM_FEE_PERCENT:-15}
      # Transactional email (SMTP). MAIL_ENABLED=false -> emails are logged, not sent.
      - MAIL_ENABLED=${LAW_MAIL_ENABLED:-false}
      - SMTP_HOST=${LAW_SMTP_HOST:-mailpit}
      - SMTP_PORT=${LAW_SMTP_PORT:-1025}
      - SMTP_SECURE=${LAW_SMTP_SECURE:-false}
      - SMTP_USER=${LAW_SMTP_USER:-}
      - SMTP_PASS=${LAW_SMTP_PASS:-}
      - MAIL_FROM=${LAW_MAIL_FROM:-Law Elite Network <no-reply@lawelitenetwork.com>}
      # Video consultations. Empty provider -> Jitsi public rooms (no keys needed).
      - VIDEO_PROVIDER=${LAW_VIDEO_PROVIDER:-}
      - DAILY_API_KEY=${LAW_DAILY_API_KEY:-}
      - DAILY_DOMAIN=${LAW_DAILY_DOMAIN:-}
      # Recurring-subscription billing worker.
      - BILLING_WORKER_ENABLED=${LAW_BILLING_WORKER_ENABLED:-true}
      - BILLING_INTERVAL_MINUTES=${LAW_BILLING_INTERVAL_MINUTES:-60}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3015/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - baalvion-net
    profiles:
      - backend

