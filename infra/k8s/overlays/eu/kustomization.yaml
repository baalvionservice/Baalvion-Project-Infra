apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      topology.kubernetes.io/region: eu-west-1
    includeSelectors: false

patches:
  - path: region-patch.yaml

images:
  - name: ghcr.io/baalvion/gateway
    newTag: v1.0.0
  - name: ghcr.io/baalvion/proxy-backend
    newTag: v1.0.0
