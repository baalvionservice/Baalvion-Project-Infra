# Control-plane API (proxy-backend Node: auth/dashboard/admin/developer/billing).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: baalvion
  labels: { app: api, tier: control-plane }
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api, tier: control-plane }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "4000", prometheus.io/path: "/metrics" }
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: api } }
      containers:
        - name: api
          image: ghcr.io/baalvion/proxy-backend:latest
          command: ["node", "index.js"]
          ports: [{ name: http, containerPort: 4000 }]
          envFrom:
            - configMapRef: { name: baalvion-common }
          env:
            - { name: PORT, value: "4000" }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: api-secrets, key: database-url } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: api-secrets, key: redis-url } }
            - name: TIMESERIES_DATABASE_URL
              valueFrom: { secretKeyRef: { name: api-secrets, key: timeseries-url } }
            - name: JWT_PRIVATE_KEY
              valueFrom: { secretKeyRef: { name: jwt-keys, key: private.pem } }
            - name: JWT_PUBLIC_KEYS
              valueFrom: { secretKeyRef: { name: jwt-keys, key: public-keys.json } }
            - name: RAZORPAY_KEY_SECRET
              valueFrom: { secretKeyRef: { name: api-secrets, key: razorpay-secret } }
            - name: PROVIDER_SECRET_KEY
              valueFrom: { secretKeyRef: { name: api-secrets, key: provider-secret-key } }
            - name: BILLING_SIGNING_SECRET
              valueFrom: { secretKeyRef: { name: api-secrets, key: billing-signing-secret } }
          resources:
            requests: { cpu: "250m", memory: 256Mi }
            limits: { cpu: "2", memory: 1Gi }
          readinessProbe: { httpGet: { path: /health, port: 4000 }, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /health, port: 4000 }, periodSeconds: 20 }
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: baalvion
  labels: { app: api }
spec:
  selector: { app: api }
  ports: [{ name: http, port: 4000, targetPort: 4000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api, namespace: baalvion }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: api, namespace: baalvion }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: api } }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api
  namespace: baalvion
  labels: { release: kube-prometheus-stack }
spec:
  selector: { matchLabels: { app: api } }
  endpoints: [{ port: http, path: /metrics, interval: 15s }]
