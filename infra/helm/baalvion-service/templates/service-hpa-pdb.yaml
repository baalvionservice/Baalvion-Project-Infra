apiVersion: v1
kind: Service
metadata:
  name: {{ include "svc.name" . }}
  namespace: {{ .Values.namespace }}
  labels: {{- include "svc.labels" . | nindent 4 }}
spec:
  selector: {{- include "svc.selector" . | nindent 4 }}
  ports:
    - { name: http, port: {{ .Values.containerPort }}, targetPort: http }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "svc.name" . }}
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: {{ include "svc.name" . }} }
  minReplicas: {{ .Values.replicas.min }}
  maxReplicas: {{ .Values.replicas.max }}
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: {{ .Values.replicas.targetCPUUtilization }} } }
  behavior:
    scaleDown: { stabilizationWindowSeconds: 300 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "svc.name" . }}
  namespace: {{ .Values.namespace }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels: {{- include "svc.selector" . | nindent 6 }}
{{- if .Values.metrics.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "svc.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    release: kube-prometheus-stack
    {{- include "svc.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{- include "svc.selector" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.metrics.path }}
      interval: 30s
{{- end }}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "svc.name" . }}
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels: {{- include "svc.selector" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowFrom }}
        - namespaceSelector: { matchLabels: { "kubernetes.io/metadata.name": {{ . | quote }} } }
        {{- end }}
      ports:
        - { protocol: TCP, port: {{ .Values.containerPort }} }
{{- end }}
