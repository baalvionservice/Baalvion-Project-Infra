apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: baalvion
  labels:
    app:     admin-service
    version: "1.0.0"
    tier:    identity
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: admin-service }
  template:
    metadata:
      labels:
        app:     admin-service
        version: "1.0.0"
        tier:    identity
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9462"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: baalvion-sa
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
        fsGroup:      1000
      terminationGracePeriodSeconds: 30

      containers:
        - name: admin-service
          image: ghcr.io/baalvion/admin-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3021
              name: http
            - containerPort: 9462
              name: metrics
          envFrom:
            - configMapRef: { name: baalvion-common }
            - secretRef:    { name: baalvion-secrets }
          env:
            - name:  PORT
              value: "3021"
            - name:  PROMETHEUS_PORT
              value: "9462"
            - name:  DB_USER
              value: baalvion
            - name:  LOG_LEVEL
              value: info
            - name:  POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name:  POD_NAMESPACE
              valueFrom:
                fieldRef: { fieldPath: metadata.namespace }

          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits:   { cpu: "500m", memory: "384Mi" }

          livenessProbe:
            httpGet: { path: /health, port: 3021 }
            initialDelaySeconds: 20
            periodSeconds:       15
            failureThreshold:    3

          readinessProbe:
            httpGet: { path: /health, port: 3021 }
            initialDelaySeconds: 10
            periodSeconds:       10
            failureThreshold:    3

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: [ALL]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: { app: admin-service }
                topologyKey: kubernetes.io/hostname
