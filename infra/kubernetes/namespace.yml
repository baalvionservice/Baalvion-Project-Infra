apiVersion: v1
kind: Namespace
metadata:
  name: baalvion
  labels:
    app.kubernetes.io/managed-by: kubectl
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: baalvion-quota
  namespace: baalvion
spec:
  hard:
    requests.cpu:    "8"
    requests.memory: 16Gi
    limits.cpu:      "16"
    limits.memory:   32Gi
    pods:            "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: baalvion-limits
  namespace: baalvion
spec:
  limits:
    - type: Container
      default:
        cpu:    "500m"
        memory: 256Mi
      defaultRequest:
        cpu:    "100m"
        memory: 128Mi
      max:
        cpu:    "2"
        memory: 2Gi
