<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Baalvion — Enterprise Platform Infrastructure">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="0.55" stop-color="#0C1228"/>
      <stop offset="1" stop-color="#0A1530"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.42" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#4F46E5" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0A0E1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="1280" height="360" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="360" rx="28" fill="url(#grid)"/>
  <rect x="0" y="0" width="1280" height="360" rx="28" fill="url(#glow)"/>
  <rect x="0.75" y="0.75" width="1278.5" height="358.5" rx="27.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- ===== Federated-network motif (right) ===== -->
  <g transform="translate(980,180)" opacity="0.95">
    <circle r="150" fill="none" stroke="#22D3EE" stroke-opacity="0.10" stroke-width="1"/>
    <circle r="96" fill="none" stroke="#6366F1" stroke-opacity="0.18" stroke-width="1"/>
    <!-- edges core -> satellites -->
    <g stroke="url(#accent)" stroke-opacity="0.55" stroke-width="1.5">
      <line x1="0" y1="0" x2="0" y2="-96"/>
      <line x1="0" y1="0" x2="91" y2="29"/>
      <line x1="0" y1="0" x2="56" y2="78"/>
      <line x1="0" y1="0" x2="-56" y2="78"/>
      <line x1="0" y1="0" x2="-91" y2="29"/>
    </g>
    <!-- satellite nodes -->
    <g fill="#0C1228" stroke="url(#accent)" stroke-width="2">
      <circle cx="0" cy="-96" r="9"/>
      <circle cx="91" cy="29" r="9"/>
      <circle cx="56" cy="78" r="9"/>
      <circle cx="-56" cy="78" r="9"/>
      <circle cx="-91" cy="29" r="9"/>
    </g>
    <g fill="#22D3EE">
      <circle cx="0" cy="-96" r="3.5"/>
      <circle cx="91" cy="29" r="3.5"/>
      <circle cx="56" cy="78" r="3.5"/>
      <circle cx="-56" cy="78" r="3.5"/>
      <circle cx="-91" cy="29" r="3.5"/>
    </g>
    <!-- core -->
    <circle r="34" fill="#22D3EE" fill-opacity="0.10"/>
    <circle r="18" fill="url(#core)"/>
  </g>

  <!-- ===== Logo + wordmark lockup (left) ===== -->
  <g transform="translate(80,104)">
    <text x="2" y="0" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="600" letter-spacing="4" fill="#7DD3FC">ENTERPRISE&#160;&#160;PLATFORM&#160;&#160;INFRASTRUCTURE</text>

    <!-- monogram tile -->
    <g transform="translate(0,30)">
      <rect width="76" height="76" rx="20" fill="url(#tile)"/>
      <rect x="0.75" y="0.75" width="74.5" height="74.5" rx="19.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.25"/>
      <g transform="translate(38,38)">
        <circle r="22" fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="2"/>
        <g stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="2">
          <line x1="0" y1="0" x2="0" y2="-22"/>
          <line x1="0" y1="0" x2="19" y2="11"/>
          <line x1="0" y1="0" x2="-19" y2="11"/>
        </g>
        <g fill="#FFFFFF">
          <circle cx="0" cy="-22" r="4.5"/>
          <circle cx="19" cy="11" r="4.5"/>
          <circle cx="-19" cy="11" r="4.5"/>
          <circle r="6.5"/>
        </g>
      </g>
    </g>

    <!-- wordmark -->
    <text x="98" y="92" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="74" font-weight="800" letter-spacing="1" fill="#FFFFFF">BAALVION</text>
    <rect x="100" y="108" width="188" height="6" rx="3" fill="url(#accent)"/>
  </g>

  <!-- taglines -->
  <text x="82" y="282" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="600" fill="#E2E8F0">Centralized identity · Gateway federation · Domain-driven monorepo</text>
  <text x="82" y="314" font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#8B95B2">35+ services · 16 applications · multi-tenant · security &amp; observability first-class</text>
</svg>
